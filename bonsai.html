<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Bonsai Master v3.1 (Leaf Upgrade)</title>
<style>
  :root {
    --bg-dark: #020617; 
    --panel: rgba(15, 23, 42, 0.92);
    --accent: #38bdf8; --success: #4ade80; --gold: #fbbf24;
    --text: #f1f5f9; --text-muted: #94a3b8;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  body { margin:0; height:100vh; background: #000; overflow:hidden; font-family: var(--font); color:var(--text); user-select:none; }
  
  .app-grid { display: grid; grid-template-columns: 1fr 300px; grid-template-rows: 1fr 70px; height: 100%; width: 100%; }
  
  .viewport { grid-column: 1 / 2; grid-row: 1 / 2; position: relative; cursor: grab; overflow: hidden; background: #000; }
  .viewport:active { cursor: grabbing; }
  .viewport.tool-active { cursor: crosshair; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  .sidebar {
    grid-column: 2 / 3; grid-row: 1 / 3;
    background: var(--panel); border-left: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    display: flex; flex-direction: column; gap: 15px; padding: 20px;
    z-index: 10; overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
  }

  .bottom-bar {
    grid-column: 1 / 2; grid-row: 2 / 3;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    display: flex; justify-content: center; gap: 20px; align-items: center; z-index: 5;
    padding-bottom: 10px; pointer-events: none;
  }
  .bottom-bar button { pointer-events: auto; }

  h2 { margin: 0 0 10px 0; color: var(--accent); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; border-bottom:1px solid #333; padding-bottom:5px;}
  h3 { font-size:14px; margin:15px 0 5px 0; color:#fff;}

  .stat-block { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; }
  .stat-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .bar-bg { width:100%; height:6px; background: rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
  .bar-fill { height:100%; transition: width 0.3s; }

  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn {
    background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.15); color: #cbd5e1;
    padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;
    font-size: 13px; display: flex; align-items: center; justify-content: center; gap:6px;
  }
  .btn:hover { background: rgba(255,255,255,0.1); color: #fff; transform: translateY(-1px); }
  .btn.active { background: var(--accent); color: #000; border-color: transparent; box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }

  .tab-btn { 
    background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2); color: #fff; 
    width: 50px; height: 50px; border-radius: 50%; 
    font-size: 22px; cursor: pointer; transition: 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .tab-btn:hover { background: var(--accent); transform: scale(1.1); box-shadow: 0 0 20px #000; }

  /* OVERLAYS */
  .overlay-panel {
    position: absolute; top: 30px; left: 30px; bottom: 90px; width: 420px;
    background: rgba(13, 17, 28, 0.98); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 25px; z-index: 50; display: none;
    overflow-y: auto; box-shadow: 0 25px 50px #000;
    animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .overlay-panel.open { display: block; }
  @keyframes slideUp { from{transform: translateY(30px); opacity:0} to{transform: translateY(0); opacity:1} }

  .list-item { 
    display: flex; align-items: center; gap: 10px; 
    background: rgba(255,255,255,0.03); padding: 12px; margin-bottom: 8px; border-radius: 8px; 
    border: 1px solid transparent; cursor:pointer;
  }
  .list-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.06); }
  .list-item img { width: 36px; height: 36px; border-radius: 50%; }
  
  .tag { font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase;}
  .tag.active { background: var(--success); color: #000; }

  #settingsGrid input { width: 100%; margin: 8px 0; accent-color: var(--accent); }
  .toast { position: fixed; top: 20px; right: 340px; background: rgba(0,0,0,0.8); color: var(--gold); padding: 10px 20px; border-radius: 20px; pointer-events: none; opacity: 0; transition: opacity 0.5s; font-weight: bold; border:1px solid var(--gold); z-index: 100;}

  @media(max-width: 900px) {
    .app-grid { grid-template-columns: 1fr; grid-template-rows: 1fr 200px 70px; }
    .sidebar { grid-column: 1 / 2; grid-row: 2 / 3; border-left:none; border-top:1px solid #333; }
    .bottom-bar { grid-column: 1 / 2; grid-row: 3 / 4; }
    .overlay-panel { width: auto; left: 15px; right: 15px; bottom: 280px; }
    .toast { right: 20px; }
  }
</style>
</head>
<body>

<div class="app-grid">
  <div class="viewport" id="viewport">
    <canvas id="cv"></canvas>
    
    <div id="panel_collection" class="overlay-panel">
      <h2>Baumschule</h2>
      <div id="collectionList"></div>
      <button class="btn" style="width:100%; margin-top:15px; background:var(--success); color:#000" id="btnBuyTree">🌱 Setzling kaufen (100 💰)</button>
    </div>

    <div id="panel_shop" class="overlay-panel">
      <h2>Shop</h2>
      <div style="text-align:right; font-weight:bold; color:var(--gold); margin-bottom:10px">Guthaben: <span id="shopMoney">0</span> 💰</div>
      <h3>Töpfe</h3><div id="shopPotsList"></div>
      <h3>Substrate</h3><div id="shopSoilsList"></div>
    </div>

    <div id="panel_quests" class="overlay-panel">
      <h2>Aufträge</h2>
      <div id="questList"></div>
    </div>

    <div id="panel_settings" class="overlay-panel">
      <h2>System & Dev</h2>
      <div id="settingsGrid">
        <label>Tempo (Sekunden pro Tag)</label><input type="range" id="inpSecPerDay" min="1" max="120" value="60">
        <label>Wachstums-Speed</label><input type="range" id="inpGrowMult" min="0" max="20" step="0.5" value="1">
        <label>Max. Blätter (Dichte)</label><input type="range" id="inpLeafLimit" min="5" max="100" value="30">
        <label>Windstärke</label><input type="range" id="inpWind" min="0" max="3" step="0.1" value="1">
      </div>
      <br><button class="btn" onclick="hardReset()" style="width:100%; background:#ef4444; color:#fff">Spielstand Löschen</button>
    </div>
    
    <div id="toast" class="toast">Nachricht</div>
  </div>

  <div class="sidebar">
    <div style="text-align:center; margin-bottom:10px">
      <div id="uiTreeName" style="font-size:18px; font-weight:700">Baum</div>
      <div id="uiSpeciesName" style="color:var(--text-muted); font-size:12px;">Spezies</div>
    </div>

    <div class="stat-block">
      <div class="stat-row"><span>Alter</span> <span id="uiDay" style="color:var(--text)">Tag 1</span></div>
      <div class="stat-row"><span>Saison</span> <span id="uiSeason" style="color:var(--accent)">Sommer</span></div>
      
      <div style="margin-top:10px" class="stat-row"><span>Wasser</span> <span id="uiWaterVal">100%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="barWater" style="background:var(--accent); width:100%"></div></div>
      
      <div style="margin-top:8px" class="stat-row"><span>Vitalität</span> <span id="uiHpVal">100%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="barHp" style="background:var(--success); width:100%"></div></div>
    </div>

    <div style="flex:1"></div>

    <h2>Werkzeuge</h2>
    <div class="btn-grid">
      <button class="btn" id="toolWater">💧 Gießen</button>
      <button class="btn" id="toolPrune">✂️ Schnitt</button>
      <button class="btn" id="toolGraft">🧬 Veredeln</button>
      <button class="btn" id="toolBend">🧵 Biegen</button>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="tab-btn" data-target="panel_collection">🌲</button>
    <button class="tab-btn" data-target="panel_shop">🛒</button>
    <button class="tab-btn" data-target="panel_quests">📜</button>
    <button class="tab-btn" data-target="panel_settings">⚙️</button>
    <div style="width:20px"></div>
    <button class="tab-btn" id="btnPhoto" style="font-size:14px; width:auto; padding:0 20px; border-radius:20px;">📸 SNAP</button>
  </div>
</div>

<script>
(function(){
const $ = id => document.getElementById(id);
const cv = $('cv');
const ctx = cv.getContext('2d', {alpha: false});

// 1. IMPROVED COLORS FOR LEAF STYLE (Dark Base, Light Detail)
const SPECIES = {
  ficus: { name: "Ficus Retusa", leaf: "oval", color:["#166534","#4ade80"], bark:["#5D4037","#3E2723"], growth: 1.0 },
  pine:  { name: "Schwarzkiefer", leaf: "needle", color:["#064e3b","#10b981"], bark:["#424242","#212121"], growth: 0.6 },
  maple: { name: "Ahorn", leaf: "maple", color:["#7f1d1d","#ef4444"], bark:["#5d4037","#3e2723"], growth: 0.8 },
  sakura:{ name: "Sakura", leaf: "oval", color:["#be185d","#f9a8d4"], bark:["#5d4037","#3e2723"], growth: 0.9 },
  willow:{ name: "Trauerweide", leaf: "long", color:["#365314","#bef264"], bark:["#424242","#212121"], growth: 1.3, weeping:true },
  jade:  { name: "Geldbaum", leaf: "fat", color:["#14532d","#22c55e"], bark:["#795548","#5d4037"], growth: 0.7 },
  blue:  { name: "Blue Mystique", leaf: "maple", color:["#1e3a8a","#60a5fa"], bark:["#263238","#102027"], growth: 1.1 },
  hemp:  { name: "Green Power", leaf: "hemp", color:["#1a2e05","#84cc16"], bark:["#33691E","#1B5E20"], growth: 1.5 },
};

const ITEMS = {
  pot_basic: { type:'pot', name:"Plastiktopf", cost:0, bonus:1.0 },
  pot_clay:  { type:'pot', name:"Terrakotta", cost:300, bonus:1.1 },
  pot_zen:   { type:'pot', name:"Zen Schale", cost:900, bonus:1.25 },
  soil_basic:{ type:'soil', name:"Blumenerde", cost:0, boost:1.0 },
  soil_aka:  { type:'soil', name:"Akadama", cost:200, boost:1.3 },
  soil_bio:  { type:'soil', name:"Bio-Boost", cost:500, boost:2.0 }
};

const SETTINGS = { secPerDay: 60, growMult: 1.0, timeWarp: 1.0, windSpeed: 1.0, maxLeaves: 30 };

let STATE = {
  money: 500,
  trees: [],
  activeIdx: 0,
  inventory: { pots:['pot_basic'], soils:['soil_basic'] },
  quests: []
};

// Tree Logic
class Branch {
  constructor(parent, x, y, angle, maxLen, thick, depth) {
    this.parent = parent; this.depth = depth || 0;
    this.x=x; this.y=y; this.endX=x; this.endY=y;
    this.angle=angle; this.targetAngle=angle;
    this.len=0.1; this.maxLen=maxLen; this.thick=thick;
    this.children=[]; this.leaves=[];
    this.cut=false; this.sprouted=false; this.grafted=false;
    this.windPhase = Math.random()*10;
  }
  serialize() { return { 
    x:this.x, y:this.y, a:this.angle, ta:this.targetAngle, l:this.len, ml:this.maxLen, 
    th:this.thick, d:this.depth, cut:this.cut, spr:this.sprouted, gr:this.grafted,
    leaves: this.leaves,
    c:this.children.map(c=>c.serialize()) 
  };}
  static deserialize(d, p) {
    let b = new Branch(p, d.x, d.y, d.a, d.ml, d.th, d.d);
    b.len=d.l; b.targetAngle=d.ta; b.cut=d.cut; b.sprouted=d.spr; b.grafted=d.gr;
    if(d.leaves) b.leaves = d.leaves;
    if(d.c) b.children=d.c.map(cd=>Branch.deserialize(cd, b));
    return b;
  }
}

class Tree {
  constructor(key, name) {
    this.key=key; this.name=name; this.days=0; this.water=100; this.hp=100;
    this.pot='pot_basic'; this.soil='soil_basic';
    this.root = new Branch(null, 0, 0, -Math.PI/2, 110, 20, 0);
  }
}

let ENV = { dayTime:0.3, clouds:[], stars:Array.from({length:60},()=>({x:Math.random(),y:Math.random(),s:Math.random()*1.5})) };
let CAM = { x:0, y:0, zoom:1.0 };
let MOUSE = { drag:false }, INPUT="none", HOVER=null;

function init() {
  resize(); 
  window.addEventListener('resize', resize);
  loadGame();
  if(!STATE.trees.length) STATE.trees.push(new Tree('ficus', "Erster Bonsai"));
  generateQuests();
  CAM.x = cv.width/2; CAM.y = cv.height*0.75;
  
  updateListUI();
  updateRealtimeUI();
  
  lastT = performance.now();
  requestAnimationFrame(loop);
}

function update(dt) {
  const tree = STATE.trees[STATE.activeIdx];
  if(!tree) return;
  const spec = SPECIES[tree.key];
  const soil = ITEMS[tree.soil] || ITEMS['soil_basic'];
  
  ENV.dayTime += (dt/SETTINGS.secPerDay)*SETTINGS.timeWarp;
  if(ENV.dayTime>1) { ENV.dayTime-=1; tree.days++; updateListUI(); }
  
  if(tree.water>0) tree.water -= (5*soil.boost/SETTINGS.secPerDay)*dt;
  const growth = (tree.water>0?1:0) * spec.growth * soil.boost * SETTINGS.growMult;

  // Cloud Spawning
  if(ENV.clouds.length<5 && Math.random()<0.01) ENV.clouds.push({x:-200, y:Math.random()*300, s:1+Math.random(), v:0.2+Math.random()*0.3});

  // Tree Sim
  function sim(b, rx, ry) {
    if(!b.parent) { b.x=rx; b.y=ry; } else { b.x=b.parent.endX; b.y=b.parent.endY; }
    b.angle += (b.targetAngle-b.angle)*3*dt;
    
    if(!b.cut && b.len<b.maxLen) {
      b.len += 8*dt*growth;
      if(b.len>15) b.thick += 0.1*dt*growth;
      
      // LEAF LOGIC: Only upper part (85%+)
      const thresh = b.maxLen*0.85;
      if(b.depth>0 && b.len>thresh) {
         if(b.leaves.length < SETTINGS.maxLeaves && Math.random()<0.1) {
            b.leaves.push({ f:0.85+Math.random()*0.15, r:Math.random()*6.28, s:0.1, ms:8+Math.random()*6 });
         }
      }
      
      if(b.len>b.maxLen*0.6 && !b.sprouted && b.thick>3.0) {
         if(Math.random()<0.03*growth) {
            b.sprouted=true;
            let cnt=(Math.random()>0.4)?2:1;
            for(let i=0;i<cnt;i++) {
               let dev = (Math.random()-0.5)*1.5;
               if(spec.weeping) dev=Math.abs(dev)+1.2;
               b.children.push(new Branch(b,0,0,b.angle+dev, b.maxLen*(0.6+Math.random()*0.3), b.thick*0.7, b.depth+1));
            }
         }
      }
    }
    for(let l of b.leaves) if(l.s < l.ms) l.s += 10*dt; 
    
    // Wind
    const sway = Math.sin(Date.now()*0.002+b.windPhase)*SETTINGS.windSpeed * (0.05*b.len)/(Math.max(1,b.thick));
    b.endX = b.x + Math.cos(b.angle+sway)*b.len;
    b.endY = b.y + Math.sin(b.angle+sway)*b.len;
    b.children.forEach(c=>sim(c,0,0));
  }
  sim(tree.root, 0, 0);
}

// ---------------- RENDER ----------------
function draw() {
  const w=cv.width, h=cv.height, t=ENV.dayTime;
  
  // Sky
  const sky=[[10,15,30],[255,150,100],[135,206,250],[50,30,80]];
  let si = Math.floor(t * 4) % 4, ni = (si + 1) % 4, f = (t * 4) % 1;
  const mix=(a,b)=>Math.round(a+(b-a)*f);
  const col=`rgb(${mix(sky[si][0],sky[ni][0])},${mix(sky[si][1],sky[ni][1])},${mix(sky[si][2],sky[ni][2])})`;
  const grd=ctx.createLinearGradient(0,0,0,h);
  grd.addColorStop(0,col); grd.addColorStop(1,"#ffffff");
  ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);

  // Stars
  if(t<0.25 || t>0.75) {
     ctx.fillStyle="#fff";
     ENV.stars.forEach(s=>{ 
       ctx.globalAlpha=(t<0.25?1-t*4:(t-0.75)*4)*Math.random(); 
       ctx.beginPath(); ctx.arc(s.x*w, s.y*h*0.6, s.s,0,6.28); ctx.fill();
     });
     ctx.globalAlpha=1;
  }

  // Sun/Moon
  const cx=w/2, cy=h+400, r=h+250, ang=(t-0.5)*Math.PI;
  ctx.shadowBlur=50; ctx.shadowColor="gold"; ctx.fillStyle="#fbbf24"; // Sun
  ctx.beginPath(); ctx.arc(cx+Math.sin(ang)*r, cy+Math.cos(ang)*r, 50,0,6.28); ctx.fill();
  ctx.shadowBlur=30; ctx.shadowColor="#fff"; ctx.fillStyle="#e2e8f0"; // Moon
  ctx.beginPath(); ctx.arc(cx+Math.sin(ang+Math.PI)*r, cy+Math.cos(ang+Math.PI)*r, 40,0,6.28); ctx.fill();
  ctx.shadowBlur=0;

  // Clouds
  ctx.fillStyle="rgba(255,255,255,0.4)";
  ENV.clouds.forEach(c=>{
     c.x+=c.v; if(c.x>w+200) c.x=-200;
     drawPuff(c.x,c.y,c.s);
  });

  // Mountains
  ctx.fillStyle="#0f172a";
  ctx.beginPath(); ctx.moveTo(0,h);
  for(let x=0;x<=w;x+=20) ctx.lineTo(x, h*0.6 - Math.abs(Math.sin(x*0.003)*100 + Math.cos(x*0.01)*30));
  ctx.lineTo(w,h); ctx.fill();
  ctx.fillStyle="#1e293b";
  ctx.beginPath(); ctx.moveTo(0,h);
  for(let x=0;x<=w;x+=30) ctx.lineTo(x, h*0.75 - Math.abs(Math.sin(x*0.005)*50 + Math.cos(x*0.02)*20));
  ctx.lineTo(w,h); ctx.fill();

  // World (Cam)
  ctx.save();
  ctx.translate(CAM.x, CAM.y);
  ctx.scale(CAM.zoom, CAM.zoom);
  drawWorld();
  ctx.restore();
}

function drawPuff(x,y,s) {
  ctx.beginPath();
  ctx.arc(x,y,30*s,0,6.28); ctx.arc(x+25*s,y-10*s,35*s,0,6.28); ctx.arc(x+50*s,y+5*s,25*s,0,6.28);
  ctx.fill();
}

// ---------------- THE NEW DRAW LOGIC ----------------
function drawWorld() {
  const t=STATE.trees[STATE.activeIdx];
  if(!t) return;
  const spec=SPECIES[t.key], potH=70;
  
  // Pot Back
  ctx.fillStyle="#27272a"; ctx.beginPath(); ctx.ellipse(0,0,90,25,0,0,6.28); ctx.fill();
  ctx.fillStyle="#3e2723"; ctx.beginPath(); ctx.ellipse(0,0,82,20,0,0,6.28); ctx.fill();

  // Recursive Tree
  ctx.lineCap="round";
  function render(b) {
    if(b.len<1) return;
    
    // Branch
    ctx.lineWidth=b.thick; ctx.strokeStyle=spec.bark[0];
    if(b===HOVER) ctx.strokeStyle = (INPUT==='prune'?'#f87171':INPUT==='graft'?'#60a5fa':INPUT==='bend'?'#facc15':'#fff');
    ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.endX, b.endY); ctx.stroke();
    
    // Details
    if(b.cut) { ctx.fillStyle="#aaa"; ctx.beginPath(); ctx.arc(b.endX,b.endY,b.thick*0.4,0,6.28); ctx.fill(); }
    if(b.grafted) { ctx.fillStyle="#fffc"; ctx.beginPath(); ctx.arc(b.x,b.y,b.thick*0.6,0,6.28); ctx.fill(); }

    // LEAVES - NEW STYLE
    if(!b.cut && b.leaves.length) {
       const sIdx = Math.floor(t.days/30)%4; 
       let cols = spec.color;
       if(sIdx===2 && spec.leaf!=='needle') cols = ["#b45309", "#d97706"]; // Fall
       
       for(let l of b.leaves) {
          ctx.save();
          const px=b.x+(b.endX-b.x)*l.f, py=b.y+(b.endY-b.y)*l.f;
          ctx.translate(px,py);
          ctx.rotate(b.angle + l.r); 
          
          if(spec.leaf === 'needle') {
             ctx.strokeStyle=cols[0];
             for(let i=0;i<5;i++) { ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo((Math.random()-0.5)*l.s*3, -l.s*2); ctx.stroke(); }
          } else {
             // 1. Base Darker
             ctx.fillStyle = cols[0];
             ctx.beginPath();
             ctx.ellipse(l.s, 0, l.s, l.s*(spec.leaf==='fat'?0.5:0.4), 0,0,6.28);
             ctx.fill();
             
             // 2. Highlight/Vein Lighter
             ctx.fillStyle = cols[1];
             ctx.beginPath();
             ctx.ellipse(l.s, 0, l.s*0.6, l.s*0.15, 0,0,6.28);
             ctx.fill();
          }
          ctx.restore();
       }
    }
    b.children.forEach(render);
  }
  render(t.root);

  // Pot Front
  const pg=ctx.createLinearGradient(0,0,0,potH);
  pg.addColorStop(0,"#444"); pg.addColorStop(1,"#111");
  if(t.pot==='pot_clay') { pg.addColorStop(0,"#8d6e63"); pg.addColorStop(1,"#3e2723"); }
  else if(t.pot==='pot_zen') { pg.addColorStop(0,"#1e293b"); pg.addColorStop(1,"#020617"); }
  ctx.fillStyle=pg;
  ctx.beginPath(); ctx.moveTo(-90,0); 
  ctx.quadraticCurveTo(-90,potH, -60,potH); ctx.lineTo(60,potH); 
  ctx.quadraticCurveTo(90,potH, 90,0); ctx.fill();
}

let lastT=0;
let lastUiT=0;
function loop(now) {
  if(!now) now = performance.now();
  let dt = (now-lastT)/1000; 
  if(dt>0.1) dt=0.1; 
  lastT=now;
  
  update(dt); 
  draw();
  
  if(now - lastUiT > 500) { 
     updateRealtimeUI();
     lastUiT = now;
  }
  
  requestAnimationFrame(loop);
}

// ---------------- SYSTEM ----------------
function generateQuests() {
  STATE.quests = [];
  const acts = ["water","prune","grow"];
  for(let i=0;i<3;i++) {
     let type=acts[Math.floor(Math.random()*acts.length)];
     let n = Math.floor(Math.random()*5)+3;
     STATE.quests.push({ txt:`Daily: ${type==='water'?'Gieße':'Nutze'} ${n}x`, reward: n*20, done:false });
  }
  for(let i=1;i<=5;i++) STATE.quests.push({txt:`Habe ${i} Bäume`, reward:i*200, done:false});
  updateListUI();
}

window.buy = function(what, key, cost) {
  if(STATE.money>=cost) {
     STATE.money-=cost;
     if(what==='tree') {
       if(STATE.trees.length>=10) return notify("Platz voll!");
       const t=new Tree(key, SPECIES[key].name);
       STATE.trees.push(t); STATE.activeIdx=STATE.trees.length-1;
     } else {
       STATE.inventory[what+'s'].push(key);
     }
     notify("Gekauft!"); 
     updateListUI();
  } else notify("Zu teuer!");
}

function setTool(t) { 
  INPUT = (INPUT===t ? 'none' : t); 
  document.querySelectorAll('.btn-grid .btn').forEach(b=>b.classList.remove('active'));
  if(INPUT!=='none') {
    let el = $('tool'+t.charAt(0).toUpperCase()+t.slice(1));
    if(el) el.classList.add('active');
  }
  notify(INPUT === 'none' ? 'Werkzeug abgewählt' : INPUT);
}

function handleInput(mx, my, isClick) {
  const world = { x: (mx-CAM.x)/CAM.zoom, y: (my-CAM.y)/CAM.zoom };
  let best=null, dist=9999;
  const t = STATE.trees[STATE.activeIdx];
  if(!t) return;
  
  function walk(b) {
     const cx=(b.x+b.endX)/2, cy=(b.y+b.endY)/2;
     const d=(cx-world.x)**2+(cy-world.y)**2;
     if(d < 400 * Math.max(1,b.thick) && d<dist) { dist=d; best=b; }
     b.children.forEach(walk);
  }
  walk(t.root);
  
  if(isClick && best) {
     if(INPUT==='water') { t.water=100; notify("Gegossen"); }
     else if(INPUT==='prune') { best.cut=true; best.leaves=[]; best.children=[]; notify("Schnipp!"); }
     else if(INPUT==='graft') { 
        if(best.cut && !best.grafted) {
           best.grafted=true; best.cut=false; 
           best.children.push(new Branch(best,0,0, best.angle-0.5, 30, best.thick*0.8, best.depth+1));
           best.children.push(new Branch(best,0,0, best.angle+0.5, 30, best.thick*0.8, best.depth+1));
           notify("Veredelt");
        } else notify("Geht hier nicht");
     }
     else if(INPUT==='bend') { best.targetAngle+=0.3; }
  }
  HOVER = best;
}

// EVENTS
cv.onmousedown = e => { 
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  if(INPUT==='none') MOUSE.drag=true; 
  else handleInput(mx, my, true); 
};
cv.onmousemove = e => { 
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  if(MOUSE.drag){ CAM.x+=e.movementX; CAM.y+=e.movementY; } 
  else if(INPUT!=='none') { handleInput(mx, my, false); cv.style.cursor=HOVER?'crosshair':'default'; } 
};
window.onmouseup=()=>MOUSE.drag=false;
cv.onwheel=e=>{ 
  e.preventDefault(); 
  CAM.zoom = Math.min(Math.max(0.5, CAM.zoom - e.deltaY*0.001), 4);
};

// UI DOM UPDATES
function notify(m) { 
  const t=$('toast'); t.innerText=m; t.style.opacity=1; 
  setTimeout(()=>t.style.opacity=0,2000); 
}

function updateRealtimeUI() {
  const t = STATE.trees[STATE.activeIdx];
  if(!t) return;
  
  $('uiDay').innerText="Tag "+t.days;
  
  const seasons = ["Frühling", "Sommer", "Herbst", "Winter"];
  const seasonColors = ["#4ade80", "#fbbf24", "#d97706", "#94a3b8"];
  const sIdx = Math.floor(t.days/30)%4;
  $('uiSeason').innerText = seasons[sIdx];
  $('uiSeason').style.color = seasonColors[sIdx];
  
  let w = Math.max(0, Math.min(100, t.water));
  $('barWater').style.width = w+"%";
  $('uiWaterVal').innerText = Math.round(w)+"%";
  
  let hp = Math.max(0, Math.min(100, t.hp));
  $('barHp').style.width = hp+"%";
  $('uiHpVal').innerText = Math.round(hp)+"%";
}

window.updateListUI = function() {
  // Collection
  let h="";
  STATE.trees.forEach((t,i)=>{
     h += `<div class="list-item" onclick="STATE.activeIdx=${i};updateListUI()" style="border-color:${i===STATE.activeIdx?'var(--accent)':'transparent'}; background:${i===STATE.activeIdx?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.03)'}">
        <div style="background:${SPECIES[t.key].color[0]}; width:30px; height:30px; border-radius:50%"></div>
        <div><b>${t.name}</b><br><small>${SPECIES[t.key].name}</small></div>
     </div>`;
  });
  $('collectionList').innerHTML = h; 
  if(STATE.trees[STATE.activeIdx]) {
      $('uiTreeName').innerText = STATE.trees[STATE.activeIdx].name;
      $('uiSpeciesName').innerText = SPECIES[STATE.trees[STATE.activeIdx].key].name;
  }
  
  $('shopMoney').innerText = STATE.money;
  
  // Shop Töpfe
  let potsHtml = "";
  Object.keys(ITEMS).forEach(k => {
     if(ITEMS[k].type !== 'pot') return;
     let item = ITEMS[k];
     let owned = STATE.inventory.pots.includes(k);
     let isActive = STATE.trees[STATE.activeIdx] && STATE.trees[STATE.activeIdx].pot === k;
     potsHtml += `<div class="list-item">
        <div style="flex:1"><b>${item.name}</b><br><small style="color:var(--text-muted)">Wachstum: +${Math.round((item.bonus-1)*100)}%</small></div>
        ${owned 
           ? `<button class="btn ${isActive?'active':''}" style="padding:6px 10px; font-size:11px" onclick="STATE.trees[STATE.activeIdx].pot='${k}'; updateListUI()">Nutzen</button>` 
           : `<button class="btn" style="padding:6px 10px; font-size:11px; background:var(--gold); color:#000" onclick="buy('pot', '${k}', ${item.cost})">${item.cost} 💰</button>`
        }
     </div>`;
  });
  $('shopPotsList').innerHTML = potsHtml;

  // Shop Erde
  let soilsHtml = "";
  Object.keys(ITEMS).forEach(k => {
     if(ITEMS[k].type !== 'soil') return;
     let item = ITEMS[k];
     let owned = STATE.inventory.soils.includes(k);
     let isActive = STATE.trees[STATE.activeIdx] && STATE.trees[STATE.activeIdx].soil === k;
     soilsHtml += `<div class="list-item">
        <div style="flex:1"><b>${item.name}</b><br><small style="color:var(--text-muted)">Speed: +${Math.round((item.boost-1)*100)}%</small></div>
        ${owned 
           ? `<button class="btn ${isActive?'active':''}" style="padding:6px 10px; font-size:11px" onclick="STATE.trees[STATE.activeIdx].soil='${k}'; updateListUI()">Nutzen</button>` 
           : `<button class="btn" style="padding:6px 10px; font-size:11px; background:var(--gold); color:#000" onclick="buy('soil', '${k}', ${item.cost})">${item.cost} 💰</button>`
        }
     </div>`;
  });
  $('shopSoilsList').innerHTML = soilsHtml;

  // Quests
  let qHtml = "";
  STATE.quests.forEach((q, i) => {
     qHtml += `<div class="list-item">
        <div style="flex:1; opacity:${q.done?0.5:1}"><b>${q.txt}</b></div>
        ${q.done 
           ? `<span class="tag">Fertig</span>` 
           : `<button class="btn" style="padding:6px 10px; font-size:11px; background:var(--success); color:#000" onclick="claimQuest(${i})">${q.reward} 💰</button>`
        }
     </div>`;
  });
  $('questList').innerHTML = qHtml;
}

window.claimQuest = function(idx) {
  if(!STATE.quests[idx].done) {
     STATE.quests[idx].done = true;
     STATE.money += STATE.quests[idx].reward;
     notify(`+${STATE.quests[idx].reward} 💰`);
     updateListUI();
  }
};

function saveGame() { localStorage.setItem("bonsai_v31", JSON.stringify({money:STATE.money, activeIdx:STATE.activeIdx, inv:STATE.inventory, trees:STATE.trees.map(t=>({...t, root:t.root.serialize()})) })); }
function loadGame() {
  try {
    const d=JSON.parse(localStorage.getItem("bonsai_v31"));
    if(d) {
       STATE.money=d.money ?? 500; 
       STATE.inventory=d.inv || STATE.inventory;
       STATE.activeIdx=d.activeIdx || 0;
       STATE.trees=d.trees.map(td=>{
          let t=new Tree(td.key, td.name);
          Object.assign(t, td); t.root = Branch.deserialize(td.root, null);
          return t;
       });
    }
  } catch(e) {}
}
window.hardReset = () => { localStorage.removeItem("bonsai_v31"); location.reload(); };
setInterval(saveGame, 5000);

// BINDINGS
document.querySelectorAll('.tab-btn').forEach(b=>{ 
  if(!b.dataset.target) return;
  b.onclick=()=>{ 
    const t=$(b.dataset.target); 
    document.querySelectorAll('.overlay-panel').forEach(p=>{if(p!==t)p.classList.remove('open')}); 
    t.classList.toggle('open'); 
    updateListUI(); 
  }
});

['Water','Prune','Graft','Bend'].forEach(t=>$('tool'+t).onclick=()=>setTool(t.toLowerCase()));

$('inpSecPerDay').oninput=e=>SETTINGS.secPerDay=parseFloat(e.target.value);
$('inpGrowMult').oninput=e=>SETTINGS.growMult=parseFloat(e.target.value);
$('inpLeafLimit').oninput=e=>SETTINGS.maxLeaves=parseInt(e.target.value);
$('inpWind').oninput=e=>SETTINGS.windSpeed=parseFloat(e.target.value);

$('btnBuyTree').onclick=()=>{
   buy('tree', Object.keys(SPECIES)[Math.floor(Math.random()*Object.keys(SPECIES).length)], 100);
}
$('btnPhoto').onclick=()=>{
   let a=document.createElement('a'); a.download="bonsai.png"; a.href=cv.toDataURL(); a.click();
};

function resize() { cv.width=$('viewport').clientWidth; cv.height=$('viewport').clientHeight; }

// SPIEL STARTEN
init();

})();
</script>
