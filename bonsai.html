<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bonsai Master v7.0 (Legacy & Progress)</title>
<style>
  :root {
    --accent: #38bdf8; --accent-glow: rgba(56, 189, 248, 0.6);
    --success: #34d399; --success-glow: rgba(52, 211, 153, 0.6);
    --gold: #fbbf24; --gold-glow: rgba(251, 191, 36, 0.5);
    --text: #ffffff; --text-muted: #94a3b8;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    --glass-bg: rgba(15, 20, 30, 0.45);
    --glass-border: rgba(255, 255, 255, 0.15);
  }
  
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; height: 100dvh; background: #000; overflow: hidden; font-family: var(--font); color: var(--text); user-select: none; }
  
  .viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }

  .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
  .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); pointer-events: auto; }

  .tree-header { margin: env(safe-area-inset-top, 20px) 20px 0 20px; padding: 8px 16px; border-radius: 18px; align-self: flex-start; }
  .tree-header h1 { margin: 0; font-size: 16px; font-weight: 700; }
  .tree-header p { margin: 0; font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 600; }

  .bottom-area { padding: 0 12px calc(75px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 8px; }
  .stats-panel { border-radius: 20px; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .stat-row-top { display: flex; justify-content: space-between; }
  .stat-group { display: flex; gap: 15px; }
  .s-label { font-size: 9px; color: rgba(255,255,255,0.6); text-transform: uppercase; font-weight: 700; }
  .s-val { font-size: 13px; font-weight: 600; }
  
  .stat-row-bars { display: flex; gap: 10px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .bar-bg { width: 100%; height: 5px; border-radius: 3px; background: rgba(0,0,0,0.4); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
  .bar-fill { height: 100%; transition: width 0.4s ease; }
  .water-color { background: linear-gradient(90deg, #0ea5e9, #38bdf8); box-shadow: 0 0 10px var(--accent-glow); }
  .hp-color { background: linear-gradient(90deg, #10b981, #34d399); box-shadow: 0 0 10px var(--success-glow); }

  .tools-panel { border-radius: 20px; padding: 12px 16px; }
  .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 10px 2px; border-radius: 14px; font-size: 9px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; font-family: inherit; font-weight: 600; }
  .btn svg { width: 18px; height: 18px; opacity: 0.7; }
  .btn.active { background: rgba(56, 189, 248, 0.2); border-color: var(--accent); }
  .btn.active svg { opacity: 1; filter: drop-shadow(0 0 5px var(--accent)); }

  .bottom-dock { position: absolute; bottom: env(safe-area-inset-bottom, 10px); left: 50%; transform: translateX(-50%); width: calc(100% - 24px); border-radius: 25px; display: flex; justify-content: space-around; padding: 8px; }
  .nav-item { background: transparent; border: none; color: rgba(255,255,255,0.5); display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 9px; font-weight: 600; cursor: pointer; }
  .nav-item svg { width: 20px; height: 20px; }
  .nav-item.open { color: var(--accent); }

  .overlay-sheet { position: fixed; bottom: 0; left: 0; width: 100%; max-height: 85vh; background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border-radius: 32px 32px 0 0; padding: 30px 20px; z-index: 50; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); overflow-y: auto; pointer-events: auto; }
  .overlay-sheet.open { transform: translateY(0); }
  .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 40; opacity: 0; pointer-events: none; transition: 0.3s; }
  .overlay-bg.open { opacity: 1; pointer-events: auto; }

  /* New List Item with Preview */
  .list-item { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); padding: 12px; margin-bottom: 10px; border-radius: 18px; border: 1px solid var(--glass-border); position: relative; }
  .tree-preview { width: 45px; height: 45px; border-radius: 12px; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
  .tree-preview canvas { width: 80% !important; height: 80% !important; }
  .list-content { flex: 1; }
  .list-title { display: block; font-size: 14px; font-weight: 700; }
  .list-sub { display: block; font-size: 11px; color: var(--text-muted); }
  
  .quest-btn { padding: 8px 15px; border-radius: 12px; border: none; font-weight: 700; font-size: 12px; background: rgba(255,255,255,0.1); color: var(--text-muted); }
  .quest-btn.ready { background: var(--success); color: #000; box-shadow: 0 0 15px var(--success-glow); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

  .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
  .badge { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 15px; padding: 10px; text-align: center; opacity: 0.3; filter: grayscale(1); }
  .badge.unlocked { opacity: 1; filter: grayscale(0); border-color: var(--gold); background: rgba(251, 191, 36, 0.05); }
  .badge-icon { font-size: 24px; margin-bottom: 5px; display: block; }
  .badge-name { font-size: 10px; font-weight: 700; display: block; }

  .toast { position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: rgba(10,15,25,0.9); color: var(--gold); padding: 12px 25px; border-radius: 20px; font-weight: 700; opacity: 0; transition: 0.4s; z-index: 100; border: 1px solid var(--gold); }
  .toast.show { opacity: 1; transform: translate(-50%, 10px); }
</style>
</head>
<body>

<div class="viewport" id="viewport"><canvas id="cv"></canvas><div id="toast" class="toast"></div></div>

<div class="ui-layer">
  <div class="tree-header glass"><h1 id="uiTreeName">Baum</h1><p id="uiSpeciesName">Spezies</p></div>
  <div class="bottom-area">
    <div class="stats-panel glass">
      <div class="stat-row-top"><div class="stat-group"><div class="stat-item"><span class="s-label">Alter</span><span class="s-val" id="uiDay">Tag 0</span></div><div class="stat-item"><span class="s-label">Saison</span><span class="s-val" id="uiSeason">Frühling</span></div></div></div>
      <div class="stat-row-bars">
        <div class="bar-wrap"><div class="bar-header"><span class="s-label">Wasser</span><span class="s-label" id="uiWaterVal">100%</span></div><div class="bar-bg"><div class="bar-fill water-color" id="barWater"></div></div></div>
        <div class="bar-wrap"><div class="bar-header"><span class="s-label">Vitalität</span><span class="s-label" id="uiHpVal">100%</span></div><div class="bar-bg"><div class="bar-fill hp-color" id="barHp"></div></div></div>
      </div>
    </div>
    <div class="tools-panel glass"><div class="btn-grid">
      <button class="btn" id="toolWater"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>Gießen</button>
      <button class="btn" id="toolPrune"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>Schnitt</button>
      <button class="btn" id="toolGraft"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>Veredeln</button>
      <button class="btn" id="toolBend"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12c12 0 11 9 18 9"/></svg>Biegen</button>
    </div></div>
  </div>
  <div class="bottom-dock glass">
    <button class="nav-item tab-btn" data-target="panel_collection"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22h20L12 2z"/></svg>Bäume</button>
    <button class="nav-item tab-btn" data-target="panel_shop"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Shop</button>
    <button class="nav-item tab-btn" data-target="panel_quests"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Ziele</button>
    <button class="nav-item tab-btn" data-target="panel_settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>System</button>
  </div>
</div>

<div class="overlay-bg" id="overlayBg"></div>
<div class="overlay-sheet" id="panel_collection"><div class="sheet-header"><h2>Baumschule</h2><button class="close-btn" onclick="closeAllPanels()">✕</button></div><div id="collectionList"></div></div>
<div class="overlay-sheet" id="panel_shop"><div class="sheet-header"><h2>Zen Shop</h2><button class="close-btn" onclick="closeAllPanels()">✕</button></div><div id="shopMoneyDisplay" style="margin-bottom:15px; color:var(--gold); font-weight:700;">Guthaben: 0 💰</div><div id="shopPotsList"></div><div id="shopSoilsList"></div></div>
<div class="overlay-sheet" id="panel_quests">
  <div class="sheet-header"><h2>Deine Reise</h2><button class="close-btn" onclick="closeAllPanels()">✕</button></div>
  <div class="s-label">Tägliche Aufgaben</div><div id="questList" style="margin-top:10px"></div>
  <div class="s-label" style="margin-top:25px">Medaillen</div><div class="badge-grid" id="badgeGrid"></div>
</div>
<div class="overlay-sheet" id="panel_settings"><div class="sheet-header"><h2>Natur Kontrolle</h2><button class="close-btn" onclick="closeAllPanels()">✕</button></div><div id="settingsGrid"></div><button class="btn" onclick="hardReset()" style="margin-top:20px; width:100%; border-color:#ef4444; color:#ef4444">Daten Löschen</button></div>

<script>
(function(){
const $ = id => document.getElementById(id);
const cv = $('cv');
const ctx = cv.getContext('2d', {alpha: false});

const SPECIES = {
  ficus: { name: "Ficus Retusa", leaf: "oval", color:["#166534","#4ade80"], bark:["#5D4037","#3E2723"], growth: 1.0, cost: 0 },
  pine:  { name: "Schwarzkiefer", leaf: "needle", color:["#064e3b","#10b981"], bark:["#424242","#212121"], growth: 0.6, cost: 300 },
  maple: { name: "Roter Ahorn", leaf: "maple", color:["#7f1d1d","#ef4444"], bark:["#5d4037","#3e2723"], growth: 0.8, cost: 500 },
  sakura:{ name: "Sakura Kirsche", leaf: "oval", color:["#be185d","#f9a8d4"], bark:["#5d4037","#3e2723"], growth: 0.9, cost: 800 },
  willow:{ name: "Trauerweide", leaf: "long", color:["#365314","#bef264"], bark:["#424242","#212121"], growth: 1.3, weeping:true, cost: 1200 },
  jade:  { name: "Geldbaum", leaf: "fat", color:["#14532d","#22c55e"], bark:["#795548","#5d4037"], growth: 0.7, cost: 1500 },
  blue:  { name: "Blue Mystique", leaf: "maple", color:["#1e3a8a","#60a5fa"], bark:["#263238","#102027"], growth: 1.1, cost: 2000 },
  hemp:  { name: "Green Power", leaf: "hemp", color:["#1a2e05","#84cc16"], bark:["#33691E","#1B5E20"], growth: 1.5, cost: 4200 },
};

const ITEMS = {
  pot_clay:  { type:'pot', name:"Terrakotta", cost:300, bonus:1.1 },
  pot_zen:   { type:'pot', name:"Zen Schale", cost:900, bonus:1.25 },
  soil_aka:  { type:'soil', name:"Akadama", cost:200, boost:1.3 },
  soil_bio:  { type:'soil', name:"Bio-Boost", cost:500, boost:2.0 }
};

let SETTINGS = { secPerDay:60, growMult:1.0, thickMult:1.0, sproutChance:0.03, maxLeaves:30, leafRate:0.1, leafSizeMult:1.0, waterDrain:5.0, windSpeed:0.3, windSway:0.05, timeWarp:1.0 };
let STATE = { money: 500, trees: [], activeIdx: 0, inventory: { pots:['pot_basic'], soils:['soil_basic'], species:['ficus'] }, stats: { totalWaters:0, totalPrunes:0, totalDays:0 }, quests: [] };

class Branch {
  constructor(p, x, y, a, ml, th, d) { this.parent=p; this.x=x; this.y=y; this.endX=x; this.endY=y; this.angle=a; this.targetAngle=a; this.len=0.1; this.maxLen=ml; this.thick=th; this.depth=d; this.children=[]; this.leaves=[]; this.cut=false; this.sprouted=false; this.grafted=false; this.windPhase=Math.random()*10; }
  serialize() { return { x:this.x, y:this.y, a:this.angle, ta:this.targetAngle, l:this.len, ml:this.maxLen, th:this.thick, d:this.depth, cut:this.cut, spr:this.sprouted, gr:this.grafted, leaves:this.leaves, c:this.children.map(c=>c.serialize()) }; }
  static deserialize(d, p) { let b=new Branch(p,d.x,d.y,d.a,d.ml,d.th,d.d); b.len=d.l; b.targetAngle=d.ta; b.cut=d.cut; b.sprouted=d.spr; b.grafted=d.gr; b.leaves=d.leaves||[]; if(d.c) b.children=d.c.map(cd=>Branch.deserialize(cd,b)); return b; }
}

class Tree { constructor(k, n) { this.key=k; this.name=n; this.days=0; this.water=100; this.hp=100; this.pot='pot_basic'; this.soil='soil_basic'; this.root=new Branch(null,0,0,-Math.PI/2,110,20,0); } }

let ENV = { dayTime:0.3, clouds:[], particles:[] };
let CAM = { x:0, y:0, zoom:1.0 };
let MOUSE = { drag:false, x:0, y:0, worldX:0, worldY:0 };
let INPUT="none", HOVER=null, BEND_TARGET=null, WATERING=false;

function init() {
  loadGame();
  if(!STATE.trees.length) STATE.trees.push(new Tree('ficus', "Erster Bonsai"));
  if(STATE.quests.length === 0) generateQuests();
  
  const ro = new ResizeObserver(entries => { for(let e of entries) { if(e.contentRect.width>0) { cv.width=e.contentRect.width; cv.height=e.contentRect.height; } } });
  ro.observe($('viewport'));
  updateListUI();
  updateRealtimeUI();
  requestAnimationFrame(loop);
}

function loop(t) {
  let dt = (t - (lastT||t))/1000; if(dt>0.1) dt=0.1; lastT=t;
  update(dt); draw();
  if(t - (lastUiT||0) > 500) { updateRealtimeUI(); lastUiT=t; }
  requestAnimationFrame(loop);
}

function update(dt) {
  const tree = STATE.trees[STATE.activeIdx]; if(!tree) return;
  const spec = SPECIES[tree.key];
  const soil = ITEMS[tree.soil] || {boost:1};
  const pot = ITEMS[tree.pot] || {bonus:1};
  
  ENV.dayTime += (dt/SETTINGS.secPerDay)*SETTINGS.timeWarp;
  if(ENV.dayTime>1) { ENV.dayTime-=1; tree.days++; STATE.stats.totalDays++; updateListUI(); }
  if(tree.water>0) tree.water -= (SETTINGS.waterDrain * soil.boost / SETTINGS.secPerDay) * dt;
  const growth = (tree.water>0?1:0) * spec.growth * soil.boost * pot.bonus * SETTINGS.growMult;

  if(WATERING && INPUT === 'water') {
    for(let i=0; i<3; i++) ENV.particles.push({ x:MOUSE.worldX+(Math.random()-0.5)*30, y:Math.min(MOUSE.worldY,-50)+(Math.random()-0.5)*10, vx:(Math.random()-0.5)*15, vy:120+Math.random()*80, life:2.0 });
  }
  for(let i=ENV.particles.length-1; i>=0; i--) {
    let p=ENV.particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    if(p.y>0 && p.y<70 && p.x>-90 && p.x<90) { tree.water=Math.min(100, tree.water+0.5); STATE.stats.totalWaters+=0.05; ENV.particles.splice(i,1); }
    else if(p.life<=0) ENV.particles.splice(i,1);
  }

  function sim(b, rx, ry) {
    if(!b.parent) { b.x=rx; b.y=ry; } else { b.x=b.parent.endX; b.y=b.parent.endY; }
    b.angle += (b.targetAngle-b.angle)*3*dt;
    if(!b.cut && b.len<b.maxLen) {
      b.len += 8*dt*growth;
      if(b.len>15) b.thick += 0.1 * dt * growth * SETTINGS.thickMult;
      if(b.depth>0 && b.len>b.maxLen*0.85 && b.leaves.length < SETTINGS.maxLeaves && Math.random() < SETTINGS.leafRate) b.leaves.push({ f:0.85+Math.random()*0.15, r:Math.random()*6.28, s:0.1, ms:(8+Math.random()*6)*SETTINGS.leafSizeMult });
      if(b.len>b.maxLen*0.6 && !b.sprouted && b.thick>3.0 && Math.random() < SETTINGS.sproutChance * growth) {
        b.sprouted=true; let cnt=Math.random()>0.4?2:1;
        for(let i=0;i<cnt;i++) b.children.push(new Branch(b,0,0,b.angle+(Math.random()-0.5)*1.5, b.maxLen*(0.6+Math.random()*0.3), b.thick*0.7, b.depth+1));
      }
    }
    for(let l of b.leaves) if(l.s < l.ms) l.s += 10*dt;
    const sway = Math.sin(Date.now()*0.002*SETTINGS.windSpeed + b.windPhase) * (SETTINGS.windSway * b.len) / (Math.max(1,b.thick));
    b.endX = b.x + Math.cos(b.angle+sway)*b.len; b.endY = b.y + Math.sin(b.angle+sway)*b.len;
    b.children.forEach(c=>sim(c,0,0));
  }
  sim(tree.root, 0, 0);
  checkQuests();
}

function draw() {
  const w=cv.width, h=cv.height, t=ENV.dayTime; if(isNaN(t)) return;
  const grd=ctx.createLinearGradient(0,0,0,h); grd.addColorStop(0,"#050a19"); grd.addColorStop(1, t<0.25||t>0.75?"#020617":"#e2e8f0");
  ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);
  ctx.save(); ctx.translate(w/2+CAM.x, h*0.55+CAM.y); ctx.scale(CAM.zoom, CAM.zoom); drawWorld(); ctx.restore();
}

function drawWorld() {
  const t=STATE.trees[STATE.activeIdx]; if(!t) return;
  const spec=SPECIES[t.key];
  function render(b) {
    ctx.lineWidth=b.thick; ctx.strokeStyle=spec.bark[0];
    if(b===HOVER) { ctx.shadowBlur=10; ctx.shadowColor="#fff"; }
    ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.endX, b.endY); ctx.stroke(); ctx.shadowBlur=0;
    if(!b.cut) {
      for(let l of b.leaves) {
        ctx.save(); ctx.translate(b.x+(b.endX-b.x)*l.f, b.y+(b.endY-b.y)*l.f); ctx.rotate(b.angle+l.r);
        ctx.fillStyle=spec.color[0]; ctx.beginPath(); ctx.ellipse(l.s,0,l.s,l.s*0.5,0,0,6.28); ctx.fill();
        ctx.restore();
      }
    }
    b.children.forEach(render);
  }
  render(t.root);
  ctx.fillStyle="rgba(56,189,248,0.8)"; ENV.particles.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,3,0,6.28); ctx.fill(); });
}

function generateQuests() {
  STATE.quests = [
    { id:'q1', txt:"Gieße deinen Baum 5x", goal:5, cur:0, rew:100, done:false, coll:false },
    { id:'q2', txt:"Nutze die Schere 3x", goal:3, cur:0, rew:150, done:false, coll:false },
    { id:'q3', txt:"Erreiche Tag 5", goal:5, cur:0, rew:300, done:false, coll:false }
  ];
}

function checkQuests() {
  STATE.quests.forEach(q => {
    if(q.done) return;
    if(q.id==='q1') q.cur = Math.floor(STATE.stats.totalWaters);
    if(q.id==='q2') q.cur = STATE.stats.totalPrunes;
    if(q.id==='q3') q.cur = STATE.trees[STATE.activeIdx].days;
    if(q.cur >= q.goal) q.done = true;
  });
}

window.claimQuest = function(idx) {
  const q = STATE.quests[idx];
  if(q.done && !q.coll) {
    q.coll = true; STATE.money += q.rew;
    notify(`+${q.rew} 💰 erhalten!`); updateListUI();
  }
}

window.unlockSpecies = function(key) {
  const spec = SPECIES[key];
  if(STATE.money >= spec.cost && !STATE.inventory.species.includes(key)) {
    STATE.money -= spec.cost; STATE.inventory.species.push(key);
    notify(`${spec.name} freigeschaltet!`); updateListUI();
  }
}

window.selectTreeSpecies = function(key) {
  if(STATE.inventory.species.includes(key)) {
    const t = new Tree(key, SPECIES[key].name);
    STATE.trees.push(t); STATE.activeIdx = STATE.trees.length-1;
    closeAllPanels(); updateListUI();
  }
}

function updateListUI() {
  $('shopMoneyDisplay').innerText = `Guthaben: ${STATE.money} 💰`;
  
  // COLLECTION
  let colHtml = "";
  Object.keys(SPECIES).forEach(k => {
    const owned = STATE.inventory.species.includes(k);
    colHtml += `<div class="list-item">
      <div class="tree-preview" style="background:${SPECIES[k].bark[0]}"><div style="width:10px;height:25px;background:${SPECIES[k].bark[1]};border-radius:5px"></div></div>
      <div class="list-content"><span class="list-title">${SPECIES[k].name}</span><span class="list-sub">${owned?'Freigeschaltet':SPECIES[k].cost+' 💰'}</span></div>
      ${owned ? `<button class="quest-btn ready" onclick="selectTreeSpecies('${k}')">Wählen</button>` : `<button class="quest-btn" onclick="unlockSpecies('${k}')">Kaufen</button>`}
    </div>`;
  });
  $('collectionList').innerHTML = colHtml;

  // QUESTS
  let qHtml = "";
  STATE.quests.forEach((q, i) => {
    qHtml += `<div class="list-item">
      <div class="list-content"><span class="list-title">${q.txt}</span><span class="list-sub">Fortschritt: ${q.cur}/${q.goal}</span></div>
      <button class="quest-btn ${q.done&&!q.coll?'ready':''}" onclick="claimQuest(${i})">${q.coll?'✅':q.rew+' 💰'}</button>
    </div>`;
  });
  $('questList').innerHTML = qHtml;
  
  // BADGES
  let bHtml = "";
  const badges = [{i:'🌱',n:'Anfänger',u:STATE.stats.totalDays>=1},{i:'🧘',n:'Zen Meister',u:STATE.stats.totalDays>=10},{i:'💰',n:'Sammler',u:STATE.inventory.species.length>=3}];
  badges.forEach(b => bHtml += `<div class="badge ${b.u?'unlocked':''}"><span class="badge-icon">${b.i}</span><span class="badge-name">${b.n}</span></div>`);
  $('badgeGrid').innerHTML = bHtml;
}

// System Events & UI
let lastT=0, lastUiT=0;
window.closeAllPanels = () => { document.querySelectorAll('.overlay-sheet, .overlay-bg, .nav-item').forEach(el=>el.classList.remove('open')); };
document.querySelectorAll('.tab-btn').forEach(b => b.onclick=() => { let t=$(b.dataset.target); let open=t.classList.contains('open'); closeAllPanels(); if(!open){t.classList.add('open');$('overlayBg').classList.add('open');b.classList.add('open');} });
['Water','Prune','Graft','Bend'].forEach(t=>$( 'tool'+t).onclick=()=> { INPUT=INPUT===t.toLowerCase()?'none':t.toLowerCase(); document.querySelectorAll('.btn-grid .btn').forEach(b=>b.classList.remove('active')); if(INPUT!=='none')$('tool'+t).classList.add('active'); });

function notify(m) { let t=$('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function updateRealtimeUI() { 
  const t=STATE.trees[STATE.activeIdx]; if(!t) return;
  $('uiTreeName').innerText=t.name; $('uiSpeciesName').innerText=SPECIES[t.key].name;
  $('uiDay').innerText="Tag "+t.days; $('barWater').style.width=t.water+"%"; $('uiWaterVal').innerText=Math.round(t.water)+"%"; $('barHp').style.width=t.hp+"%"; $('uiHpVal').innerText=Math.round(t.hp)+"%";
}

function handlePointerDown(e) { 
  let x = e.clientX||e.touches[0].clientX, y = e.clientY||e.touches[0].clientY;
  const rect=cv.getBoundingClientRect(); MOUSE.x=x-rect.left; MOUSE.y=y-rect.top;
  MOUSE.worldX=(MOUSE.x-(cv.width/2+CAM.x))/CAM.zoom; MOUSE.worldY=(MOUSE.y-(cv.height*0.55+CAM.y))/CAM.zoom;
  if(INPUT==='none') MOUSE.drag=true; else if(INPUT==='water') WATERING=true; else if(INPUT==='bend'){ findHover(); if(HOVER) BEND_TARGET=HOVER; } else { findHover(); if(HOVER && INPUT==='prune'){HOVER.cut=true;STATE.stats.totalPrunes++;notify("Schnitt!");} }
}
function handlePointerMove(e) {
  let x = e.clientX||(e.touches&&e.touches[0].clientX), y = e.clientY||(e.touches&&e.touches[0].clientY);
  const rect=cv.getBoundingClientRect(); let mx=x-rect.left, my=y-rect.top;
  if(MOUSE.drag){ CAM.x+=mx-MOUSE.x; CAM.y+=my-MOUSE.y; }
  MOUSE.x=mx; MOUSE.y=my; MOUSE.worldX=(mx-(cv.width/2+CAM.x))/CAM.zoom; MOUSE.worldY=(my-(cv.height*0.55+CAM.y))/CAM.zoom;
  if(BEND_TARGET) BEND_TARGET.targetAngle = Math.atan2(MOUSE.worldY-BEND_TARGET.y, MOUSE.worldX-BEND_TARGET.x);
}
function findHover() {
  let dist=9999; HOVER=null;
  function walk(b){ let d=Math.hypot((b.x+b.endX)/2-MOUSE.worldX, (b.y+b.endY)/2-MOUSE.worldY); if(d<20&&d<dist){dist=d;HOVER=b;} b.children.forEach(walk); }
  walk(STATE.trees[STATE.activeIdx].root);
}
cv.onmousedown=handlePointerDown; cv.onmousemove=handlePointerMove; window.onmouseup=()=>{MOUSE.drag=false;WATERING=false;BEND_TARGET=null;};
cv.ontouchstart=e=>{handlePointerDown(e);e.preventDefault();}; cv.ontouchmove=e=>{handlePointerMove(e);e.preventDefault();}; cv.ontouchend=()=> {MOUSE.drag=false;WATERING=false;BEND_TARGET=null;};

function saveGame() { localStorage.setItem("bonsai_v70", JSON.stringify(STATE)); }
function loadGame() { let d=JSON.parse(localStorage.getItem("bonsai_v70")); if(d){ STATE=d; STATE.trees=d.trees.map(td=>{ let t=new Tree(td.key, td.name); Object.assign(t,td); t.root=Branch.deserialize(td.root,null); return t; }); } }
function hardReset() { localStorage.removeItem("bonsai_v70"); location.reload(); }
setInterval(saveGame, 5000);
init();
})();
</script>
