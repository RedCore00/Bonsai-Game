
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Balkon-Bonsai</title>
  <style>
    :root{
      --bg:#070a0f;
      --panel:rgba(13,18,26,.74);
      --line:rgba(40,60,90,.55);
      --txt:#eaf1fb;
      --muted:#9fb2c7;
      --good:#7be39a;
      --warn:#f6c75a;
      --bad:#ff5a63;
      --cyan:#76e4ff;
      --vio:#caa6ff;
      --shadow:0 18px 55px rgba(0,0,0,.45);
      --r:16px;
    }
    html,body{height:100%;margin:0;background:radial-gradient(1200px 900px at 20% 10%, #0f1b2b 0%, var(--bg) 55%, #05070b 100%); color:var(--txt); font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    *{box-sizing:border-box}
    .wrap{max-width:1180px;margin:0 auto;padding:12px 12px 18px}
    header{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:10px}
    .logo{width:36px;height:36px;border-radius:12px;background:radial-gradient(circle at 30% 30%, rgba(118,228,255,.35), rgba(202,166,255,.22)); border:1px solid rgba(118,228,255,.22); box-shadow:0 10px 30px rgba(118,228,255,.08);}
    h1{font-size:16px;margin:0;font-weight:950;letter-spacing:.2px}
    .mini{color:var(--muted);font-size:12px;line-height:1.35}

    .row{display:grid;grid-template-columns:1.25fr .75fr;gap:14px;margin-top:12px}
    @media (max-width:980px){.row{grid-template-columns:1fr}.wrap{padding-bottom:18px}}

    .card{background:linear-gradient(180deg, rgba(18,26,38,.82), rgba(10,14,20,.70)); border:1px solid rgba(40,60,90,.55); border-radius:var(--r); box-shadow:var(--shadow); overflow:hidden; backdrop-filter: blur(10px);}
    .pad{padding:12px}
    canvas{display:block;width:100%;height:auto;background:#05070b; touch-action:none;} /* wichtig für pinch/pan */

    .pillbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
    .pill{border:1px solid rgba(40,60,90,.55); background:rgba(8,12,18,.52); border-radius:999px; padding:7px 10px; font-size:13px; color:var(--muted); display:flex; align-items:center; gap:8px; white-space:nowrap}
    .pill b{color:var(--txt)}
    .dot{width:7px;height:7px;border-radius:99px;background:rgba(123,227,154,.85); box-shadow:0 0 0 3px rgba(123,227,154,.12)}
    .dot.w{background:rgba(246,199,90,.92); box-shadow:0 0 0 3px rgba(246,199,90,.12)}
    .dot.r{background:rgba(255,90,99,.92); box-shadow:0 0 0 3px rgba(255,90,99,.12)}

    .under{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center; padding:10px 12px; border-top:1px solid rgba(40,60,90,.40); background:linear-gradient(180deg, rgba(9,12,18,.25), rgba(9,12,18,.55))}
    select{background:rgba(8,12,18,.52); border:1px solid rgba(40,60,90,.55); color:var(--txt); border-radius:12px; padding:10px 10px; font-weight:850; outline:none}

    .btns{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .btn{appearance:none; border:1px solid rgba(40,60,90,.55); background:rgba(8,12,18,.55); color:var(--txt);
      border-radius:14px; padding:12px 10px; font-weight:950; font-size:14px; cursor:pointer; user-select:none;
      transition:transform .08s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
      box-shadow:0 10px 26px rgba(0,0,0,.18);
    }
    .btn:hover{background:rgba(14,20,30,.70)}
    .btn:active{transform:translateY(1px)}
    .btn.active{border-color:rgba(118,228,255,.32); box-shadow:0 14px 34px rgba(118,228,255,.07), 0 10px 26px rgba(0,0,0,.18)}
    .btn.small{padding:10px 10px;font-size:13px;border-radius:12px}
    .btn.ghost{background:transparent; box-shadow:none}

    .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .stat{border:1px solid rgba(40,60,90,.55); border-radius:14px; padding:10px; background:rgba(8,12,18,.48)}
    .k{font-size:12px;color:var(--muted);font-weight:850}
    .v{font-size:16px;font-weight:950;margin-top:2px}
    .bar{height:9px;border-radius:999px;background:rgba(5,7,10,.8);border:1px solid rgba(18,26,38,.9);overflow:hidden;margin-top:8px}
    .bar i{display:block;height:100%;width:50%}

    .field{border:1px solid rgba(40,60,90,.55); background:rgba(8,12,18,.48); border-radius:14px; padding:10px; margin-top:10px}
    label{display:block;font-size:12px;color:var(--muted);font-weight:900}
    input[type="range"]{width:100%; margin-top:8px; accent-color:rgba(118,228,255,.85)}
    textarea{
      width:100%; min-height:140px; resize:vertical;
      background: rgba(8,12,18,.60);
      border:1px solid rgba(40,60,90,.55);
      border-radius:14px; color:var(--txt);
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      font-size:12px; padding:10px; outline:none;
    }

    @media (max-width:980px){
      .pad{padding:10px}
      .btns{grid-template-columns:repeat(3,minmax(0,1fr))}
      .btn{padding:10px 8px;font-size:13px;border-radius:12px}
      .stat{padding:8px}
      .v{font-size:14px}
    }
  </style>
</head>

<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>Balkon-Bonsai</h1>
        <div class="mini">Pinch-Zoom • Pan • Biegen • Schneiden • Wachsen</div>
      </div>
    </div>
    <div class="pillbar">
      <div class="pill"><span class="dot"></span>Coins: <b id="coins">0</b></div>
      <div class="pill"><span class="dot w"></span>Streak: <b id="streak">0</b></div>
      <div class="pill"><span class="dot r"></span>Tag: <b id="day">1</b> · Saison: <b id="season">—</b></div>
    </div>
  </header>

  <div class="row">
    <div class="card">
      <canvas id="cv" width="980" height="620"></canvas>
      <div class="under">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <select id="species"></select>
          <button class="btn small" id="newTree">🌱 Neuer Baum</button>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <button class="btn small" id="seasonBtn">🍂 Saison</button>
          <button class="btn small" id="photoBtn">📷 Foto</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="pad">
        <div class="stats">
          <div class="stat"><div class="k">Wasser</div><div class="v"><span id="wV">0</span>/100</div><div class="bar"><i id="wB"></i></div></div>
          <div class="stat"><div class="k">HP</div><div class="v"><span id="hV">0</span>/100</div><div class="bar"><i id="hB"></i></div></div>
          <div class="stat"><div class="k">Wachstum</div><div class="v"><span id="cV">0</span>/100</div><div class="bar"><i id="cB"></i></div></div>
          <div class="stat"><div class="k">Form</div><div class="v"><span id="sV">0</span>/100</div><div class="bar"><i id="sB"></i></div></div>
        </div>

        <div style="height:12px"></div>

        <div class="btns">
          <button class="btn" id="waterBtn">💧 Gießen</button>
          <button class="btn" id="pruneBtn">✂️ Schneiden</button>
          <button class="btn" id="bendBtn">🧵 Biegen</button>
        </div>

        <div class="mini" style="margin-top:10px" id="toolInfo">
          Tool: — · Tipp: <b>2 Finger</b> = Zoom, <b>1 Finger</b> = Pan (wenn Tool aus)
        </div>

        <div class="field">
          <label>Zoom</label>
          <input type="range" id="rngZoom" min="0.85" max="2.20" step="0.01">
          <div class="mini" id="zoomVal">—</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
            <button class="btn small" id="zoomReset">Reset</button>
            <button class="btn small ghost" id="centerBtn">Zentrieren</button>
          </div>
        </div>

        <div class="field">
          <label>Save Export / Import</label>
          <div class="mini">Export kopieren, Import einfügen → Import. (Speichert auch die Form pro Baum-Slot)</div>
          <textarea id="saveText" placeholder="(Export/Import JSON)"></textarea>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
            <button class="btn small" id="doExport">Export</button>
            <button class="btn small" id="doImport">Import</button>
            <button class="btn small" id="doReset">Reset Save</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const $ = (id)=>document.getElementById(id);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const clamp01=(x)=>clamp(x,0,1);
  const lerp=(a,b,t)=>a+(b-a)*t;

  function mulberry32(seed){
    let a=seed>>>0;
    return function(){
      a|=0; a=(a+0x6D2B79F5)|0;
      let t=Math.imul(a^(a>>>15),1|a);
      t=(t+Math.imul(t^(t>>>7),61|t))^t;
      return ((t^(t>>>14))>>>0)/4294967296;
    };
  }

  function projOnSeg(px,py, ax,ay, bx,by){
    const vx=bx-ax, vy=by-ay;
    const wx=px-ax, wy=py-ay;
    const vv=vx*vx+vy*vy;
    if(vv<=1e-9) return {t:0,x:ax,y:ay,d2:(px-ax)*(px-ax)+(py-ay)*(py-ay)};
    let t=(wx*vx+wy*vy)/vv; t=clamp(t,0,1);
    const x=ax+vx*t, y=ay+vy*t;
    const dx=px-x, dy=py-y;
    return {t,x,y,d2:dx*dx+dy*dy};
  }

  // -----------------------------
  // Content
  // -----------------------------
  const SPECIES = [
    {id:"ficus", name:"Ficus microcarpa", growth:1.0, thirst:0.85, tolerance:0.75},
    {id:"elm", name:"Chinesische Ulme", growth:1.05, thirst:0.92, tolerance:0.78},
    {id:"juniper", name:"Wacholder", growth:0.85, thirst:0.80, tolerance:0.58},
  ];

  const SEASONS = [
    {id:"spring", name:"Frühling", growMul:1.25, thirstMul:0.95, recover:0.07},
    {id:"summer", name:"Sommer",   growMul:1.12, thirstMul:1.08, recover:0.03},
    {id:"autumn", name:"Herbst",   growMul:0.95, thirstMul:0.90, recover:0.10},
    {id:"winter", name:"Winter",   growMul:0.55, thirstMul:0.70, recover:0.14},
  ];

  const SAVE_KEY="bonsai_simple_v1";

  // -----------------------------
  // Model (SINGLE trunk, NO roots)
  // Branch length model:
  //  - b.len: current visible length fraction (0.10..1)
  //  - b.target: desired length fraction (grows with canopy)
  // Prune sets b.len EXACT to click fraction.
  // -----------------------------
  function defaultModel(seed){
    const rng=mulberry32(seed>>>0);
    return {
      seed,
      trunk:{
        bend:{ox:0, oy:0, pivot:0.55},
        branches:[
          {id:"b0", attachT:0.78, baseAngle:-0.62, bend:0.10, len:0.12, target:0.16, leader:true, seed:(rng()*1e9)|0, prunedFlash:0}
        ],
        nextId:1,
        lastGate:0
      }
    };
  }

  function defaultTree(speciesId){
    return {speciesId, water:70, hp:90, canopy:2, shape:3};
  }

  function defaultState(){
    const seed=((Math.random()*1e9)|0);
    const start="ficus";
    return {
      v:1,
      coins:0,
      streak:0,
      day:1,
      seasonIdx:0,
      // camera (pan+zoom)
      cam:{zoom:1.22, panX:0, panY:0},
      meta:{ lastTs:Date.now(), dayFrac:0 },
      // slots per species: each has own life, grows only when selected
      activeSpecies:start,
      slots:{
        [start]:{ tree:defaultTree(start), model:defaultModel(seed), photos:[] }
      }
    };
  }

  function loadState(){
    try{
      const raw=localStorage.getItem(SAVE_KEY);
      if(!raw) return defaultState();
      const obj=JSON.parse(raw);
      const base=defaultState();
      const S={...base,...obj};
      if(!S.cam) S.cam={zoom:1.22, panX:0, panY:0};
      if(!S.meta) S.meta={lastTs:Date.now(), dayFrac:0};
      if(!S.slots) S.slots=base.slots;
      if(!S.activeSpecies) S.activeSpecies=base.activeSpecies;

      // normalize slot models (migrate older fields if any)
      for(const k of Object.keys(S.slots)){
        const sl=S.slots[k];
        if(!sl.tree) sl.tree=defaultTree(k);
        if(!sl.model || !sl.model.trunk) sl.model=defaultModel(((Math.random()*1e9)|0));
        const tr=sl.model.trunk;
        if(!tr.bend) tr.bend={ox:0,oy:0,pivot:0.55};
        if(!Array.isArray(tr.branches)) tr.branches=[];
        if(typeof tr.nextId!=="number") tr.nextId=1;
        if(typeof tr.lastGate!=="number") tr.lastGate=0;
        for(const b of tr.branches){
          // migrate previous names if user imported older file
          if(typeof b.len!=="number" && typeof b.lenMul==="number") b.len=b.lenMul;
          if(typeof b.target!=="number" && typeof b.lenTarget==="number") b.target=b.lenTarget;
          if(typeof b.len!=="number") b.len=0.12;
          if(typeof b.target!=="number") b.target=Math.max(b.len,0.16);
          if(typeof b.seed!=="number") b.seed=((Math.random()*1e9)|0);
          if(typeof b.prunedFlash!=="number") b.prunedFlash=0;
        }
        if(!Array.isArray(sl.photos)) sl.photos=[];
      }
      return S;
    }catch{
      return defaultState();
    }
  }

  let S=loadState();

  function saveNow(){
    S.meta.lastTs=Date.now();
    localStorage.setItem(SAVE_KEY, JSON.stringify(S));
  }

  function ensureSlot(speciesId){
    if(!S.slots) S.slots={};
    if(!S.slots[speciesId]){
      const seed=((Math.random()*1e9)|0);
      S.slots[speciesId]={ tree:defaultTree(speciesId), model:defaultModel(seed), photos:[] };
    }
    const sl=S.slots[speciesId];
    if(!sl.model || !sl.model.trunk) sl.model=defaultModel(((Math.random()*1e9)|0));
  }

  function slot(){
    ensureSlot(S.activeSpecies);
    return S.slots[S.activeSpecies];
  }

  function sp(){
    const id=slot().tree.speciesId;
    return SPECIES.find(x=>x.id===id) || SPECIES[0];
  }

  function season(){
    return SEASONS[S.seasonIdx % SEASONS.length];
  }

  function rebuildSpeciesSelect(){
    const sel=$("species");
    sel.innerHTML="";
    for(const s of SPECIES){
      const o=document.createElement("option");
      o.value=s.id; o.textContent=s.name;
      sel.appendChild(o);
    }
    sel.value=S.activeSpecies;
  }

  // -----------------------------
  // HUD
  // -----------------------------
  function bar(el, v){
    const pct=clamp(v,0,100);
    el.style.width=pct+"%";
    el.style.background = (pct>=66) ? "var(--good)" : (pct>=33) ? "var(--warn)" : "var(--bad)";
  }

  function updateHud(){
    const sl=slot();
    const t=sl.tree;
    $("coins").textContent=Math.round(S.coins);
    $("streak").textContent=Math.round(S.streak);
    $("day").textContent=Math.round(S.day);
    $("season").textContent=season().name;

    $("wV").textContent=Math.round(t.water);
    $("hV").textContent=Math.round(t.hp);
    $("cV").textContent=Math.round(t.canopy);
    $("sV").textContent=Math.round(t.shape);

    bar($("wB"), t.water);
    bar($("hB"), t.hp);
    bar($("cB"), t.canopy);
    bar($("sB"), t.shape);

    $("rngZoom").value=S.cam.zoom;
    $("zoomVal").textContent = `Zoom: ${(S.cam.zoom*100).toFixed(0)}% · Pan: ${Math.round(S.cam.panX)}, ${Math.round(S.cam.panY)}`;

    const toolStr = (toolMode==="water")?"Tool: Gießen (Tippe Topf)":
                    (toolMode==="prune")?"Tool: Schneiden (Tippe Ast genau am Cut)":
                    (toolMode==="bend") ?"Tool: Biegen (Handles / Astspitze ziehen)":
                                        "Tool: — · Tipp: 2 Finger = Zoom, 1 Finger = Pan (wenn Tool aus)";
    $("toolInfo").innerHTML = toolStr;
  }

  // -----------------------------
  // Simulation: 24h day via meta.dayFrac (0..1)
  // -----------------------------
  const SIM={
    daySeconds: 24*60*60,          // 24h Zyklus
    timeScale: 1800,               // 1 Real-Sekunde = 30 Sim-Minuten (damit du was siehst)
    maxOfflineSeconds: 7*24*3600
  };

  function idealRange(tree){
    const s=sp();
    const min=clamp(36+(1-s.tolerance)*18, 0, 100);
    const max=clamp(82-(1-s.tolerance)*10, 0, 100);
    return {min, max};
  }

  function ensureOrganicBranching(){
    const sl=slot();
    const tr=sl.model.trunk;
    const canopy=sl.tree.canopy;

    // alle 10 canopy-Punkte "Gate"
    const gate=Math.floor(canopy/10);
    if(gate<=tr.lastGate) return;

    const rng=mulberry32((sl.model.seed ^ (S.day*9917) ^ (gate*31337))>>>0);

    // Ziel-Branchcount (ramification)
    const desired=clamp(2 + Math.floor(canopy/9), 2, 18);
    const alive=tr.branches.length;

    if(alive < desired){
      const addN = Math.min(desired-alive, 1 + (rng()<0.20?1:0));
      for(let i=0;i<addN;i++){
        const id="b"+(tr.nextId++);
        const attachT=clamp(0.18 + rng()*0.72, 0.18, 0.92);
        const side=(tr.nextId%2===0)?-1:1;

        // apikal: weiter oben = kleinere Winkel, weiter unten = größere
        const ap=(attachT-0.18)/(0.92-0.18);
        const baseAng = side * lerp(1.15, 0.35, ap) * (0.85 + rng()*0.35);

        tr.branches.push({
          id, attachT,
          baseAngle: clamp(baseAng + (rng()-0.5)*0.25, -2.2, 2.2),
          bend:(rng()-0.5)*0.55,
          len:0.10 + rng()*0.06,
          target:0.14 + rng()*0.10,
          leader: (rng()<0.10 && canopy>25),   // ab und zu "dominanter" Ast (Krone)
          seed:(rng()*1e9)|0,
          prunedFlash:0
        });
      }
    }

    tr.lastGate=gate;
  }

  function growTowardTargets(dt){
    const sl=slot();
    const t=sl.tree;
    const tr=sl.model.trunk;
    const s=sp();
    const sea=season();

    const canopy01=t.canopy/100;
    const hp01=t.hp/100;

    // apikal dominant: leader wächst etwas stärker, unten etwas weniger
    for(const b of tr.branches){
      const ap=(b.attachT-0.18)/(0.92-0.18);
      const apicalBoost = b.leader ? 1.20 : 1.0;
      const baseTarget = clamp(0.12 + canopy01*0.88*apicalBoost*(0.95 + (1-ap)*0.10), 0.12, 1.0);

      // nach Schnitt soll es nicht sofort wieder voll werden
      b.target = Math.max(b.target, baseTarget);
      const k = 0.65 + canopy01*0.95; // approach speed
      const alpha = 1 - Math.exp(-dt * k * (0.45 + hp01*0.75) * s.growth * sea.growMul);

      b.len = lerp(b.len, clamp(b.target, 0.10, 1.0), alpha);

      if(b.prunedFlash>0) b.prunedFlash=Math.max(0, b.prunedFlash - dt*2.2);
    }
  }

  function tick(dt){
    const sl=slot();
    const t=sl.tree;
    const s=sp();
    const sea=season();

    // water
    t.water = clamp(t.water - (0.42 * s.thirst * sea.thirstMul) * dt, 0, 100);

    // hp
    const {min,max}=idealRange(t);
    let hpDelta=0;
    if(t.water<min) hpDelta -= (0.85 + (min-t.water)*0.028) * dt;
    if(t.water>max) hpDelta -= (0.32 + (t.water-max)*0.012) * dt;
    hpDelta += (sea.recover) * dt * 10;

    t.hp = clamp(t.hp + hpDelta, 0, 100);

    // canopy growth
    const hpMul = 0.35 + (t.hp/100)*0.95;
    const wMul  = 0.35 + (t.water/100)*0.85;
    const grow  = (0.55 * s.growth * sea.growMul * hpMul * wMul) * dt;

    if(t.hp>12) t.canopy = clamp(t.canopy + grow, 0, 100);
    else t.canopy = clamp(t.canopy - 0.18*dt, 0, 100);

    // form drift (leicht)
    const decay = (0.010 + (t.canopy/100)*0.012) * dt;
    t.shape = clamp(t.shape - decay, 0, 100);

    ensureOrganicBranching();
    growTowardTargets(dt);
  }

  function dayAdvance(){
    S.day += 1;
    S.coins += 6;
    S.streak = Math.max(0, S.streak-1);
  }

  function advanceTime(simSeconds){
    let sec=simSeconds;
    while(sec>0){
      const left=(1-S.meta.dayFrac)*SIM.daySeconds;
      const step=Math.min(sec,left);
      // substeps for stability
      const steps=Math.max(1, Math.ceil(step/2.0));
      const dt=step/steps;
      for(let i=0;i<steps;i++) tick(dt);
      S.meta.dayFrac += step/SIM.daySeconds;
      if(S.meta.dayFrac>=1){
        S.meta.dayFrac-=1;
        dayAdvance();
      }
      sec-=step;
    }
  }

  function offlineCatchup(){
    const now=Date.now();
    const elapsedReal=clamp((now-S.meta.lastTs)/1000, 0, SIM.maxOfflineSeconds);
    const sim=elapsedReal*SIM.timeScale;
    if(sim>0.2) advanceTime(sim);
    S.meta.lastTs=now;
    saveNow();
  }

  // -----------------------------
  // Tools
  // -----------------------------
  let toolMode="none"; // none|water|prune|bend
  function setTool(m){
    toolMode=m;
    $("waterBtn").classList.toggle("active", m==="water");
    $("pruneBtn").classList.toggle("active", m==="prune");
    $("bendBtn").classList.toggle("active", m==="bend");
    updateHud();
  }

  function actWater(){
    const t=slot().tree;
    t.water=clamp(t.water + 22, 0, 100);
    S.coins += 2;
    S.streak += 1;
    saveNow();
  }

  // -----------------------------
  // Drawing (background: mountains + sun/moon + clouds + birds)
  // -----------------------------
  const cv=$("cv");
  const g=cv.getContext("2d");

  function rgba(c,a){return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;}
  function mix(a,b,t){return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];}
  function smoothstep(t){t=clamp01(t); return t*t*(3-2*t);}

  // Camera (pan+zoom)
  function withCamera(fn){
    const w=cv.width, h=cv.height;
    const cx=w*0.5, cy=h*0.55;
    g.save();
    g.translate(cx + S.cam.panX, cy + S.cam.panY);
    g.scale(S.cam.zoom, S.cam.zoom);
    g.translate(-cx, -cy);
    fn();
    g.restore();
  }
  function screenToWorld(px,py){
    const r=cv.getBoundingClientRect();
    const sx=(px-r.left)*(cv.width/r.width);
    const sy=(py-r.top)*(cv.height/r.height);
    const w=cv.width, h=cv.height;
    const cx=w*0.5, cy=h*0.55;
    const z=S.cam.zoom;
    const wx=(sx - (cx+S.cam.panX))/z + cx;
    const wy=(sy - (cy+S.cam.panY))/z + cy;
    return {x:wx,y:wy,sx,sy};
  }
  function worldToScreen(wx,wy){
    const w=cv.width, h=cv.height;
    const cx=w*0.5, cy=h*0.55;
    const z=S.cam.zoom;
    const sx=(wx-cx)*z + (cx+S.cam.panX);
    const sy=(wy-cy)*z + (cy+S.cam.panY);
    return {sx,sy};
  }
  function screenToWorldGiven(sx,sy, zoom, panX, panY){
    const w=cv.width, h=cv.height;
    const cx=w*0.5, cy=h*0.55;
    const wx=(sx - (cx+panX))/zoom + cx;
    const wy=(sy - (cy+panY))/zoom + cy;
    return {x:wx,y:wy};
  }

  function drawSky(w,h){
    const tod=S.meta.dayFrac;                  // 0..1
    const sunPhase = Math.sin((tod*2*Math.PI - Math.PI/2))*0.5 + 0.5; // 0..1
    const dayF=smoothstep(sunPhase);
    const nightF=1-dayF;

    const sea=season().id;
    const dayTop =
      sea==="winter"? [22,34,60] :
      sea==="autumn"? [28,30,52] :
      sea==="summer"? [18,46,74] :
                      [22,44,78];
    const dayBot =
      sea==="winter"? [8,10,18] :
      sea==="autumn"? [7,8,14] :
      sea==="summer"? [6,7,10] :
                      [6,7,10];

    const nightTop=[5,9,18];
    const nightBot=[2,3,7];

    const top=mix(nightTop,dayTop,dayF);
    const bot=mix(nightBot,dayBot,dayF);

    const grd=g.createLinearGradient(0,0,0,h);
    grd.addColorStop(0, rgba(top,1));
    grd.addColorStop(1, rgba(bot,1));
    g.fillStyle=grd;
    g.fillRect(0,0,w,h);

    // stars
    if(nightF>0.22){
      const rng=mulberry32(((S.day*99991) ^ 0xA53)>>>0);
      g.save();
      g.globalAlpha=0.35*nightF;
      g.fillStyle="rgba(220,235,255,0.9)";
      for(let i=0;i<120;i++){
        const x=rng()*w, y=rng()*h*0.55, r=0.6+rng()*1.4;
        g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();
      }
      g.restore();
    }

    // sun + moon on arc
    const arcCx=w*0.5, arcCy=h*0.78;
    const arcR=w*0.52;
    const ang = (tod*2*Math.PI) - Math.PI/2;
    const sunX=arcCx + Math.cos(ang)*arcR;
    const sunY=arcCy + Math.sin(ang)*arcR;

    const moonAng=ang+Math.PI;
    const moonX=arcCx + Math.cos(moonAng)*arcR;
    const moonY=arcCy + Math.sin(moonAng)*arcR;

    // sun
    g.save();
    g.globalAlpha=0.95*dayF;
    const sg=g.createRadialGradient(sunX,sunY, 0, sunX,sunY, 65);
    sg.addColorStop(0,"rgba(255,255,220,0.95)");
    sg.addColorStop(1,"rgba(255,180,80,0)");
    g.fillStyle=sg;
    g.beginPath(); g.arc(sunX,sunY,65,0,Math.PI*2); g.fill();
    g.fillStyle="rgba(255,245,210,0.95)";
    g.beginPath(); g.arc(sunX,sunY,14,0,Math.PI*2); g.fill();
    g.restore();

    // moon
    g.save();
    g.globalAlpha=0.85*nightF;
    const mg=g.createRadialGradient(moonX,moonY, 0, moonX,moonY, 52);
    mg.addColorStop(0,"rgba(230,240,255,0.70)");
    mg.addColorStop(1,"rgba(180,210,255,0)");
    g.fillStyle=mg;
    g.beginPath(); g.arc(moonX,moonY,52,0,Math.PI*2); g.fill();
    g.fillStyle="rgba(235,245,255,0.85)";
    g.beginPath(); g.arc(moonX,moonY,12,0,Math.PI*2); g.fill();
    // crescent cut
    g.globalCompositeOperation="destination-out";
    g.beginPath(); g.arc(moonX+6, moonY-1, 10, 0, Math.PI*2); g.fill();
    g.restore();
  }

  function drawMountains(w,h){
    const sea=season().id;
    function hill(yBase, amp, colA, colB, seed){
      const rng=mulberry32(seed);
      const grd=g.createLinearGradient(0,yBase-amp,0,yBase+amp);
      grd.addColorStop(0, rgba(colA,1));
      grd.addColorStop(1, rgba(colB,1));
      g.fillStyle=grd;
      g.beginPath();
      g.moveTo(0,h);
      g.lineTo(0,yBase);
      const steps=16;
      for(let i=0;i<=steps;i++){
        const x=(i/steps)*w;
        const y=yBase + (rng()-0.5)*amp + Math.sin(i*0.55)*amp*0.20;
        g.lineTo(x,y);
      }
      g.lineTo(w,h);
      g.closePath();
      g.fill();
    }
    if(sea==="winter"){
      hill(h*0.44, 30, [18,28,44], [8,12,18], 111);
      hill(h*0.52, 40, [14,20,30], [6,9,14], 222);
    }else if(sea==="summer"){
      hill(h*0.44, 26, [16,34,46], [8,14,18], 111);
      hill(h*0.52, 38, [12,22,22], [6,9,12], 222);
    }else if(sea==="autumn"){
      hill(h*0.44, 26, [26,28,38], [10,12,16], 111);
      hill(h*0.52, 38, [26,18,16], [9,9,12], 222);
    }else{
      hill(h*0.44, 26, [18,30,46], [8,12,18], 111);
      hill(h*0.52, 38, [14,20,22], [7,9,12], 222);
    }
  }

  function drawClouds(w,h){
    const tod=S.meta.dayFrac;
    const sunPhase = Math.sin((tod*2*Math.PI - Math.PI/2))*0.5 + 0.5;
    const dayF=smoothstep(sunPhase);
    const alphaBase = 0.20 + dayF*0.28;

    const t = (S.day*0.12 + S.meta.dayFrac*2.4); // drift
    const rng=mulberry32(123456);

    for(let i=0;i<8;i++){
      const layer = (i<4)?0:1;
      const spd = layer? 0.030:0.018;
      const y = h*(0.12 + rng()*0.28) + layer*30;
      const scale = layer? (0.85 + rng()*0.35) : (0.65 + rng()*0.25);
      const x = ( (t*spd*w) + i*180 + rng()*120 ) % (w+260) - 130;

      g.save();
      g.globalAlpha = alphaBase * (layer?0.95:0.75);
      g.fillStyle="rgba(255,255,255,0.90)";
      // simple cloud with circles
      const cx=x, cy=y;
      const r1=26*scale, r2=34*scale, r3=22*scale;
      g.beginPath();
      g.arc(cx,cy, r2, 0, Math.PI*2);
      g.arc(cx+28*scale,cy+6*scale, r1, 0, Math.PI*2);
      g.arc(cx-30*scale,cy+8*scale, r1*0.95, 0, Math.PI*2);
      g.arc(cx+58*scale,cy+14*scale, r3, 0, Math.PI*2);
      g.closePath();
      g.fill();
      g.restore();
    }
  }

  function drawBirds(w,h){
    const tod=S.meta.dayFrac;
    const sunPhase = Math.sin((tod*2*Math.PI - Math.PI/2))*0.5 + 0.5;
    const dayF=smoothstep(sunPhase);
    if(dayF<0.25) return; // nachts keine Vögel

    const t = (S.day*0.4 + S.meta.dayFrac*6.0);
    const rng=mulberry32(777);
    const flocks=3;
    for(let f=0; f<flocks; f++){
      const baseY = h*(0.18 + rng()*0.25) + f*12;
      const baseX = ((t*(0.06+f*0.015)*w) + f*260) % (w+200) - 100;
      const n = 4 + Math.floor(rng()*4);

      g.save();
      g.strokeStyle="rgba(0,0,0,0.55)";
      g.lineWidth=2;
      g.globalAlpha = 0.55*dayF;
      for(let i=0;i<n;i++){
        const x = baseX + i*14 + Math.sin(t*2.0 + i)*6;
        const y = baseY + Math.cos(t*1.8 + i)*3;
        const s = 6 + rng()*5;
        // V shape
        g.beginPath();
        g.moveTo(x-s, y);
        g.quadraticCurveTo(x, y-4, x+s, y);
        g.stroke();
      }
      g.restore();
    }
  }

  function drawBalcony(w,h){
    g.fillStyle="rgba(7,9,13,1)";
    g.fillRect(0, h*0.72, w, h*0.28);

    g.strokeStyle="rgba(35,48,66,0.45)";
    g.lineWidth=1;
    for(let i=0;i<10;i++){
      const y=h*0.72 + i*(h*0.28/10);
      g.beginPath(); g.moveTo(0,y); g.lineTo(w,y); g.stroke();
    }

    const railY=h*0.60;
    g.fillStyle="rgba(8,12,18,0.70)";
    g.fillRect(0, railY, w, 6);
    g.strokeStyle="rgba(40,58,84,0.75)";
    g.lineWidth=2;
    g.beginPath(); g.moveTo(0,railY); g.lineTo(w,railY); g.stroke();

    for(let i=0;i<12;i++){
      const x=(i/11)*w;
      g.strokeStyle="rgba(35,48,66,0.55)";
      g.lineWidth=2;
      g.beginPath();
      g.moveTo(x,railY);
      g.lineTo(x, railY+70);
      g.stroke();

  // pot + soil (simple)
  let potHit=null;
  function roundRectPath(x,y,w,h,r){
    const rr=Math.min(r,w/2,h/2);
    g.beginPath();
    g.moveTo(x+rr,y);
    g.arcTo(x+w,y,x+w,y+h,rr);
    g.arcTo(x+w,y+h,x,y+h,rr);
    g.arcTo(x,y+h,x,y,rr);
    g.arcTo(x,y,x+w,y,rr);
    g.closePath();
  }
  function drawPot(w,h){
    const potW=390, potH=150;
    const potX=w*0.5 - potW/2;
    const potY=h*0.76 - potH/2;
    potHit={x:potX,y:potY,w:potW,h:potH};

    // shadow
    g.save();
    g.globalAlpha=0.35;
    g.fillStyle="rgba(0,0,0,0.95)";
    g.beginPath();
    g.ellipse(w*0.5, h*0.81, potW*0.48, potH*0.26, 0, 0, Math.PI*2);
    g.fill();
    g.restore();

    const bodyA=[18,26,34], bodyB=[10,12,16], rim=[28,40,56];
    const grd=g.createLinearGradient(potX,potY, potX+potW,potY);
    grd.addColorStop(0, rgba(mix(bodyA,[0,0,0],0.40),1));
    grd.addColorStop(0.20, rgba(rim,1));
    grd.addColorStop(0.55, rgba(bodyA,1));
    grd.addColorStop(1, rgba(mix(bodyA,[0,0,0],0.60),1));
    roundRectPath(potX,potY,potW,potH,22);
    g.fillStyle=grd; g.fill();
    g.strokeStyle="rgba(27,36,48,1)";
    g.lineWidth=2.2; g.stroke();

    const cavX=potX+22, cavY=potY+30, cavW=potW-44, cavH=potH-52;
    const sGrd=g.createLinearGradient(cavX,cavY,cavX,cavY+cavH);
    sGrd.addColorStop(0,"rgba(18,16,14,1)");
    sGrd.addColorStop(1,"rgba(6,6,8,1)");
    roundRectPath(cavX,cavY,cavW,cavH,18);
    g.fillStyle=sGrd; g.fill();
    g.strokeStyle="rgba(18,20,26,1)";
    g.lineWidth=2; g.stroke();

    return {cavX,cavY,cavW,cavH, baseY:cavY+34};
  }

  // -----------------------------
  // Tree math (Bezier trunk + Bezier branches)
  // -----------------------------
  function bezier(p0,p1,p2,p3,t){
    const u=1-t;
    const tt=t*t, uu=u*u;
    const uuu=uu*u, ttt=tt*t;
    return {
      x: uuu*p0.x + 3*uu*t*p1.x + 3*u*tt*p2.x + ttt*p3.x,
      y: uuu*p0.y + 3*uu*t*p1.y + 3*u*tt*p2.y + ttt*p3.y
    };
  }
  function cubicAt(p0,p1,p2,p3,t){ return bezier(p0,p1,p2,p3,t); }
  function dist(a,b){const dx=b.x-a.x, dy=b.y-a.y; return Math.sqrt(dx*dx+dy*dy);}

  function trunkBezier(baseX, baseY, trunkH, bend){
    const ox=clamp(bend.ox, -trunkH*0.65, trunkH*0.65);
    const oy=clamp(bend.oy, -trunkH*0.22, trunkH*0.18);
    const p0={x:baseX,y:baseY};
    const p3={x:baseX+ox,y:baseY-trunkH+oy};
    const pv=clamp(bend.pivot,0.15,0.88);
    const c1={x:baseX+ox*0.10, y:baseY-trunkH*pv*0.30};
    const c2={x:baseX+ox*0.92, y:baseY-trunkH*(pv+(1-pv)*0.65)+oy*0.55};
    return {p0,p1:c1,p2:c2,p3};
  }

  // hit data
  let hit={handles:[], segs:[]}; // segs: {bid, ax,ay,bx,by,cum0,segLen,totalLen}
  function barkColor(hp01){ return {a:mix([108,100,96],[72,40,38],(1-hp01)*0.45), b:mix([44,42,46],[72,40,38],(1-hp01)*0.45)}; }

  function leafPalette(){
    const sea=season().id;
    const hp01=slot().tree.hp/100;
    const spId=slot().tree.speciesId;
    const conifer=(spId==="juniper");
    let a=conifer?[58,124,90]:[85,195,140];
    let b=conifer?[78,148,110]:[130,230,165];
    const decid=!conifer && spId!=="ficus";
    if(sea==="winter" && decid){ a=mix(a,[90,95,110],0.70); b=mix(b,[110,120,140],0.70); }
    if(sea==="autumn" && decid){ a=mix(a,[200,145,70],0.82); b=mix(b,[245,155,70],0.82); }
    const stress=[245,85,78];
    a=mix(a,stress,(1-hp01)*0.40); b=mix(b,stress,(1-hp01)*0.40);
    return {a,b, conifer};
  }

  function drawLeaf(x,y,w,h,rot,cA,cB,alpha){
    g.save();
    g.translate(x,y); g.rotate(rot);
    g.globalAlpha=alpha;
    const grd=g.createLinearGradient(-w,-h,w,h);
    grd.addColorStop(0, rgba(cA,0.95));
    grd.addColorStop(1, rgba(cB,0.95));
    g.fillStyle=grd;
    g.beginPath(); g.ellipse(0,0,w,h,0,0,Math.PI*2); g.fill();
    g.globalAlpha*=0.20;
    g.strokeStyle="rgba(255,255,255,0.65)";
    g.lineWidth=Math.max(0.6, w*0.10);
    g.beginPath(); g.moveTo(-w*0.55,0); g.quadraticCurveTo(0,-h*0.15,w*0.55,0); g.stroke();
    g.restore();
  }

  function drawNeedlesOnCurve(pts, pal, alpha, seed, density){
    const rng=mulberry32(seed>>>0);
    const n=clamp(Math.floor(density), 6, 72);
    const start=0.55, end=0.98;
    const L=pts.length-1;

    function sample(t){
      const idx=clamp(Math.floor(t*L), 0, L);
      const p=pts[idx];
      const p2=pts[Math.min(L, idx+1)];
      const dx=p2.x-p.x, dy=p2.y-p.y;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=-dy/len, ny=dx/len;
      return {p,nx,ny,ang:Math.atan2(dy,dx)};
    }

    g.save();
    g.globalAlpha=alpha*0.85;
    for(let i=0;i<n;i++){
      const tt=start+(end-start)*(i/(n-1));
      const s=sample(tt);
      const side=(i%2===0)?1:-1;
      const off=side*(3+rng()*8);
      const x=s.p.x+s.nx*off, y=s.p.y+s.ny*off;
      const len=6+rng()*14;
      g.strokeStyle=rgba(mix(pal.a,pal.b,rng()),0.75);
      g.lineWidth=1;
      g.beginPath();
      g.moveTo(x,y);
      g.lineTo(x+Math.cos(s.ang+side*0.55)*len, y+Math.sin(s.ang+side*0.55)*len*0.75);
      g.stroke();
    }
    g.restore();
  }

  function drawLeavesOnCurve(pts, pal, alpha, seed, density){
    const rng=mulberry32(seed>>>0);
    const n=clamp(Math.floor(density), 5, 70);
    const start=0.60, end=0.98;
    const L=pts.length-1;
    const phi=Math.PI*(3-Math.sqrt(5)); // golden angle

    function sample(t){
      const idx=clamp(Math.floor(t*L), 0, L);
      const p=pts[idx];
      const p2=pts[Math.min(L, idx+1)];
      const dx=p2.x-p.x, dy=p2.y-p.y;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const nx=-dy/len, ny=dx/len;
      return {p,nx,ny,ang:Math.atan2(dy,dx)};
    }

    for(let i=0;i<n;i++){
      const tt=start+(end-start)*(i/(n-1));
      const s=sample(tt);
      const ang=i*phi;
      const side=(Math.sin(ang)>0)?1:-1;
      const off=side*(2.5+rng()*7.0); // eng am Ast -> kein rumfliegen
      const x=s.p.x+s.nx*off, y=s.p.y+s.ny*off;
      const w=2.8+rng()*5.5, h=2.0+rng()*4.0;
      const rot=s.ang + side*(0.65+(rng()-0.5)*0.35);
      const cA=mix(pal.a,pal.b,rng()*0.55);
      const cB=mix(pal.b,pal.a,rng()*0.35);
      drawLeaf(x,y,w,h,rot,cA,cB, alpha*(0.72+rng()*0.28));
    }
  }

  // soft crown pull (keine harte clamp, damit schneiden/len linear bleibt)
  function pullIntoEllipse(x,y,cx,cy,rx,ry){
    const dx=x-cx, dy=y-cy;
    const nx=dx/rx, ny=dy/ry;
    const d=Math.sqrt(nx*nx+ny*ny);
    if(d<=1) return {x,y};
    // projection on ellipse border
    const s=1/d;
    const px=cx + dx*s;
    const py=cy + dy*s;
    const pull = clamp01((d-1)/0.55); // je weiter draußen, desto stärker
    const k = pull*pull;              // smooth
    return {x: lerp(x,px,k), y: lerp(y,py,k)};
  }

  function drawBranchCurve(base, tip, thick, bid){
    const dx=tip.x-base.x, dy=tip.y-base.y;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=-dy/len, ny=dx/len;
    const arc=0.14*len;

    const c1={x:base.x+dx*0.35+nx*arc, y:base.y+dy*0.35+ny*arc-6};
    const c2={x:base.x+dx*0.72+nx*arc*0.55, y:base.y+dy*0.72+ny*arc*0.55-10};

    // polyline + taper + hit segments
    const segs=14;
    const pts=[];
    pts.push({x:base.x,y:base.y});
    let prev=pts[0];
    let cum=0;

    // shadow
    g.save();
    g.globalAlpha=0.18;
    g.strokeStyle="rgba(0,0,0,0.9)";
    g.lineWidth=thick*1.05;
    g.lineCap="round";
    g.beginPath();
    g.moveTo(base.x+5, base.y+3);
    g.bezierCurveTo(c1.x+5,c1.y+3,c2.x+5,c2.y+3,tip.x+5,tip.y+3);
    g.stroke();
    g.restore();

    g.save();
    g.lineCap="round";
    for(let i=1;i<=segs;i++){
      const t=i/segs;
      const p=cubicAt(base,c1,c2,tip,t);
      pts.push(p);
    }
    // draw segments + store hit
    prev=pts[0];
    for(let i=1;i<pts.length;i++){
      const p=pts[i];
      const tt=i/(pts.length-1);
      const w=lerp(thick, Math.max(0.9, thick*0.28), tt);
      g.strokeStyle=`rgba(54,54,62,${0.94-tt*0.10})`;
      g.lineWidth=w;
      g.beginPath(); g.moveTo(prev.x,prev.y); g.lineTo(p.x,p.y); g.stroke();

      const segLen=dist(prev,p);
      hit.segs.push({bid, ax:prev.x, ay:prev.y, bx:p.x, by:p.y, cum0:cum, segLen, totalLen:0});
      cum+=segLen;
      prev=p;
    }
    g.restore();

    // finalize totalLen
    for(let i=hit.segs.length- (pts.length-1); i<hit.segs.length; i++){
      hit.segs[i].totalLen=cum||1;
    }
    return {pts, totalLen:cum||1};
  }

  // scissor animation (exact cut point)
  const animPrune={on:false,t:0,x:0,y:0,ang:0};
  function drawPruneAnim(){
    if(!animPrune.on) return;
    animPrune.t += 1/60;
    const tt=animPrune.t;
    const prog=clamp01(tt/0.55);
    g.save();
    g.translate(animPrune.x, animPrune.y);
    g.rotate(animPrune.ang);
    g.globalAlpha = 0.85*(1-Math.max(0,(tt-0.55)/0.2));
    g.strokeStyle="rgba(245,245,255,0.75)";
    g.lineWidth=4; g.lineCap="round";
    const a=-0.85+prog*1.10;
    g.beginPath(); g.moveTo(0,0); g.lineTo(Math.cos(a)*32,Math.sin(a)*32); g.stroke();
    g.beginPath(); g.moveTo(0,0); g.lineTo(Math.cos(-a)*32,Math.sin(-a)*32); g.stroke();
    g.fillStyle="rgba(202,166,255,0.20)";
    g.beginPath(); g.arc(0,0,9,0,Math.PI*2); g.fill();
    g.restore();
    if(tt>0.8){ animPrune.on=false; animPrune.t=0; }
  }

  function drawTree(w,h,geom){
    const sl=slot();
    const t=sl.tree;
    const tr=sl.model.trunk;
    const hp01=t.hp/100;
    const canopy01=t.canopy/100;
    const shape01=t.shape/100;

    const baseX=w*0.5;
    const baseY=geom.baseY;
    const trunkH = 160*(0.60+canopy01*0.60) + canopy01*160;

    const bark=barkColor(hp01);
    const pal=leafPalette();

    // crown target (für sanftes “bonsai-kronen” pulling)
    const crownH=120*(0.55+canopy01*1.10);
    const crownCX=w*0.5;
    const crownCY=baseY - crownH*0.68;
    const rx=(82 + canopy01*190) * (0.95 + shape01*0.32);
    const ry=(62 + canopy01*140) * (0.92 + shape01*0.28);

    // trunk curve
    const path=trunkBezier(baseX, baseY, trunkH, tr.bend);

    // trunk draw
    const samples=30;
    const pts=[];
    for(let i=0;i<=samples;i++){
      pts.push(bezier(path.p0,path.p1,path.p2,path.p3,i/samples));
    }
    // shadow
    g.save();
    g.globalAlpha=0.20;
    g.strokeStyle="rgba(0,0,0,0.92)";
    g.lineWidth=18*(0.95+canopy01*0.25);
    g.lineCap="round";
    g.beginPath();
    g.moveTo(pts[0].x+6, pts[0].y+4);
    for(let i=1;i<pts.length;i++) g.lineTo(pts[i].x+6, pts[i].y+4);
    g.stroke();
    g.restore();

    // main
    g.save();
    g.lineCap="round";
    const thick0=(18+canopy01*8)-shape01*4+(1-hp01)*2.2;
    for(let i=0;i<pts.length-1;i++){
      const tt=i/(pts.length-1);
      const thick=lerp(thick0, Math.max(3.0, thick0*0.18), tt);
      const col=mix(bark.a, bark.b, tt*0.70);
      g.strokeStyle=rgba(col,0.98);
      g.lineWidth=thick;
      g.beginPath(); g.moveTo(pts[i].x,pts[i].y); g.lineTo(pts[i+1].x,pts[i+1].y); g.stroke();

      g.save();
      g.globalAlpha=0.08;
      g.strokeStyle="rgba(255,255,255,0.55)";
      g.lineWidth=Math.max(1.0, thick*0.22);
      g.beginPath(); g.moveTo(pts[i].x-1.2,pts[i].y-1.0); g.lineTo(pts[i+1].x-1.2,pts[i+1].y-1.0); g.stroke();
      g.restore();
    }
    g.restore();

    // handles for bend
    hit.handles=[];
    const top=path.p3;
    const pivot=bezier(path.p0,path.p1,path.p2,path.p3, tr.bend.pivot);
    if(toolMode==="bend"){
      hit.handles.push({type:"trunkTop", id:"trunkTop", x:top.x,y:top.y,r:12});
      hit.handles.push({type:"trunkPivot", id:"trunkPivot", x:pivot.x,y:pivot.y,r:11});

      g.save();
      g.globalAlpha=0.35;
      g.strokeStyle="rgba(118,228,255,0.55)";
      g.lineWidth=2;
      g.setLineDash([6,6]);
      g.beginPath(); g.moveTo(pivot.x,pivot.y); g.lineTo(top.x,top.y); g.stroke();
      g.restore();

      function drawHandle(x,y,r, fill, stroke){
        g.save();
        g.globalAlpha=0.95;
        g.fillStyle=fill; g.beginPath(); g.arc(x,y,r,0,Math.PI*2); g.fill();
        g.strokeStyle=stroke; g.lineWidth=2; g.beginPath(); g.arc(x,y,r+1,0,Math.PI*2); g.stroke();
        g.restore();
      }
      drawHandle(top.x,top.y,12,"rgba(118,228,255,0.20)","rgba(118,228,255,0.65)");
      drawHandle(pivot.x,pivot.y,11,"rgba(202,166,255,0.18)","rgba(202,166,255,0.65)");
    }

    // branches
    hit.segs=[];
    const alive=tr.branches.slice().sort((a,b)=>a.attachT-b.attachT);

    for(const b of alive){
      const base=bezier(path.p0,path.p1,path.p2,path.p3, clamp(b.attachT,0.18,0.92));

      // length is linear to b.len -> pruning stays exact
      const lenBase=(66 + canopy01*220) * b.len * (0.85 + shape01*0.40);
      const ang=b.baseAngle;
      const bend=b.bend;

      let tipX=base.x + Math.cos(ang)*lenBase;
      let tipY=base.y + Math.sin(ang)*lenBase*0.72 - (22+canopy01*34)*(0.38+shape01*0.55);

      tipX += bend * 58 * (0.45 + canopy01*0.65);
      tipY += bend * 18;

      // sanft in Krone ziehen (nicht hart clampen)
      const pulled=pullIntoEllipse(tipX,tipY,crownCX,crownCY,rx,ry);
      tipX=pulled.x; tipY=pulled.y;

      const tip={x:tipX,y:tipY};
      const thick=Math.max(1.2, thick0*(0.28 + (1-b.attachT)*0.22) * (0.82 + canopy01*0.28));
      const curve=drawBranchCurve(base, tip, thick, b.id);

      // branch tip handle
      if(toolMode==="bend"){
        hit.handles.push({type:"branchTip", id:b.id, x:tip.x,y:tip.y,r:10});
        g.save();
        g.globalAlpha=0.95;
        g.fillStyle="rgba(123,227,154,0.14)";
        g.beginPath(); g.arc(tip.x,tip.y,10,0,Math.PI*2); g.fill();
        g.strokeStyle="rgba(123,227,154,0.70)";
        g.lineWidth=2;
        g.beginPath(); g.arc(tip.x,tip.y,11,0,Math.PI*2); g.stroke();
        g.restore();
      }

      // leaves anchored on curve
      const alpha=(0.55 + smoothstep(canopy01)*0.30) * (0.55 + hp01*0.45) + (b.prunedFlash>0?0.10*b.prunedFlash:0);
      const density=10 + canopy01*26 + (b.leader?8:0);

      if(pal.conifer) drawNeedlesOnCurve(curve.pts, pal, alpha, (b.seed ^ 911)>>>0, density);
      else drawLeavesOnCurve(curve.pts, pal, alpha, (b.seed ^ 911)>>>0, density);
    }
  }

  function render(){
    const w=cv.width, h=cv.height;

    // background
    drawSky(w,h);
    drawClouds(w,h);
    drawBirds(w,h);
    drawMountains(w,h);
    drawBalcony(w,h);

    withCamera(() => {
      const geom=drawPot(w,h);
      drawTree(w,h,geom);
    });

    // prune anim on screen coords (UI level)
    drawPruneAnim();

    // vignette
    const vg=g.createRadialGradient(w*0.55,h*0.35, w*0.18, w*0.55,h*0.35, w*0.92);
    vg.addColorStop(0,"rgba(0,0,0,0)");
    vg.addColorStop(1,"rgba(0,0,0,0.55)");
    g.fillStyle=vg; g.fillRect(0,0,w,h);
  }

  // -----------------------------
  // Prune: find nearest segment, compute exact fraction, set b.len
  // -----------------------------
  function findNearestSeg(wx,wy){
    let best=null, bestD2=1e18;
    for(const s of hit.segs){
      const p=projOnSeg(wx,wy,s.ax,s.ay,s.bx,s.by);
      if(p.d2<bestD2){ bestD2=p.d2; best={seg:s, proj:p}; }
    }
    // threshold scales with zoom (world units)
    const thresh=(16 / S.cam.zoom);
    if(!best || bestD2>thresh*thresh) return null;
    return best;
  }

  function pruneAt(bid, cutFrac){
    const sl=slot();
    const tr=sl.model.trunk;
    const b=tr.branches.find(x=>x.id===bid);
    if(!b) return;

    const before=b.len;
    b.len = clamp(Math.min(b.len, cutFrac), 0.10, 1.0);

    // target wird etwas zurückgesetzt (damit es wie echter Schnitt wirkt)
    b.target = Math.max(b.len, b.target*0.72);

    const removed=clamp((before-b.len)/Math.max(0.001,before), 0, 1);
    if(removed<=0.02) return;

    // stats
    sl.tree.canopy = clamp(sl.tree.canopy - (6.2*(0.55+removed*0.85)), 0, 100);
    sl.tree.shape  = clamp(sl.tree.shape  + (2.2*(0.40+removed*0.70)), 0, 100);
    sl.tree.hp     = clamp(sl.tree.hp     - 1.2*removed, 0, 100);
    b.prunedFlash=1.0;

    // echte Pflanze: nach Schnitt 1-2 neue Triebe (back-budding)
    const rng=mulberry32((b.seed ^ ((S.day*9917)>>>0) ^ ((removed*1e6)|0))>>>0);
    const n=(rng()<0.45)?1:2;

    for(let i=0;i<n;i++){
      if(tr.branches.length>44) break;
      const id="b"+(tr.nextId++);
      const attachT=clamp(b.attachT + (rng()-0.5)*0.08, 0.18, 0.92);
      const ang = b.baseAngle + (rng()-0.5)*1.15 + (i?0.40:-0.35);
      tr.branches.push({
        id, attachT,
        baseAngle: clamp(ang, -2.2, 2.2),
        bend:(rng()-0.5)*0.55,
        len:0.10 + rng()*0.05,
        target:0.16 + rng()*0.16,
        leader:false,
        seed:(rng()*1e9)|0,
        prunedFlash:0
      });
    }

    S.coins += 2;
    S.streak += 1;
    saveNow();
  }

  // -----------------------------
  // Input: pinch zoom + pan + tools
  // -----------------------------
  let drag=null;
  let pointers=new Map();
  let pinch=null;

  function nearestHandle(wx,wy){
    let best=null,bestD2=1e18;
    for(const h of hit.handles){
      const dx=wx-h.x, dy=wy-h.y;
      const d2=dx*dx+dy*dy;
      const rr=(h.r+10)*(h.r+10);
      if(d2<rr && d2<bestD2){bestD2=d2;best=h;}
    }
    return best;
  }

  cv.addEventListener("pointerdown",(e)=>{
    cv.setPointerCapture(e.pointerId);
    const p=screenToWorld(e.clientX,e.clientY);
    pointers.set(e.pointerId, {sx:p.sx, sy:p.sy});

    // pinch start
    if(pointers.size===2){
      const ids=[...pointers.keys()];
      const a=pointers.get(ids[0]), b=pointers.get(ids[1]);
      const dx=b.sx-a.sx, dy=b.sy-a.sy;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const midX=(a.sx+b.sx)/2, midY=(a.sy+b.sy)/2;
      pinch={
        ids,
        startDist:dist,
        startZoom:S.cam.zoom,
        startPanX:S.cam.panX,
        startPanY:S.cam.panY,
        startMidX:midX,
        startMidY:midY,
        worldMid: screenToWorldGiven(midX,midY,S.cam.zoom,S.cam.panX,S.cam.panY)
      };
      drag=null;
      return;
    }

    // one pointer actions
    if(toolMode==="bend"){
      const h=nearestHandle(p.x,p.y);
      const sl=slot();
      const tr=sl.model.trunk;

      if(h){
        if(h.type==="trunkTop"){
          drag={kind:"trunkTop", startWX:p.x, startWY:p.y, startOx:tr.bend.ox, startOy:tr.bend.oy};
          return;
        }
        if(h.type==="trunkPivot"){
          drag={kind:"trunkPivot", startWY:p.y, startPivot:tr.bend.pivot};
          return;
        }
        if(h.type==="branchTip"){
          drag={kind:"branchTip", bid:h.id};
          return;
        }
      }
      // fallback: click near branch -> bend it
      const bs=findNearestSeg(p.x,p.y);
      if(bs) drag={kind:"branchTip", bid:bs.seg.bid};
      return;
    }

    if(toolMode==="prune"){
      const bs=findNearestSeg(p.x,p.y);
      if(!bs) return;
      const frac=clamp((bs.seg.cum0 + bs.proj.t*bs.seg.segLen)/Math.max(1e-6, bs.seg.totalLen), 0.08, 1.0);

      pruneAt(bs.seg.bid, frac);

      // scissors EXACT at cut point
      const scr=worldToScreen(bs.proj.x, bs.proj.y);
      animPrune.on=true; animPrune.t=0;
      animPrune.x=scr.sx; animPrune.y=scr.sy;
      animPrune.ang=Math.atan2(bs.seg.by-bs.seg.ay, bs.seg.bx-bs.seg.ax);

      updateHud();
      return;
    }

    if(toolMode==="water"){
      if(potHit && p.x>=potHit.x && p.x<=potHit.x+potHit.w && p.y>=potHit.y && p.y<=potHit.y+potHit.h){
        actWater();
        updateHud();
      }
      return;
    }

    // toolMode none -> pan drag
    if(toolMode==="none"){
      drag={kind:"pan", startSX:p.sx, startSY:p.sy, startPanX:S.cam.panX, startPanY:S.cam.panY};
    }
  });

  cv.addEventListener("pointermove",(e)=>{
    const r=cv.getBoundingClientRect();
    const sx=(e.clientX-r.left)*(cv.width/r.width);
    const sy=(e.clientY-r.top)*(cv.height/r.height);
    if(pointers.has(e.pointerId)) pointers.set(e.pointerId,{sx,sy});

    // pinch update
    if(pinch && pointers.size>=2){
      const a=pointers.get(pinch.ids[0]);
      const b=pointers.get(pinch.ids[1]);
      if(!a||!b) return;
      const dx=b.sx-a.sx, dy=b.sy-a.sy;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const midX=(a.sx+b.sx)/2, midY=(a.sy+b.sy)/2;

      const newZoom=clamp(pinch.startZoom*(dist/pinch.startDist), 0.85, 2.20);
      // pan so that worldMid stays under the new midpoint
      const wMid=pinch.worldMid;
      const w=cv.width, h=cv.height;
      const cx=w*0.5, cy=h*0.55;
      const newPanX = midX - cx - (wMid.x - cx)*newZoom;
      const newPanY = midY - cy - (wMid.y - cy)*newZoom;

      S.cam.zoom=newZoom;
      S.cam.panX=newPanX;
      S.cam.panY=newPanY;
      $("rngZoom").value=S.cam.zoom;
      updateHud();
      saveNow();
      return;
    }

    // single drag
    if(!drag) return;

    const p=screenToWorld(e.clientX,e.clientY);

    if(drag.kind==="pan"){
      const dsx=sx-drag.startSX;
      const dsy=sy-drag.startSY;
      S.cam.panX=drag.startPanX + dsx;
      S.cam.panY=drag.startPanY + dsy;
      updateHud();
      saveNow();
      return;
    }

    if(drag.kind==="trunkTop"){
      const sl=slot();
      const tr=sl.model.trunk;
      const dx=p.x-drag.startWX;
      const dy=p.y-drag.startWY;
      tr.bend.ox=clamp(drag.startOx+dx, -220, 220);
      tr.bend.oy=clamp(drag.startOy+dy, -90, 70);
      return;
    }

    if(drag.kind==="trunkPivot"){
      const sl=slot();
      const tr=sl.model.trunk;
      const dy=p.y-drag.startWY;
      tr.bend.pivot=clamp(drag.startPivot + dy/260, 0.15, 0.88);
      return;
    }

    if(drag.kind==="branchTip"){
      const sl=slot();
      const tr=sl.model.trunk;
      const b=tr.branches.find(x=>x.id===drag.bid);
      if(!b) return;

      // estimate base: first segment of this branch
      const segs=hit.segs.filter(s=>s.bid===b.id);
      if(!segs.length) return;
      const base={x:segs[0].ax, y:segs[0].ay};

      const vx=p.x-base.x, vy=p.y-base.y;
      const ang=Math.atan2(vy,vx);
      b.baseAngle=clamp(ang, -2.2, 2.2);

      const dirx=Math.cos(ang), diry=Math.sin(ang);
      const proj=vx*dirx + vy*diry;
      const px=base.x + dirx*proj, py=base.y + diry*proj;
      const nx=-diry, ny=dirx;
      const off=((p.x-px)*nx + (p.y-py)*ny);
      b.bend=clamp(off/85, -1.2, 1.2);
      return;
    }
  });

  cv.addEventListener("pointerup",(e)=>{
    pointers.delete(e.pointerId);

    if(pinch && pointers.size<2){
      pinch=null;
      saveNow();
    }

    if(drag){
      // commit bend reward on release
      if(drag.kind==="trunkTop" || drag.kind==="branchTip"){
        const sl=slot();
        sl.tree.shape=clamp(sl.tree.shape + 3.2, 0, 100);
        sl.tree.hp=clamp(sl.tree.hp - 0.25, 0, 100);
        S.coins += 2;
        S.streak += 1;
        saveNow();
        updateHud();
      }else{
        saveNow();
      }
      drag=null;
    }
  });

  cv.addEventListener("pointercancel",(e)=>{
    pointers.delete(e.pointerId);
    pinch=null;
    drag=null;
  });

  // -----------------------------
  // Buttons
  // -----------------------------
  $("waterBtn").addEventListener("click",()=>setTool(toolMode==="water"?"none":"water"));
  $("pruneBtn").addEventListener("click",()=>setTool(toolMode==="prune"?"none":"prune"));
  $("bendBtn").addEventListener("click",()=>setTool(toolMode==="bend"?"none":"bend"));

  $("seasonBtn").addEventListener("click",()=>{
    S.seasonIdx=(S.seasonIdx+1)%SEASONS.length;
    saveNow();
    updateHud();
  });

  $("photoBtn").addEventListener("click",()=>{
    // ohne UI ist hier nicht nötig – wir speichern den Canvas so wie er ist
    const url=cv.toDataURL("image/png");
    const sl=slot();
    sl.photos.push(url);
    if(sl.photos.length>20) sl.photos=sl.photos.slice(-20);
    S.coins += 6;
    S.streak += 1;
    saveNow();

    // download
    const a=document.createElement("a");
    a.href=url;
    a.download=`bonsai_${S.activeSpecies}_day${S.day}.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    updateHud();
  });

  $("newTree").addEventListener("click",()=>{
    const id=S.activeSpecies;
    const seed=((Math.random()*1e9)|0);
    S.slots[id]={ tree:defaultTree(id), model:defaultModel(seed), photos:[] };
    S.streak=0;
    S.coins=Math.max(0,S.coins-10);
    saveNow();
    updateHud();
  });

  $("species").addEventListener("change",()=>{
    const id=$("species").value;
    ensureSlot(id);
    S.activeSpecies=id;
    // Wachstum startet erst ab Auswahl -> wir setzen lastTs neu
    S.meta.lastTs=Date.now();
    saveNow();
    updateHud();
  });

  $("rngZoom").addEventListener("input",()=>{
    S.cam.zoom=clamp(Number($("rngZoom").value), 0.85, 2.20);
    saveNow();
    updateHud();
  });

  $("zoomReset").addEventListener("click",()=>{
    S.cam.zoom=1.22;
    saveNow();
    updateHud();
  });

  $("centerBtn").addEventListener("click",()=>{
    S.cam.panX=0; S.cam.panY=0;
    saveNow();
    updateHud();
  });

  $("doExport").addEventListener("click",()=>{
    $("saveText").value=JSON.stringify(S);
    $("saveText").select();
  });

  $("doImport").addEventListener("click",()=>{
    try{
      const obj=JSON.parse(($("saveText").value||"").trim());
      if(!obj || typeof obj!=="object") return;
      S=obj;
      if(!S.cam) S.cam={zoom:1.22, panX:0, panY:0};
      if(!S.meta) S.meta={lastTs:Date.now(), dayFrac:0};
      if(!S.slots) S.slots={};
      if(!S.activeSpecies) S.activeSpecies="ficus";
      for(const id of Object.keys(S.slots)) ensureSlot(id);
      saveNow();
      rebuildSpeciesSelect();
      updateHud();
      $("saveText").value="";
    }catch{}
  });

  $("doReset").addEventListener("click",()=>{
    localStorage.removeItem(SAVE_KEY);
    S=defaultState();
    saveNow();
    rebuildSpeciesSelect();
    updateHud();
  });

  // -----------------------------
  // Main loop
  // -----------------------------
  let last=performance.now();
  function frame(now){
    const dtReal=Math.min(0.05,(now-last)/1000);
    last=now;

    // nur aktiver Baum wächst (weil tick() immer slot() nutzt)
    const sim=dtReal*SIM.timeScale;
    advanceTime(sim);

    render();
    requestAnimationFrame(frame);
  }

  // Init
  function init(){
    rebuildSpeciesSelect();
    offlineCatchup();
    setTool("none");
    updateHud();
    requestAnimationFrame(frame);
  }
  init();
})();
</script>
