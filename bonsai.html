<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#090a0f">
<title>Bonsai Master v12.1 (Perfect Layout)</title>
<style>
  :root {
    --accent: #38bdf8; 
    --accent-glow: rgba(56, 189, 248, 0.6);
    --success: #34d399; 
    --success-glow: rgba(52, 211, 153, 0.6);
    --danger: #ef4444;
    --danger-glow: rgba(239, 68, 68, 0.6);
    --gold: #fbbf24; 
    --gold-glow: rgba(251, 191, 36, 0.5);
    --text: #ffffff; 
    --text-muted: #94a3b8;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    
    /* Liquid Glass Variables */
    --glass-bg: rgba(15, 20, 30, 0.65);
    --glass-border: rgba(255, 255, 255, 0.15);
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  }
  
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body { 
    margin: 0; 
    height: 100vh; height: 100dvh; 
    background: #000; 
    overflow: hidden; 
    font-family: var(--font); 
    color: var(--text); 
    user-select: none; 
    -webkit-user-select: none;
  }
  
  /* --- CANVAS FULLSCREEN --- */
  .viewport { 
    position: absolute; top: 0; left: 0; 
    width: 100%; height: 100%; 
    z-index: 1; cursor: grab; overflow: hidden; touch-action: none; 
  }
  .viewport:active { cursor: grabbing; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  /* --- UI LAYER (FIXED LAYOUT) --- */
  .ui-layer {
    position: absolute; top: 0; left: 0; 
    width: 100%; height: 100%;
    z-index: 10; pointer-events: none; 
    display: flex; flex-direction: column; justify-content: flex-end;
    /* PERFEKTE UND GLEICHMÄSSIGE ABSTÄNDE FÜR DAS GESAMTE UI */
    padding: 15px; 
    padding-bottom: calc(15px + env(safe-area-inset-bottom));
    gap: 15px;
  }

  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    pointer-events: auto;
  }

  /* --- BOTTOM UI AREA --- */
  .bottom-area {
    display: flex; flex-direction: column; gap: 15px; width: 100%;
  }

  /* Stats Panel */
  .stats-panel {
    border-radius: 20px; padding: 15px 20px;
    border-top: 1px solid rgba(255,255,255,0.2);
    display: flex; flex-direction: column; gap: 12px;
  }
  .stat-row-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .stat-group { display: flex; gap: 20px; }
  .stat-item { display: flex; align-items: baseline; gap: 8px; }
  .s-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .s-val { font-size: 14px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.3); transition: color 0.3s; }
  .text-danger { color: var(--danger); text-shadow: 0 0 8px var(--danger-glow); animation: pulseText 2s infinite; }

  @keyframes pulseText { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
  
  .stat-row-bars { display: flex; gap: 15px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .bar-header { display: flex; justify-content: space-between; align-items: flex-end; }
  
  .bar-bg { 
    width: 100%; height: 6px; border-radius: 4px; overflow: hidden;
    background: rgba(255,255,255,0.1);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.8); 
    border: 1px solid rgba(255,255,255,0.1); 
  }
  .bar-fill { height: 100%; transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); border-radius: 4px; }
  .water-color { background: linear-gradient(90deg, #0ea5e9, #38bdf8); box-shadow: 0 0 10px var(--accent-glow); }
  .hp-color { background: linear-gradient(90deg, #10b981, #34d399); box-shadow: 0 0 10px var(--success-glow); }
  .hp-low { background: linear-gradient(90deg, #ef4444, #f87171); box-shadow: 0 0 10px var(--danger-glow); }

  /* Tools Container */
  .tools-panel {
    border-radius: 20px; padding: 15px;
    border-top: 1px solid rgba(255,255,255,0.2);
  }
  .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  
  .btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text);
    padding: 12px 4px; border-radius: 14px; font-weight: 600; cursor: pointer;
    font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); font-family: inherit;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .btn svg { width: 20px; height: 20px; opacity: 0.7; transition: all 0.3s; }
  .btn:active { transform: scale(0.94); }
  .btn.active { 
    background: rgba(56, 189, 248, 0.15); border-color: rgba(56, 189, 248, 0.5); color: #fff; 
    box-shadow: inset 0 0 15px rgba(56, 189, 248, 0.2), 0 0 10px rgba(56, 189, 248, 0.3); 
  }
  .btn.active svg { opacity: 1; filter: drop-shadow(0 0 5px var(--accent)); }

  /* --- FLOATING DOCK --- */
  .bottom-dock {
    width: 100%; max-width: 450px; margin: 0 auto; /* Zentriert auf großen Bildschirmen */
    border-radius: 25px;
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px; border-top: 1px solid rgba(255,255,255,0.3);
  }
  .nav-item {
    background: transparent; border: none; color: rgba(255,255,255,0.5);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 10px; cursor: pointer; transition: 0.3s; font-family: inherit; font-weight: 600;
  }
  .nav-item svg { width: 22px; height: 22px; transition: all 0.3s; }
  .nav-item.open { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
  .nav-item.open svg { transform: translateY(-3px) scale(1.1); stroke: var(--accent); filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }

  /* --- OVERLAYS --- */
  .overlay-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  .overlay-bg.open { opacity: 1; pointer-events: auto; }

  .overlay-sheet {
    position: fixed; bottom: 0; left: 0; width: 100%; max-height: 85vh; height: 85vh;
    background: rgba(10, 15, 25, 0.95); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    border-radius: 32px 32px 0 0; border-top: 1px solid rgba(255,255,255,0.2);
    padding: 30px 20px calc(30px + env(safe-area-inset-bottom));
    z-index: 50; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
    overflow-y: auto; pointer-events: auto;
  }
  .overlay-sheet.open { transform: translateY(0); }

  .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
  .sheet-header h2 { margin: 0; font-size: 20px; letter-spacing: 1px; font-weight: 700; }
  .close-btn { 
    background: rgba(255,255,255,0.1); border: none; color: var(--text); 
    width: 32px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; font-weight: bold; transition: background 0.2s;
  }
  .close-btn:active { background: rgba(255,255,255,0.2); }

  /* Listen Design */
  .list-item { 
    display: flex; align-items: center; gap: 15px; 
    background: rgba(255,255,255,0.03); padding: 15px; margin-bottom: 12px; border-radius: 20px; 
    border: 1px solid rgba(255,255,255,0.05); position: relative; transition: 0.2s;
  }
  .list-item.active-item { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }
  .tree-preview { 
    width: 50px; height: 50px; border-radius: 12px; background: rgba(0,0,0,0.5); 
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.1); font-size: 24px; flex-shrink: 0;
  }
  .tree-preview img { width: 100%; height: 100%; object-fit: contain; }
  
  .list-content { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
  .list-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sub { font-size: 12px; color: var(--text-muted); }
  
  .action-btn {
    padding: 8px 16px; border-radius: 12px; border: none; font-weight: 600; font-size: 12px; cursor: pointer;
    background: rgba(255,255,255,0.1); color: var(--text); transition: 0.2s;
  }
  .action-btn.buy { background: rgba(251, 191, 36, 0.2); color: var(--gold); border: 1px solid rgba(251, 191, 36, 0.5); }
  .action-btn.sell { background: rgba(248, 113, 113, 0.15); color: #fca5a5; border: 1px solid rgba(248, 113, 113, 0.4); }
  .action-btn:active { transform: scale(0.95); }

  .quest-btn { 
    padding: 10px 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 12px;
    background: rgba(255,255,255,0.1); color: var(--text-muted); transition: 0.3s;
  }
  .quest-btn.ready { 
    background: var(--success); color: #000; box-shadow: 0 0 15px var(--success-glow);
    animation: pulse 1.5s infinite; cursor: pointer;
  }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

  .set-row { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  .set-header { display: flex; justify-content: space-between; align-items: baseline; }
  input[type=range] { width: 100%; accent-color: var(--accent); margin: 0; }

  .toast { 
    position: fixed; top: env(safe-area-inset-top, 40px); left: 50%; transform: translateX(-50%);
    background: rgba(20, 25, 35, 0.9); color: var(--gold); border: 1px solid rgba(251, 191, 36, 0.5);
    padding: 14px 28px; border-radius: 20px; pointer-events: none; opacity: 0; 
    transition: opacity 0.4s, transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
    font-weight: 700; font-size: 14px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 15px); }
</style>
</head>
<body>

<div class="viewport" id="viewport">
  <canvas id="cv"></canvas>
  <div id="toast" class="toast">Nachricht</div>
</div>

<div class="ui-layer">
  
  <div class="bottom-area">
    <div class="stats-panel glass">
      <div class="stat-row-top">
        <div class="stat-group">
          <div class="stat-item"><span class="s-label">Alter</span><span class="s-val" id="uiDay">Tag 0</span></div>
          <div class="stat-item"><span class="s-label">Saison</span><span class="s-val" id="uiSeason" style="color:var(--accent); text-shadow:0 0 8px var(--accent-glow)">Sommer</span></div>
        </div>
        <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end; justify-content: center; margin-left: 15px;">
          <div style="display:flex; align-items:center; gap:6px; cursor: pointer;" onclick="renameActiveTree()">
             <span class="s-val" id="uiTreeName" style="font-size: 15px; font-weight: 700;">Baum</span>
             <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <span class="s-label" id="uiSpeciesName" style="color: var(--accent); margin-top: 2px;">Spezies</span>
        </div>
      </div>
      <div class="stat-row-bars">
        <div class="bar-wrap">
          <div class="bar-header"><span class="s-label" style="color:#fff">Wasser</span><span class="s-label" id="uiWaterVal" style="color:#fff">100%</span></div>
          <div class="bar-bg"><div class="bar-fill water-color" id="barWater" style="width:100%"></div></div>
        </div>
        <div class="bar-wrap">
          <div class="bar-header"><span class="s-label" style="color:#fff">Vitalität</span><span class="s-label" id="uiHpVal" style="color:#fff">100%</span></div>
          <div class="bar-bg"><div class="bar-fill hp-color" id="barHp" style="width:100%"></div></div>
        </div>
      </div>
    </div>

    <div class="tools-panel glass">
      <div class="btn-grid">
        <button class="btn" id="toolWater" onclick="setTool('water')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg> Gießen
        </button>
        <button class="btn" id="toolPrune" onclick="setTool('prune')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg> Schnitt
        </button>
        <button class="btn" id="toolGraft" onclick="setTool('graft')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg> Veredeln
        </button>
        <button class="btn" id="toolBend" onclick="setTool('bend')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12c12 0 11 9 18 9"/></svg> Biegen
        </button>
      </div>
    </div>
  </div>

  <div class="bottom-dock glass">
    <button class="nav-item tab-btn" onclick="openPanel('panel_collection')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22h20L12 2z"/></svg> Bäume
    </button>
    <button class="nav-item tab-btn" onclick="openPanel('panel_shop')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Shop
    </button>
    <button class="nav-item tab-btn" onclick="openPanel('panel_quests')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Ziele
    </button>
    <button class="nav-item tab-btn" onclick="openPanel('panel_settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> System
    </button>
  </div>
</div>

<div class="overlay-bg" id="overlayBg" onclick="closeAllPanels()"></div>
<div class="overlay-sheet" id="panel_collection"><div class="sheet-header"><h2 style="color:var(--accent)">Baumschule</h2><button class="close-btn" onclick="closeAllPanels()">✕</button></div><div class="s-label" style="margin-bottom:10px;">Deine Bonsais</div><div id="collectionList"></div><div class="s-label" style="margin-top:25px; margin-bottom:10px;">Samen & Setzlinge kaufen</div><div id="speciesList"></div></div>
<div class="overlay-sheet" id="panel_shop"><div class="sheet-header"><h2 style="color:var(--gold)">Bonsai Shop</h2><button class="close-btn" onclick="closeAllPanels()">✕</button></div><div id="shopMoneyDisplay" style="text-align:right; font-weight:700; color:var(--gold); margin-bottom:20px; font-size:16px;">Guthaben: 0 💰</div><div class="s-label" style="margin-bottom:10px;">Töpfe & Schalen</div><div id="shopPotsList"></div><div class="s-label" style="margin-top:25px; margin-bottom:10px;">Substrate</div><div id="shopSoilsList"></div></div>
<div class="overlay-sheet" id="panel_quests"><div class="sheet-header"><h2 style="color:var(--success)">Deine Reise</h2><button class="close-btn" onclick="closeAllPanels()">✕</button></div><div class="s-label">Aktuelle Ziele</div><div id="questList" style="margin-top:10px"></div></div>
<div class="overlay-sheet" id="panel_settings">
  <div class="sheet-header"><h2 style="color:var(--text-muted)">Einstellungen</h2><button class="close-btn" onclick="closeAllPanels()">✕</button></div>
  <button class="btn" onclick="toggleFullScreen()" style="width:100%; margin-bottom:15px; background:rgba(255,255,255,0.1); font-size:13px; padding:15px; flex-direction:row;">🔲 Vollbild umschalten</button>
  <button class="btn" onclick="cheatMoney()" style="width:100%; margin-bottom:25px; background:rgba(251, 191, 36, 0.15); color:var(--gold); border-color:var(--gold); font-size:13px; padding:15px; flex-direction:row;">💰 +1000 Geld (Cheat)</button>
  <div id="settingsGrid"></div>
  <br>
  <button class="btn" onclick="hardReset()" style="width:100%; background:rgba(239,68,68,0.15); color:#ef4444; border-color:#ef4444; margin-top:20px; font-size:13px; padding:15px; flex-direction:row;">Spielstand Löschen (Hard Reset)</button>
</div>

<script>
const $ = id => document.getElementById(id);
const cv = $('cv');
const ctx = cv.getContext('2d', {alpha: false});
const thumbCanvas = document.createElement('canvas');
thumbCanvas.width = 150; thumbCanvas.height = 150;
const thumbCtx = thumbCanvas.getContext('2d');

const SPECIES = {
  ficus: { name: "Ficus Retusa", leaf: "oval", color:["#166534","#4ade80"], bark:["#5D4037","#3E2723"], growth: 1.0, cost: 0 },
  pine:  { name: "Schwarzkiefer", leaf: "needle", color:["#064e3b","#10b981"], bark:["#424242","#212121"], growth: 0.6, cost: 300 },
  maple: { name: "Roter Ahorn", leaf: "maple", color:["#7f1d1d","#ef4444"], bark:["#5d4037","#3e2723"], growth: 0.8, cost: 500 },
  sakura:{ name: "Sakura Kirsche", leaf: "oval", color:["#be185d","#f9a8d4"], bark:["#5d4037","#3e2723"], growth: 0.9, cost: 800 },
  willow:{ name: "Trauerweide", leaf: "long", color:["#365314","#bef264"], bark:["#424242","#212121"], growth: 1.3, weeping:true, cost: 1200 },
  jade:  { name: "Geldbaum", leaf: "fat", color:["#14532d","#22c55e"], bark:["#795548","#5d4037"], growth: 0.7, cost: 1500 },
  blue:  { name: "Blue Mystique", leaf: "maple", color:["#1e3a8a","#60a5fa"], bark:["#263238","#102027"], growth: 1.1, cost: 2000 },
  hemp:  { name: "Green Power", leaf: "hemp", color:["#1a2e05","#84cc16"], bark:["#33691E","#1B5E20"], growth: 1.5, cost: 4200 }
};

const ITEMS = {
  pot_basic: { type:'pot', name:"Plastiktopf", cost:0, bonus:1.0 },
  pot_clay:  { type:'pot', name:"Terrakotta", cost:300, bonus:1.1 },
  pot_zen:   { type:'pot', name:"Zen Schale", cost:900, bonus:1.25 },
  soil_basic:{ type:'soil', name:"Gartenerde", cost:0, boost:1.0 },
  soil_aka:  { type:'soil', name:"Akadama", cost:200, boost:1.3 },
  soil_bio:  { type:'soil', name:"Bio-Boost", cost:500, boost:2.0 }
};

let SETTINGS = { secPerDay: 60, growMult: 1.0, thickMult: 1.0, sproutChance: 0.03, maxLeaves: 50, leafRate: 0.2, leafSizeMult: 1.0, waterDrain: 5.0, windSpeed: 0.5, timeWarp: 1.0 };
let STATE = { money: 500, trees: [], activeIdx: 0, inventory: { pots:['pot_basic'], soils:['soil_basic'], species:['ficus'] }, stats: { totalWaters:0, totalPrunes:0, totalDays:0, itemsBought:0 }, quests: [] };
let ENV = { dayTime:0.3, clouds:[], stars:Array.from({length:150},()=>({x:Math.random(),y:Math.random(),s:Math.random()*1.5})), particles:[], fallingParts:[], swipeTrail:[], pebbles: [] };
let CAM = { x:0, y:0, zoom:1.0 };
let MOUSE = { drag:false, x:0, y:0, worldX:0, worldY:0, down:false };
let INPUT = "none", HOVER = null, BEND_TARGET = null;
let lastT = 0, lastUiT = 0;
let lastTouchDist = 0;
const previewCache = {};

class Branch {
  constructor(p, x, y, a, ml, th, d) { 
    this.parent=p; this.depth=d||0; this.x=x; this.y=y; this.endX=x; this.endY=y; 
    this.angle=a; this.targetAngle=a; this.len=0.1; this.maxLen=ml; this.thick=th; 
    this.children=[]; this.leaves=[]; this.cut=false; this.sprouted=false; this.grafted=false; this.windPhase=Math.random()*10; 
  }
  serialize() { return { x:this.x, y:this.y, a:this.angle, ta:this.targetAngle, l:this.len, ml:this.maxLen, th:this.thick, d:this.depth, cut:this.cut, spr:this.sprouted, gr:this.grafted, leaves:this.leaves, c:this.children.map(c=>c.serialize()) }; }
  static deserialize(d, p) { let b=new Branch(p,d.x,d.y,d.a,d.ml,d.th,d.d); b.len=d.l; b.targetAngle=d.ta; b.cut=d.cut; b.sprouted=d.spr; b.grafted=d.gr; b.leaves=d.leaves||[]; if(d.c) b.children=d.c.map(cd=>Branch.deserialize(cd,b)); return b; }
}

class Tree {
  constructor(k, n) { 
    this.key=k; this.name=n; this.days=0; this.water=100; this.hp=100; 
    this.pot='pot_basic'; this.soil='soil_basic'; 
    this.root=new Branch(null,0,0,-Math.PI/2,110,20,0); 
  }
  serialize() { return { key:this.key, name:this.name, days:this.days, water:this.water, hp:this.hp, pot:this.pot, soil:this.soil, root:this.root.serialize() }}
  static deserialize(d) { let t=new Tree(d.key, d.name); t.days=d.days; t.water=d.water; t.hp=d.hp||100; t.pot=d.pot||'pot_basic'; t.soil=d.soil||'soil_basic'; t.root=Branch.deserialize(d.root,null); return t; }
}

function loadGame() {
  const saved = localStorage.getItem('bonsaiSave121');
  if(saved) { 
    try { 
      let data=JSON.parse(saved); STATE.money=data.money||500; STATE.inventory=data.inventory||{pots:['pot_basic'],soils:['soil_basic'],species:['ficus']}; 
      STATE.stats=data.stats||{totalWaters:0,totalPrunes:0,totalDays:0,itemsBought:0}; STATE.quests=data.quests||[]; 
      if(data.trees&&data.trees.length){ STATE.trees=data.trees.map(t=>Tree.deserialize(t)); } 
      STATE.activeIdx=data.activeIdx||0; if(STATE.activeIdx>=STATE.trees.length) STATE.activeIdx=0; 
    } catch(e){console.error(e);} 
  }
}

function saveGame() { 
  localStorage.setItem('bonsaiSave121', JSON.stringify({ 
    money:STATE.money, activeIdx:STATE.activeIdx, inventory:STATE.inventory, 
    stats:STATE.stats, quests:STATE.quests, trees:STATE.trees.map(t=>t.serialize()) 
  })); 
}

function generatePebbles() {
    ENV.pebbles = [];
    for(let i=-400; i<400; i+=12) {
        if(Math.abs(i) < 85) continue; 
        ENV.pebbles.push({
            x: i + (Math.random()-0.5)*10,
            y: 58 + (Math.random()-0.5)*5,
            rx: 3 + Math.random()*3,
            ry: 2 + Math.random()*2,
            rot: Math.random()*3.14
        });
    }
}

function init() {
  cv.width=$('viewport').clientWidth||window.innerWidth; cv.height=$('viewport').clientHeight||window.innerHeight;
  loadGame(); bindSettingsUI(); setupInteractions();
  if(!STATE.trees.length) STATE.trees.push(new Tree('ficus', "Erster Bonsai"));
  if(!STATE.quests||STATE.quests.length===0) generateQuests();
  generatePebbles();
  new ResizeObserver(e=>{for(let E of e){if(E.contentRect.width>0){cv.width=E.contentRect.width;cv.height=E.contentRect.height;}}}).observe($('viewport'));
  updateListUI(); updateRealtimeUI(); requestAnimationFrame(loop); setInterval(saveGame, 5000);
}

function performCut(branch, treeKey) {
    if(branch.cut || !branch.parent) return; 
    branch.cut = true;
    const spec = SPECIES[treeKey];
    function dropChildren(b) {
        const branchLen = Math.hypot(b.endX - b.x, b.endY - b.y);
        ENV.fallingParts.push({ type:'branch', x:b.x, y:b.y, len:branchLen, a:b.angle, th:b.thick, col:spec.bark[0], vx:(Math.random()-0.5)*50, vy:Math.random()*50, vr:(Math.random()-0.5)*5, onGround:false, decay:5.0 });
        b.leaves.forEach(l => {
            const px=b.x+(b.endX-b.x)*l.f, py=b.y+(b.endY-b.y)*l.f;
            ENV.fallingParts.push({ type:'leaf', x:px, y:py, a:b.angle+l.r, s:l.s, cols:spec.color, leafType:spec.leaf, vx:(Math.random()-0.5)*60, vy:Math.random()*60, vr:(Math.random()-0.5)*7, onGround:false, decay:5.0 });
        });
        b.children.forEach(dropChildren);
    }
    dropChildren(branch);
    branch.children=[]; 
    branch.leaves=[];
    STATE.stats.totalPrunes++;
}

function doSegmentsIntersect(p0, p1, p2, p3) {
    let s1_x = p1.x - p0.x, s1_y = p1.y - p0.y;
    let s2_x = p3.x - p2.x, s2_y = p3.y - p2.y;
    let denom = -s2_x * s1_y + s1_x * s2_y;
    if (denom === 0) return false;
    let s = (-s1_y * (p0.x - p2.x) + s1_x * (p0.y - p2.y)) / denom;
    let t = ( s2_x * (p0.y - p2.y) - s2_y * (p0.x - p2.x)) / denom;
    return (s >= 0 && s <= 1 && t >= 0 && t <= 1);
}

function setupInteractions() {
  let lastWorldX = null, lastWorldY = null;
  let lastScreenX = null, lastScreenY = null;

  const getPos = e => { 
    let rect=cv.getBoundingClientRect(); 
    let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left; 
    let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top; 
    let camBaseY = cv.height * 0.55;
    MOUSE.worldX=(x-(cv.width/2+CAM.x))/CAM.zoom; 
    MOUSE.worldY=(y-(camBaseY+CAM.y))/CAM.zoom; 
    return {x,y}; 
  };
  
  const findNearestBranch = (root, tx, ty, maxDist) => {
    let nearest=null, minDist=maxDist;
    const search = b => {
      let mx=b.x+(b.endX-b.x)/2, my=b.y+(b.endY-b.y)/2;
      let dist=Math.min(Math.hypot(b.endX-tx, b.endY-ty), Math.hypot(mx-tx, my-ty));
      if(dist<minDist){ minDist=dist; nearest=b; }
      b.children.forEach(search);
    };
    search(root); return nearest;
  };

  cv.addEventListener('pointerdown', e => {
    MOUSE.down=true; 
    let p = getPos(e); 
    lastWorldX = MOUSE.worldX;
    lastWorldY = MOUSE.worldY;
    lastScreenX = p.x;
    lastScreenY = p.y;

    if(!STATE.trees[STATE.activeIdx])return;

    if(INPUT==='none') {
        MOUSE.drag = true;
    } else if(INPUT==='prune') {
        ENV.swipeTrail = [{x: MOUSE.worldX, y: MOUSE.worldY, life: 1.0}];
        HOVER=findNearestBranch(STATE.trees[STATE.activeIdx].root, MOUSE.worldX, MOUSE.worldY, 40);
        if(HOVER) {
            performCut(HOVER, STATE.trees[STATE.activeIdx].key);
            notify("Schnitt!");
        }
    } else if(INPUT!=='water') {
        HOVER=findNearestBranch(STATE.trees[STATE.activeIdx].root, MOUSE.worldX, MOUSE.worldY, 40);
        if(HOVER) {
          if(INPUT==='graft') {
            if(HOVER.cut) { 
                HOVER.cut=false; HOVER.sprouted=false; notify("Ast geheilt!"); 
            } else { 
                let dev=(Math.random()-0.5)*1.5; 
                let newThick = Math.max(1, HOVER.thick * 0.7); 
                HOVER.children.push(new Branch(HOVER,0,0,HOVER.angle+dev,HOVER.maxLen*0.7,newThick,HOVER.depth+1)); 
                notify("Neuer Trieb veredelt!"); 
            }
          } else if(INPUT==='bend') { BEND_TARGET=HOVER; }
        }
    }
  });

  cv.addEventListener('pointermove', e => {
    let p = getPos(e);
    
    if(MOUSE.drag && MOUSE.down) {
        let dx = p.x - lastScreenX;
        let dy = p.y - lastScreenY;
        CAM.x += dx;
        CAM.y += dy;
        let camBaseY = cv.height * 0.55;
        MOUSE.worldX=(p.x-(cv.width/2+CAM.x))/CAM.zoom; 
        MOUSE.worldY=(p.y-(camBaseY+CAM.y))/CAM.zoom;
    }

    if(MOUSE.down && INPUT === 'prune') {
        ENV.swipeTrail.push({x: MOUSE.worldX, y: MOUSE.worldY, life: 1.0});
        if(lastWorldX !== null && lastWorldY !== null && STATE.trees[STATE.activeIdx]) {
            let p0 = {x: lastWorldX, y: lastWorldY};
            let p1 = {x: MOUSE.worldX, y: MOUSE.worldY};
            let cutHappened = false;
            
            function checkCut(b) {
                if(b.cut) return;
                if(b.parent) {
                    let b0 = {x: b.x, y: b.y};
                    let b1 = {x: b.endX, y: b.endY};
                    if(doSegmentsIntersect(p0, p1, b0, b1)) {
                        performCut(b, STATE.trees[STATE.activeIdx].key);
                        cutHappened = true;
                    }
                }
                b.children.forEach(checkCut);
            }
            checkCut(STATE.trees[STATE.activeIdx].root);
            if(cutHappened) notify("Slice!"); 
        }
    }
    else if(MOUSE.down && INPUT==='bend' && BEND_TARGET) { 
      let oldAngle = BEND_TARGET.targetAngle;
      let rawNewAngle = Math.atan2(MOUSE.worldY-BEND_TARGET.y, MOUSE.worldX-BEND_TARGET.x); 
      let angleDiff = rawNewAngle - oldAngle;
      angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));

      BEND_TARGET.targetAngle += angleDiff; 
      
      function propagateBend(b, diff) {
        b.children.forEach(c => { c.targetAngle += diff * 0.6; propagateBend(c, diff * 0.6); });
      }
      propagateBend(BEND_TARGET, angleDiff);
    } 
    else if(!MOUSE.down && INPUT!=='water' && INPUT!=='none' && INPUT!=='prune' && STATE.trees[STATE.activeIdx]) { 
        HOVER=findNearestBranch(STATE.trees[STATE.activeIdx].root, MOUSE.worldX, MOUSE.worldY, 40); 
    }

    lastWorldX = MOUSE.worldX;
    lastWorldY = MOUSE.worldY;
    lastScreenX = p.x;
    lastScreenY = p.y;
  });

  function handlePointerUp() {
      MOUSE.down=false; 
      MOUSE.drag=false;
      BEND_TARGET=null; 
      lastWorldX = null;
      lastWorldY = null;
      lastScreenX = null;
      lastScreenY = null;
  }

  window.addEventListener('mouseup', handlePointerUp);
  window.addEventListener('touchend', handlePointerUp);

  cv.addEventListener('wheel', e => {
      e.preventDefault();
      CAM.zoom = Math.min(Math.max(0.3, CAM.zoom - e.deltaY * 0.001), 4);
  });

  cv.addEventListener('touchstart', e => {
      if(e.touches.length === 2) {
          lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          MOUSE.drag = false;
      }
  }, {passive: false});

  cv.addEventListener('touchmove', e => {
      if(e.touches.length === 2) {
          let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          CAM.zoom = Math.min(Math.max(0.3, CAM.zoom + (dist - lastTouchDist) * 0.01), 4);
          lastTouchDist = dist;
      }
      if(INPUT !== 'none') e.preventDefault();
  }, {passive: false});
}

function setTool(t) { 
    INPUT=(INPUT===t?"none":t); 
    document.querySelectorAll('.tools-panel .btn').forEach(b=>b.classList.remove('active')); 
    if(INPUT!=="none")$(INPUT==='water'?'toolWater':INPUT==='prune'?'toolPrune':INPUT==='graft'?'toolGraft':'toolBend').classList.add('active'); 
}

function loop(now) {
  if(!now)now=performance.now(); let dt=(now-lastT)/1000; if(dt>0.1)dt=0.1; lastT=now;
  update(dt); draw();
  if(now-lastUiT>500){ updateRealtimeUI(); lastUiT=now; }
  requestAnimationFrame(loop);
}

function update(dt) {
  const tree=STATE.trees[STATE.activeIdx]; if(!tree)return;
  const spec=SPECIES[tree.key], soil=ITEMS[tree.soil]||{boost:1}, pot=ITEMS[tree.pot]||{bonus:1};
  
  ENV.dayTime+=(dt/SETTINGS.secPerDay)*(SETTINGS.timeWarp||1); 
  if(ENV.dayTime>1){ ENV.dayTime-=1; tree.days++; STATE.stats.totalDays++; }
  
  if(tree.water>0) tree.water-=(SETTINGS.waterDrain*soil.boost/SETTINGS.secPerDay)*dt; 
  else tree.hp-=2*dt;
  
  tree.water=Math.max(0,Math.min(100,tree.water)); 
  tree.hp=Math.max(0,Math.min(100,tree.hp));
  
  const growth=(tree.water>10?1:0.1)*spec.growth*soil.boost*pot.bonus*SETTINGS.growMult;
  
  if(ENV.clouds.length<8&&Math.random()<0.02) ENV.clouds.push({x:-300,y:50+Math.random()*200,s:0.8+Math.random()*1.2,v:0.1+Math.random()*0.2});

  if(INPUT==='water'&&MOUSE.down) {
      for(let i=0;i<3;i++) ENV.particles.push({x:MOUSE.worldX+(Math.random()-0.5)*30, y:Math.min(MOUSE.worldY,-50)+(Math.random()-0.5)*10, vx:(Math.random()-0.5)*15, vy:120+Math.random()*80, life:2.0});
  }
  for(let i=ENV.particles.length-1;i>=0;i--) { 
      let p=ENV.particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; 
      if(p.y>0&&p.y<70&&p.x>-90&&p.x<90){ tree.water=Math.min(100,tree.water+1.5); STATE.stats.totalWaters+=0.05; ENV.particles.splice(i,1); } 
      else if(p.life<=0) ENV.particles.splice(i,1); 
  }

  for(let i=ENV.swipeTrail.length-1; i>=0; i--) {
      ENV.swipeTrail[i].life -= dt * 4;
      if(ENV.swipeTrail[i].life <= 0) ENV.swipeTrail.splice(i, 1);
  }

  const gravity = 300;
  for(let i=ENV.fallingParts.length-1; i>=0; i--) {
      let p = ENV.fallingParts[i];
      if(!p.onGround) {
          p.vy += gravity*dt; p.x += p.vx*dt; p.y += p.vy*dt; p.a += p.vr*dt;
          
          let groundYAtX = 55;
          if(p.x > -80 && p.x < 80) {
             groundYAtX = -2 + (Math.random() * 4);
          }

          if(p.y > groundYAtX) {
             p.y = groundYAtX; 
             p.onGround = true; 
             p.a = Math.random()*6.28;
             p.vx = 0; p.vy = 0; p.vr = 0;
          }
      } else {
          p.decay -= dt;
          if(p.decay <= 0) ENV.fallingParts.splice(i, 1);
      }
  }

  function sim(b,rx,ry) {
    if(!b.parent){b.x=rx;b.y=ry;}else{b.x=b.parent.endX;b.y=b.parent.endY;}
    
    let finalTargetAngle = b.targetAngle;
    if (b.depth > 0 && SETTINGS.windSpeed > 0.01) {
        const windIntensity = (SETTINGS.windSpeed * 0.08) * (b.depth / Math.max(1, b.thick * 0.8));
        const windOscillation = Math.sin(Date.now() * 0.0008 * SETTINGS.windSpeed + b.windPhase + b.depth * 0.3);
        finalTargetAngle += windOscillation * windIntensity;
    }
    
    let diff = finalTargetAngle - b.angle;
    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
    b.angle += diff * (2.5 * dt);
    
    if(!b.cut&&b.len<b.maxLen&&tree.hp>0){
      b.len+=8*dt*growth; 
      if(b.len>15) b.thick += 0.1 * dt * growth * SETTINGS.thickMult;
      
      const thresh = b.maxLen * 0.7; 
      if(b.depth>0 && b.len>thresh && b.leaves.length<SETTINGS.maxLeaves && Math.random() < (SETTINGS.leafRate*2)) {
          b.leaves.push({ f:0.6+Math.random()*0.4, r:Math.random()*6.28, s:0.1, ms:(8+Math.random()*6)*SETTINGS.leafSizeMult });
      }
      
      if(b.len>b.maxLen*0.6&&!b.sprouted&&b.thick>3.0&&Math.random()<SETTINGS.sproutChance*growth){ 
          b.sprouted=true; let cnt=Math.random()>0.4?2:1; 
          for(let i=0;i<cnt;i++){ 
              let dev=(Math.random()-0.5)*1.5; if(spec.weeping)dev=Math.abs(dev)+1.2; 
              b.children.push(new Branch(b,0,0,b.angle+dev,b.maxLen*(0.6+Math.random()*0.3), b.thick*0.7, b.depth+1)); 
          }
      }
    }
    
    if(b.cut&&b.leaves.length>0){ b.leaves.forEach(l=>l.s=Math.max(0,l.s-5*dt)); b.leaves=b.leaves.filter(l=>l.s>0); } 
    else for(let l of b.leaves)if(l.s<l.ms)l.s+=10*dt;
    
    b.endX = b.x + Math.cos(b.angle) * b.len;
    b.endY = b.y + Math.sin(b.angle) * b.len;
    
    b.children.forEach(c=>sim(c,0,0));
  }
  sim(tree.root,0,0); checkQuests();
}

// ---------------- RENDER ----------------
function draw() {
  const w=cv.width, h=cv.height, t=ENV.dayTime; if(isNaN(t)||w===0||h===0)return;
  
  const skyCols = [
      ["#0F172A", "#1E293B", "#334155"], 
      ["#FF7E5F", "#FEB47B", "#FFD194"], 
      ["#4FA1F0", "#89CFF0", "#CBEFFF"], 
      ["#FA8BFF", "#2BD2FF", "#2BFF88"]  
  ];
  
  let si=Math.floor(t*4)%4, ni=(si+1)%4, f=(t*4)%1; 
  const hexToRgb = hex => hex.match(/[a-f0-9]{2}/gi).map(v => parseInt(v, 16));
  const mix = (c1, c2) => c1.map((v, i) => Math.round(v + (c2[i] - v) * f));
  const rgbToStr = c => `rgb(${c.join(',')})`;
  
  const c1 = rgbToStr(mix(hexToRgb(skyCols[si][0]), hexToRgb(skyCols[ni][0])));
  const c2 = rgbToStr(mix(hexToRgb(skyCols[si][1]), hexToRgb(skyCols[ni][1])));
  const c3 = rgbToStr(mix(hexToRgb(skyCols[si][2]), hexToRgb(skyCols[ni][2])));

  const grd=ctx.createLinearGradient(0,0,0,h); 
  grd.addColorStop(0, c1); grd.addColorStop(0.5, c2); grd.addColorStop(1, c3);
  ctx.fillStyle=grd; ctx.fillRect(0,0,w,h);
  
  if(t<0.25||t>0.75){ 
      ctx.fillStyle="#fff"; 
      ENV.stars.forEach(s=>{ 
          ctx.globalAlpha=(t<0.25?1-t*4:(t-0.75)*4)*Math.random()*(0.5+Math.sin(Date.now()*0.005*s.s)*0.5); 
          ctx.beginPath(); ctx.arc(s.x*w,s.y*h*0.7,s.s,0,6.28); ctx.fill(); 
      }); 
      ctx.globalAlpha=1; 
  }
  
  const cx=w/2, cy=h*0.8+150, r=h*0.5+100, ang=(t-0.5)*Math.PI; 
  ctx.shadowBlur=100; ctx.shadowColor= t>0.25 && t<0.75 ? "#FDB813" : "#F0F8FF";
  ctx.fillStyle= t>0.25 && t<0.75 ? "#FDB813" : "#F0F8FF";
  ctx.beginPath(); ctx.arc(cx+Math.sin(ang)*r,cy+Math.cos(ang)*r, t>0.25 && t<0.75 ? 55 : 40,0,6.28); ctx.fill();
  ctx.shadowBlur=0;
  
  ctx.fillStyle="rgba(255,255,255,0.25)"; 
  ENV.clouds.forEach(c=>{c.x+=c.v;if(c.x>w+300)c.x=-300; drawCloud(c.x,c.y,c.s);});
  
  const mountGrd = ctx.createLinearGradient(0, h*0.6, 0, h);
  mountGrd.addColorStop(0, "rgba(20, 30, 40, 0.5)");
  mountGrd.addColorStop(1, "rgba(10, 15, 20, 0.9)");
  ctx.fillStyle = mountGrd;
  ctx.beginPath(); ctx.moveTo(0, h);
  for(let i=0; i<=w; i+=50) ctx.lineTo(i, h*0.75 - Math.sin(i*0.01)*30 - Math.cos(i*0.025)*20);
  ctx.lineTo(w, h); ctx.fill();

  ctx.save(); 
  const camBaseY = h * 0.55; 
  ctx.translate(w/2+CAM.x, camBaseY+CAM.y); ctx.scale(CAM.zoom,CAM.zoom); 
  drawWorld(); 
  ctx.restore();
}

function drawCloud(x,y,s){
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.bezierCurveTo(x-40*s, y+20*s, x-40*s, y+70*s, x+60*s, y+70*s);
    ctx.bezierCurveTo(x+160*s, y+70*s, x+160*s, y+40*s, x+120*s, y+20*s);
    ctx.bezierCurveTo(x+160*s, y-30*s, x+110*s, y-50*s, x+80*s, y-30*s);
    ctx.bezierCurveTo(x+50*s, y-60*s, x, y-40*s, x, y);
    ctx.fill();
}

function drawWorld() {
  const t=STATE.trees[STATE.activeIdx]; if(!t)return; const spec=SPECIES[t.key], potH=60;
  
  const groundGrd = ctx.createLinearGradient(0, 55, 0, 5000);
  groundGrd.addColorStop(0, "#1c1917");
  groundGrd.addColorStop(0.02, "#292524");
  groundGrd.addColorStop(1, "#0c0a09");
  ctx.fillStyle = groundGrd;
  ctx.beginPath();
  ctx.moveTo(-5000, 55);
  ctx.lineTo(5000, 55);
  ctx.lineTo(5000, 5000);
  ctx.lineTo(-5000, 5000);
  ctx.fill();
  
  ctx.fillStyle = "rgba(60, 50, 40, 0.6)";
  ENV.pebbles.forEach(p => {
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.rx, p.ry, p.rot, 0, 6.28);
      ctx.fill();
  });

  ctx.fillStyle="#18181b"; ctx.beginPath(); ctx.ellipse(0,0,85,22,0,0,6.28); ctx.fill(); 
  ctx.fillStyle="#271c19"; ctx.beginPath(); ctx.ellipse(0,0,78,18,0,0,6.28); ctx.fill();
  
  if(BEND_TARGET&&INPUT==='bend'){ ctx.beginPath(); ctx.moveTo(BEND_TARGET.x,BEND_TARGET.y); ctx.lineTo(MOUSE.worldX,MOUSE.worldY); ctx.strokeStyle="rgba(250,204,21,0.6)"; ctx.lineWidth=2; ctx.setLineDash([8,8]); ctx.stroke(); ctx.setLineDash([]); }

  ctx.lineCap="round"; ctx.lineJoin="round";
  
  function render(b) {
    if(b.len<1)return; 
    
    ctx.lineWidth = b.thick; 
    ctx.strokeStyle = spec.bark[0];
    
    if(b===HOVER&&INPUT!=='water'&&INPUT!=='none'&&INPUT!=='prune'){ 
        ctx.shadowBlur=15; ctx.shadowColor=(INPUT==='graft'?'#60a5fa':'#facc15'); 
    } else { ctx.shadowBlur=0; }
    
    ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.endX,b.endY); ctx.stroke(); 
    ctx.shadowBlur=0;
    
    if(!b.cut&&b.leaves.length){
       const sIdx=Math.floor(t.days/30)%4; let cols=spec.color; if(sIdx===2&&spec.leaf!=='needle')cols=["#b45309","#d97706"];
       for(let l of b.leaves){
          ctx.save(); ctx.translate(b.x+(b.endX-b.x)*l.f, b.y+(b.endY-b.y)*l.f); ctx.rotate(b.angle+l.r);
          if(spec.leaf==='needle'){ ctx.strokeStyle=cols[0]; ctx.lineWidth=1; for(let i=0;i<5;i++){ ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo((Math.random()-0.5)*l.s*3,-l.s*2); ctx.stroke(); }}
          else{ ctx.fillStyle=cols[0]; ctx.beginPath(); ctx.ellipse(l.s,0,l.s,l.s*(spec.leaf==='fat'?0.5:0.4),0,0,6.28); ctx.fill(); ctx.fillStyle=cols[1]; ctx.beginPath(); ctx.ellipse(l.s,0,l.s*0.6,l.s*0.15,0,0,6.28); ctx.fill(); }
          ctx.restore();
       }
    }
    b.children.forEach(render);
  }
  render(t.root);

  if (ENV.swipeTrail.length > 1) {
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    ctx.shadowBlur = 15; ctx.shadowColor = "#f87171"; 
    for (let i = 1; i < ENV.swipeTrail.length; i++) {
        let p1 = ENV.swipeTrail[i-1];
        let p2 = ENV.swipeTrail[i];
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = `rgba(255, 255, 255, ${p2.life})`;
        ctx.lineWidth = 4 * p2.life;
        ctx.stroke();
    }
    ctx.shadowBlur = 0;
  }

  ENV.fallingParts.forEach(p => {
      ctx.save();
      if(p.onGround) ctx.globalAlpha = Math.min(1, p.decay / 2);
      ctx.translate(p.x, p.y); ctx.rotate(p.a);
      if(p.type === 'branch') { ctx.strokeStyle = p.col; ctx.lineWidth = p.th; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(-p.len/2, 0); ctx.lineTo(p.len/2, 0); ctx.stroke(); }
      else if (p.type === 'leaf') { if(p.leafType === 'needle') { ctx.strokeStyle = p.cols[0]; ctx.lineWidth = 1; for(let i=0; i<5; i++) { ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo((Math.random() - 0.5) * p.s * 3, -p.s * 2); ctx.stroke(); } } else { ctx.fillStyle = p.cols[0]; ctx.beginPath(); ctx.ellipse(p.s, 0, p.s, p.s * (p.leafType === 'fat' ? 0.5 : 0.4), 0, 0, 6.28); ctx.fill(); ctx.fillStyle = p.cols[1]; ctx.beginPath(); ctx.ellipse(p.s, 0, p.s * 0.6, p.s * 0.15, 0, 0, 6.28); ctx.fill(); } }
      ctx.restore();
  });

  const pg=ctx.createLinearGradient(0,0,0,potH); pg.addColorStop(0,"#2a2a2e"); pg.addColorStop(1,"#09090b"); if(t.pot==='pot_clay'){pg.addColorStop(0,"#785346");pg.addColorStop(1,"#2d1d18");} else if(t.pot==='pot_zen'){pg.addColorStop(0,"#1e293b");pg.addColorStop(1,"#020617");}
  ctx.fillStyle=pg; ctx.beginPath(); ctx.moveTo(-85,0); ctx.quadraticCurveTo(-85,potH,-55,potH); ctx.lineTo(55,potH); ctx.quadraticCurveTo(85,potH,85,0); ctx.fill();
  ctx.fillStyle="rgba(56,189,248,0.8)"; ENV.particles.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,4,0,6.28); ctx.fill(); });
}

function notify(m){ const t=$('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
function openPanel(id){ $('overlayBg').classList.add('open'); $(id).classList.add('open'); updateListUI(); }
window.closeAllPanels=()=>{ $('overlayBg').classList.remove('open'); document.querySelectorAll('.overlay-sheet').forEach(s=>s.classList.remove('open')); }

window.renameActiveTree = function() {
  const tree = STATE.trees[STATE.activeIdx];
  if(!tree) return;
  const newName = prompt("Gib deinem Bonsai einen neuen Namen:", tree.name);
  if(newName && newName.trim() !== "") {
    tree.name = newName.trim();
    updateRealtimeUI();
    updateListUI();
    notify("Baum erfolgreich umbenannt!");
  }
}

window.cheatMoney = function() {
  STATE.money += 1000;
  notify("+1000 💰 (Cheat aktiviert)");
  updateListUI();
  updateRealtimeUI();
};

function updateRealtimeUI(){ 
  const t=STATE.trees[STATE.activeIdx]; if(!t)return; 
  $('uiTreeName').innerText = t.name; 
  // FIX: Vermeidet das Anhängen von endlosen Stiften (durch direkte Zuweisung)
  $('uiTreeName').innerHTML = t.name + ' <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" style="display:inline-block; vertical-align:middle; margin-left:4px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  
  $('uiSpeciesName').innerText=SPECIES[t.key].name; 
  $('uiDay').innerText=`Tag ${Math.floor(t.days)}`; 
  $('uiSeason').innerText=["Frühling","Sommer","Herbst","Winter"][Math.floor(t.days/30)%4]; 
  $('uiWaterVal').innerText=Math.round(t.water)+'%'; $('barWater').style.width=t.water+'%'; 
  $('uiHpVal').innerText=Math.round(t.hp)+'%'; $('barHp').style.width=t.hp+'%'; 
  
  if(t.water < 20 || t.hp < 20) {
      $('uiWaterVal').classList.add('text-danger');
      $('uiHpVal').classList.add('text-danger');
  } else {
      $('uiWaterVal').classList.remove('text-danger');
      $('uiHpVal').classList.remove('text-danger');
  }
}

function getPreview(key) {
  if(previewCache[key]) return previewCache[key];
  const pc = document.createElement('canvas'); pc.width=50; pc.height=50; const pctx = pc.getContext('2d');
  const spec = SPECIES[key];
  pctx.translate(25, 45); pctx.strokeStyle = spec.bark[0]; pctx.lineWidth = 4; pctx.lineCap = "round";
  pctx.beginPath(); pctx.moveTo(0,0); pctx.lineTo(0, -15); pctx.stroke();
  pctx.beginPath(); pctx.moveTo(0,-15); pctx.lineTo(-10, -30); pctx.stroke();
  pctx.beginPath(); pctx.moveTo(0,-15); pctx.lineTo(10, -25); pctx.stroke();
  pctx.fillStyle = spec.color[0];
  if(spec.leaf === 'needle') { pctx.beginPath(); pctx.moveTo(-15,-25); pctx.lineTo(0,-45); pctx.lineTo(15,-25); pctx.fill(); }
  else { pctx.beginPath(); pctx.arc(0, -30, 15, 0, Math.PI*2); pctx.fill(); if(spec.leaf === 'long' || spec.weeping) { pctx.beginPath(); pctx.ellipse(0, -25, 18, 10, Math.PI/2, 0, Math.PI*2); pctx.fill(); }}
  return previewCache[key] = pc.toDataURL();
}

function getRealtimeThumbnail(tree) {
    thumbCtx.clearRect(0, 0, 150, 150);
    thumbCtx.save();
    thumbCtx.translate(75, 130); thumbCtx.scale(0.4, 0.4);
    const spec = SPECIES[tree.key];
    thumbCtx.lineCap = "round"; thumbCtx.lineJoin = "round";
    function renderThumb(b) {
        if(b.len<1)return; 
        thumbCtx.lineWidth=b.thick; 
        thumbCtx.strokeStyle=spec.bark[0];
        thumbCtx.beginPath(); thumbCtx.moveTo(b.x,b.y); thumbCtx.lineTo(b.endX,b.endY); thumbCtx.stroke();
        if(!b.cut&&b.leaves.length){
           const sIdx=Math.floor(tree.days/30)%4; let cols=spec.color; if(sIdx===2&&spec.leaf!=='needle')cols=["#b45309","#d97706"];
           for(let l of b.leaves){
              thumbCtx.save(); thumbCtx.translate(b.x+(b.endX-b.x)*l.f, b.y+(b.endY-b.y)*l.f); thumbCtx.rotate(b.angle+l.r);
              if(spec.leaf==='needle'){ thumbCtx.strokeStyle=cols[0]; thumbCtx.lineWidth=1; for(let i=0;i<5;i++){ thumbCtx.beginPath(); thumbCtx.moveTo(0,0); thumbCtx.lineTo((Math.random()-0.5)*l.s*3,-l.s*2); thumbCtx.stroke(); }}
              else{ thumbCtx.fillStyle=cols[0]; thumbCtx.beginPath(); thumbCtx.ellipse(l.s,0,l.s,l.s*(spec.leaf==='fat'?0.5:0.4),0,0,6.28); thumbCtx.fill(); thumbCtx.fillStyle=cols[1]; thumbCtx.beginPath(); thumbCtx.ellipse(l.s,0,l.s*0.6,l.s*0.15,0,0,6.28); thumbCtx.fill(); }
              thumbCtx.restore();
           }
        }
        b.children.forEach(renderThumb);
    }
    renderThumb(tree.root);
    thumbCtx.restore();
    return thumbCanvas.toDataURL();
}

window.sellTree = function(idx) {
  if(STATE.trees.length <= 1) return notify("Letzter Baum!");
  const t = STATE.trees[idx];
  if(t.days < 10) return notify("Noch zu jung (Min. Tag 10).");
  
  const baseCost = SPECIES[t.key].cost || 100;
  const price = Math.floor(baseCost * 0.8 + t.days * 5);
  
  if(confirm(`Möchtest du '${t.name}' für ${price} 💰 verkaufen?`)) {
    STATE.money += price;
    STATE.trees.splice(idx, 1);
    if(STATE.activeIdx >= STATE.trees.length) STATE.activeIdx = Math.max(0, STATE.trees.length - 1);
    else if(STATE.activeIdx > idx) STATE.activeIdx--;
    notify(`Verkauft für ${price} 💰!`);
    switchTree(STATE.activeIdx);
  }
}

function updateListUI(){
  let cH=''; 
  STATE.trees.forEach((t,i)=>{ 
    let a = (i===STATE.activeIdx) ? 'active-item' : ''; 
    let b = (i===STATE.activeIdx) ? `<span style="font-size:12px;color:var(--accent)">Aktiv</span>` : `<button class="action-btn" onclick="switchTree(${i})">Auswählen</button>`; 
    
    let sellBtn = '';
    if(t.days >= 10) {
      let price = Math.floor((SPECIES[t.key].cost || 100) * 0.8 + t.days * 5);
      sellBtn = `<button class="action-btn sell" style="padding:6px 10px; font-size:10px;" onclick="sellTree(${i})">Verkaufen (${price} 💰)</button>`;
    } else {
      sellBtn = `<span style="font-size:9px;color:var(--text-muted)">Wächst (Tag ${Math.floor(t.days)}/10)</span>`;
    }

    cH+=`
      <div class="list-item ${a}" style="flex-wrap: wrap;">
        <div class="tree-preview"><img src="${getRealtimeThumbnail(t)}"></div>
        <div class="list-content">
            <div class="list-title">${t.name}</div>
            <div class="list-sub">Tag ${Math.floor(t.days)} • ${Math.round(t.hp)}% HP</div>
        </div>
        <div style="display:flex; flex-direction:column; gap:6px; align-items: flex-end;">
            ${b}
            ${sellBtn}
        </div>
      </div>`; 
  }); 
  $('collectionList').innerHTML=cH;
  
  let sH=''; 
  for(let k in SPECIES){ 
    if(!STATE.inventory.species.includes(k)){ 
      let s=SPECIES[k]; 
      sH+=`<div class="list-item"><div class="tree-preview"><img src="${getPreview(k)}"></div><div class="list-content"><div class="list-title">${s.name}</div><div class="list-sub">Wachstum x${s.growth}</div></div><button class="action-btn buy" onclick="buySpecies('${k}')">${s.cost} 💰</button></div>`; 
    } else { 
      let s=SPECIES[k]; 
      sH+=`<div class="list-item" style="opacity:0.6"><div class="tree-preview"><img src="${getPreview(k)}"></div><div class="list-content"><div class="list-title">${s.name}</div><div class="list-sub">Freigeschaltet</div></div><button class="action-btn" onclick="plantNew('${k}')">Pflanzen</button></div>`; 
    }
  } 
  $('speciesList').innerHTML=sH;
  
  $('shopMoneyDisplay').innerText=`Guthaben: ${STATE.money} 💰`; let pH='',sH2=''; const tr=STATE.trees[STATE.activeIdx]; for(let k in ITEMS){ let it=ITEMS[k], own=STATE.inventory[it.type+'s'].includes(k), eq=(tr&&tr[it.type]===k), bH=''; if(!own)bH=`<button class="action-btn buy" onclick="buyItem('${k}')">${it.cost} 💰</button>`; else if(!eq)bH=`<button class="action-btn" onclick="equipItem('${k}')">Nutzen</button>`; else bH=`<span style="font-size:12px;color:var(--success)">Aktiv</span>`; let c=`<div class="list-item ${eq?'active-item':''}"><div class="list-content"><div class="list-title">${it.name}</div><div class="list-sub">${it.bonus?'Wachstum +'+Math.round((it.bonus-1)*100)+'%':'Feuchtigkeit +'+Math.round((it.boost-1)*100)+'%'}</div></div>${bH}</div>`; if(it.type==='pot')pH+=c;else sH2+=c; } $('shopPotsList').innerHTML=pH; $('shopSoilsList').innerHTML=sH2;
  let qH=''; STATE.quests.forEach((q,i)=>{ let bc=(q.done&&!q.coll)?'quest-btn ready':'quest-btn', bt=q.coll?'Erledigt':(q.done?`Abholen`:`${Math.floor(q.cur)}/${q.goal}`); qH+=`<div class="list-item"><div class="list-content"><div class="list-title">${q.txt}</div><div class="list-sub">Belohnung: ${q.rew} 💰</div></div><button class="${bc}" onclick="claimQuest(${i})" ${q.coll||(!q.done)?'disabled':''}>${bt}</button></div>`; }); $('questList').innerHTML=qH;
}

window.switchTree=i=>{ STATE.activeIdx=i; INPUT="none"; document.querySelectorAll('.tools-panel .btn').forEach(b=>b.classList.remove('active')); closeAllPanels(); updateRealtimeUI(); };
window.buySpecies=k=>{ if(STATE.money>=SPECIES[k].cost){ STATE.money-=SPECIES[k].cost; STATE.inventory.species.push(k); notify(`${SPECIES[k].name} gekauft!`); updateListUI(); }else notify("Zu wenig Guthaben!"); };
window.plantNew=k=>{ let nr=STATE.trees.length+1; STATE.trees.push(new Tree(k, SPECIES[k].name+" #"+nr)); switchTree(STATE.trees.length-1); notify("Neuer Baum gepflanzt!"); };
window.buyItem=k=>{ let it=ITEMS[k]; if(STATE.money>=it.cost){ STATE.money-=it.cost; STATE.inventory[it.type+'s'].push(k); STATE.stats.itemsBought++; notify(`${it.name} gekauft!`); updateListUI(); }else notify("Zu wenig Guthaben!"); };
window.equipItem=k=>{ let it=ITEMS[k]; if(STATE.trees[STATE.activeIdx]){ STATE.trees[STATE.activeIdx][it.type]=k; updateListUI(); }};
window.claimQuest=i=>{ let q=STATE.quests[i]; if(q.done&&!q.coll){ q.coll=true; STATE.money+=q.rew; notify(`+${q.rew} 💰 erhalten!`); updateListUI(); updateRealtimeUI(); generateQuests(); }};

function generateQuests(){
  if(STATE.quests.length > 0 && !STATE.quests.every(q => q.coll)) return;
  const pool = [{id:'qW',txt:"Gieße deinen Baum (15x)",goal:15,cur:0,rew:150,metric:'totalWaters'},{id:'qP',txt:"Schneide Äste (8x)",goal:8,cur:0,rew:200,metric:'totalPrunes'},{id:'qD',txt:"Erreiche Tag 10",goal:10,cur:0,rew:350,metric:'days'},{id:'qM',txt:"Spare 1000 💰",goal:1000,cur:0,rew:250,metric:'money'},{id:'qI',txt:"Kaufe 2 Items",goal:2,cur:0,rew:300,metric:'itemsBought'}];
  STATE.quests = []; for(let i=0; i<3; i++) { let q = pool[Math.floor(Math.random()*pool.length)]; STATE.quests.push({id:q.id+Date.now()+i, txt:q.txt, goal:q.goal, cur:0, rew:q.rew, done:false, coll:false, metric:q.metric}); }
  checkQuests();
}

function checkQuests(){ let c=false; STATE.quests.forEach(q=>{ if(q.done)return; if(q.metric==='money')q.cur=STATE.money; else if(q.metric==='days')q.cur=STATE.trees[STATE.activeIdx]?.days||0; else q.cur=STATE.stats[q.metric]||0; if(q.cur>=q.goal){q.done=true;c=true;notify("Ziel erreicht!");}}); if(c)updateListUI(); }

function bindSettingsUI(){
  const labels={secPerDay:"Sekunden pro Tag",growMult:"Wachstums-Tempo",thickMult:"Dicken-Wachstum",sproutChance:"Austrieb-Chance",maxLeaves:"Max. Blätter/Ast",windSpeed:"Windstärke",timeWarp:"Zeit-Raffer"};
  const binds=[{id:'inpWind',key:'windSpeed',min:0,max:2,step:0.1}, {id:'inpSec',key:'secPerDay',min:5,max:120,step:1}, {id:'inpGrow',key:'growMult',min:0.1,max:5,step:0.1}, {id:'inpWarp',key:'timeWarp',min:0.1,max:10,step:0.1}, {id:'inpLeaves',key:'maxLeaves',min:10,max:200,step:5}];
  let h=''; binds.forEach(b=>{ h+=`<div class="set-row"><div class="set-header"><span class="s-label">${labels[b.key]||b.key}</span><span class="s-val" id="v_${b.id}">${SETTINGS[b.key]}</span></div><input type="range" id="${b.id}" min="${b.min}" max="${b.max}" step="${b.step}" value="${SETTINGS[b.key]}"></div>`; }); $('settingsGrid').innerHTML=h; binds.forEach(b=>{ let el=$(b.id); if(el)el.oninput=e=>{ let v=parseFloat(e.target.value); SETTINGS[b.key]=v; $(`v_${b.id}`).innerText=v; }; });
}
window.toggleFullScreen=()=>{ if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(e=>{console.log(e);});}else{if(document.exitFullscreen){document.exitFullscreen();}} };

window.hardReset=()=>{ 
  if(confirm("ACHTUNG: Willst du WIRKLICH deinen gesamten Spielstand löschen?")){ 
    localStorage.removeItem('bonsaiSave121'); 
    location.reload(); 
  }
};

init();
