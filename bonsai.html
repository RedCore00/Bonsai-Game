<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#090a0f">
<title>Bonsai Master v7.1 (Full Code Edition)</title>
<style>
  :root {
    --accent: #38bdf8; 
    --accent-glow: rgba(56, 189, 248, 0.6);
    --success: #34d399; 
    --success-glow: rgba(52, 211, 153, 0.6);
    --gold: #fbbf24; 
    --gold-glow: rgba(251, 191, 36, 0.5);
    --text: #ffffff; 
    --text-muted: #94a3b8;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    
    /* Liquid Glass Variables */
    --glass-bg: rgba(15, 20, 30, 0.45);
    --glass-border: rgba(255, 255, 255, 0.15);
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  }
  
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body { 
    margin: 0; 
    height: 100vh; height: 100dvh; 
    background: #000; 
    overflow: hidden; 
    font-family: var(--font); 
    color: var(--text); 
    user-select: none; 
    -webkit-user-select: none;
  }
  
  /* --- CANVAS FULLSCREEN --- */
  .viewport { 
    position: absolute; top: 0; left: 0; 
    width: 100%; height: 100%; 
    z-index: 1; cursor: grab; overflow: hidden; touch-action: none; 
  }
  .viewport:active { cursor: grabbing; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }

  /* --- UI LAYER --- */
  .ui-layer {
    position: absolute; top: 0; left: 0; 
    width: 100%; height: 100%;
    z-index: 10; pointer-events: none; 
    display: flex; flex-direction: column; justify-content: space-between;
  }

  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    pointer-events: auto;
  }

  /* --- TOP HEADER --- */
  .tree-header {
    margin: env(safe-area-inset-top, 20px) 20px 0 20px;
    padding: 10px 18px; border-radius: 18px;
    align-self: flex-start;
    border-top: 1px solid rgba(255,255,255,0.3); 
    border-left: 1px solid rgba(255,255,255,0.2);
  }
  .tree-header h1 { margin: 0; font-size: 18px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
  .tree-header p { margin: 2px 0 0 0; font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

  /* --- BOTTOM UI AREA --- */
  .bottom-area {
    padding: 0 15px calc(85px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 10px;
  }

  /* Stats Panel */
  .stats-panel {
    border-radius: 20px; padding: 15px;
    border-top: 1px solid rgba(255,255,255,0.2);
    display: flex; flex-direction: column; gap: 12px;
  }
  .stat-row-top { display: flex; justify-content: space-between; align-items: baseline; }
  .stat-group { display: flex; gap: 20px; }
  .stat-item { display: flex; align-items: baseline; gap: 8px; }
  .s-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .s-val { font-size: 14px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
  
  .stat-row-bars { display: flex; gap: 15px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .bar-header { display: flex; justify-content: space-between; align-items: flex-end; }
  .bar-bg { 
    width: 100%; height: 6px; border-radius: 4px; overflow: hidden;
    background: rgba(0,0,0,0.4); box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); 
  }
  .bar-fill { height: 100%; transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); border-radius: 4px; }
  .water-color { background: linear-gradient(90deg, #0ea5e9, #38bdf8); box-shadow: 0 0 10px var(--accent-glow); }
  .hp-color { background: linear-gradient(90deg, #10b981, #34d399); box-shadow: 0 0 10px var(--success-glow); }

  /* Tools Container */
  .tools-panel {
    border-radius: 20px; padding: 15px;
    border-top: 1px solid rgba(255,255,255,0.2);
  }
  .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  
  .btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text);
    padding: 12px 4px; border-radius: 14px; font-weight: 600; cursor: pointer;
    font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); font-family: inherit;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .btn svg { width: 20px; height: 20px; opacity: 0.7; transition: all 0.3s; }
  .btn:active { transform: scale(0.94); }
  .btn.active { 
    background: rgba(56, 189, 248, 0.15); border-color: rgba(56, 189, 248, 0.5); color: #fff; 
    box-shadow: inset 0 0 15px rgba(56, 189, 248, 0.2), 0 0 10px rgba(56, 189, 248, 0.3); 
  }
  .btn.active svg { opacity: 1; filter: drop-shadow(0 0 5px var(--accent)); }

  /* --- FLOATING DOCK --- */
  .bottom-dock {
    position: absolute; bottom: env(safe-area-inset-bottom, 15px); left: 50%; transform: translateX(-50%);
    width: calc(100% - 30px); max-width: 450px; border-radius: 25px;
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px; border-top: 1px solid rgba(255,255,255,0.3);
  }
  .nav-item {
    background: transparent; border: none; color: rgba(255,255,255,0.5);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    font-size: 10px; cursor: pointer; transition: 0.3s; font-family: inherit; font-weight: 600;
  }
  .nav-item svg { width: 22px; height: 22px; transition: all 0.3s; }
  .nav-item.open { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
  .nav-item.open svg { transform: translateY(-3px) scale(1.1); stroke: var(--accent); filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5)); }

  /* --- OVERLAYS --- */
  .overlay-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); z-index: 40; opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  .overlay-bg.open { opacity: 1; pointer-events: auto; }

  .overlay-sheet {
    position: fixed; bottom: 0; left: 0; width: 100%; max-height: 85vh;
    background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    border-radius: 32px 32px 0 0; border-top: 1px solid rgba(255,255,255,0.2);
    padding: 30px 20px calc(30px + env(safe-area-inset-bottom));
    z-index: 50; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
    overflow-y: auto; pointer-events: auto;
  }
  .overlay-sheet.open { transform: translateY(0); }

  .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
  .sheet-header h2 { margin: 0; font-size: 20px; letter-spacing: 1px; font-weight: 700; }
  .close-btn { 
    background: rgba(255,255,255,0.1); border: none; color: var(--text); 
    width: 32px; height: 32px; border-radius: 16px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; font-weight: bold; transition: background 0.2s;
  }
  .close-btn:active { background: rgba(255,255,255,0.2); }

  /* Listen Design (Sammlung/Shop/Quests) */
  .list-item { 
    display: flex; align-items: center; gap: 15px; 
    background: rgba(255,255,255,0.03); padding: 15px; margin-bottom: 12px; border-radius: 20px; 
    border: 1px solid rgba(255,255,255,0.05); position: relative;
  }
  .tree-preview { 
    width: 50px; height: 50px; border-radius: 12px; background: #000; 
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .tree-preview canvas { width: 80% !important; height: 80% !important; }
  
  .list-content { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .list-title { font-size: 15px; font-weight: 700; }
  .list-sub { font-size: 12px; color: var(--text-muted); }
  
  /* Quests & Badges */
  .quest-btn { 
    padding: 10px 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 12px;
    background: rgba(255,255,255,0.1); color: var(--text-muted); transition: 0.3s;
  }
  .quest-btn.ready { 
    background: var(--success); color: #000; box-shadow: 0 0 15px var(--success-glow);
    animation: pulse 1.5s infinite; cursor: pointer;
  }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

  .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; }
  .badge { 
    background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); 
    border-radius: 16px; padding: 12px; text-align: center; 
    opacity: 0.4; filter: grayscale(1); transition: 0.4s;
  }
  .badge.unlocked { 
    opacity: 1; filter: grayscale(0); border-color: var(--gold); 
    background: rgba(251, 191, 36, 0.1); box-shadow: inset 0 0 15px rgba(251, 191, 36, 0.1);
  }
  .badge-icon { font-size: 28px; margin-bottom: 8px; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  .badge-name { font-size: 11px; font-weight: 700; display: block; color: var(--text); }

  /* Settings Sliders */
  .set-row { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  .set-header { display: flex; justify-content: space-between; align-items: baseline; }
  input[type=range] { width: 100%; accent-color: var(--accent); margin: 0; }

  /* Toasts */
  .toast { 
    position: fixed; top: env(safe-area-inset-top, 40px); left: 50%; transform: translateX(-50%);
    background: rgba(20, 25, 35, 0.9); color: var(--gold); border: 1px solid rgba(251, 191, 36, 0.5);
    padding: 14px 28px; border-radius: 20px; pointer-events: none; opacity: 0; 
    transition: opacity 0.4s, transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
    font-weight: 700; font-size: 14px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 15px); }

</style>
</head>
<body>

<div class="viewport" id="viewport">
  <canvas id="cv"></canvas>
  <div id="toast" class="toast">Nachricht</div>
</div>

<div class="ui-layer">
  
  <div class="tree-header glass">
    <h1 id="uiTreeName">Baum</h1>
    <p id="uiSpeciesName">Spezies</p>
  </div>

  <div class="bottom-area">
    <div class="stats-panel glass">
      <div class="stat-row-top">
        <div class="stat-group">
          <div class="stat-item"><span class="s-label">Alter</span><span class="s-val" id="uiDay">Tag 0</span></div>
          <div class="stat-item"><span class="s-label">Saison</span><span class="s-val" id="uiSeason" style="color:var(--accent); text-shadow:0 0 8px var(--accent-glow)">Sommer</span></div>
        </div>
      </div>
      <div class="stat-row-bars">
        <div class="bar-wrap">
          <div class="bar-header"><span class="s-label" style="color:#fff">Wasser</span><span class="s-label" id="uiWaterVal" style="color:#fff">100%</span></div>
          <div class="bar-bg"><div class="bar-fill water-color" id="barWater" style="width:100%"></div></div>
        </div>
        <div class="bar-wrap">
          <div class="bar-header"><span class="s-label" style="color:#fff">Vitalität</span><span class="s-label" id="uiHpVal" style="color:#fff">100%</span></div>
          <div class="bar-bg"><div class="bar-fill hp-color" id="barHp" style="width:100%"></div></div>
        </div>
      </div>
    </div>

    <div class="tools-panel glass">
      <div class="btn-grid">
        <button class="btn" id="toolWater">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg> Gießen
        </button>
        <button class="btn" id="toolPrune">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg> Schnitt
        </button>
        <button class="btn" id="toolGraft">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg> Veredeln
        </button>
        <button class="btn" id="toolBend">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12c12 0 11 9 18 9"/></svg> Biegen
        </button>
      </div>
    </div>
  </div>

  <div class="bottom-dock glass">
    <button class="nav-item tab-btn" data-target="panel_collection">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22h20L12 2z"/></svg> Bäume
    </button>
    <button class="nav-item tab-btn" data-target="panel_shop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Shop
    </button>
    <button class="nav-item tab-btn" data-target="panel_quests">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Ziele
    </button>
    <button class="nav-item tab-btn" data-target="panel_settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> System
    </button>
  </div>
</div>

<div class="overlay-bg" id="overlayBg"></div>

<div class="overlay-sheet" id="panel_collection">
  <div class="sheet-header">
    <h2 style="color:var(--accent); text-shadow:0 0 10px var(--accent-glow)">Baumschule</h2>
    <button class="close-btn" onclick="closeAllPanels()">✕</button>
  </div>
  <div id="collectionList"></div>
</div>

<div class="overlay-sheet" id="panel_shop">
  <div class="sheet-header">
    <h2 style="color:var(--gold); text-shadow:0 0 10px rgba(251, 191, 36, 0.5)">Bonsai Shop</h2>
    <button class="close-btn" onclick="closeAllPanels()">✕</button>
  </div>
  <div id="shopMoneyDisplay" style="text-align:right; font-weight:700; color:var(--gold); margin-bottom:20px; font-size:16px;">Guthaben: 0 💰</div>
  <div class="s-label" style="margin-bottom: 10px;">Töpfe & Schalen</div>
  <div id="shopPotsList"></div>
  <div class="s-label" style="margin-top:25px; margin-bottom: 10px;">Substrate</div>
  <div id="shopSoilsList"></div>
</div>

<div class="overlay-sheet" id="panel_quests">
  <div class="sheet-header">
    <h2 style="color:var(--success); text-shadow:0 0 10px var(--success-glow)">Deine Reise</h2>
    <button class="close-btn" onclick="closeAllPanels()">✕</button>
  </div>
  <div class="s-label">Tägliche Aufgaben</div>
  <div id="questList" style="margin-top:10px"></div>
  <div class="s-label" style="margin-top:30px">Medaillen & Meilensteine</div>
  <div class="badge-grid" id="badgeGrid"></div>
</div>

<div class="overlay-sheet" id="panel_settings">
  <div class="sheet-header">
    <h2 style="color:var(--text-muted)">Natur Kontrolle</h2>
    <button class="close-btn" onclick="closeAllPanels()">✕</button>
  </div>
  <button class="btn" onclick="toggleFullScreen()" style="width:100%; margin-bottom:25px; background:rgba(255,255,255,0.1); font-size:13px; padding:15px; flex-direction:row;">🔲 Browser Vollbild umschalten</button>
  <div id="settingsGrid"></div>
  <br>
  <button class="btn" onclick="hardReset()" style="width:100%; background:rgba(239, 68, 68, 0.15); color:#ef4444; border-color:#ef4444; margin-top:20px; font-size:13px; padding:15px; flex-direction:row;">Spielstand Löschen</button>
</div>

<script>
(function(){
const $ = id => document.getElementById(id);
const cv = $('cv');
const ctx = cv.getContext('2d', {alpha: false});

// Spieldaten & Konstanten
const SPECIES = {
  ficus: { name: "Ficus Retusa", leaf: "oval", color:["#166534","#4ade80"], bark:["#5D4037","#3E2723"], growth: 1.0, cost: 0 },
  pine:  { name: "Schwarzkiefer", leaf: "needle", color:["#064e3b","#10b981"], bark:["#424242","#212121"], growth: 0.6, cost: 300 },
  maple: { name: "Roter Ahorn", leaf: "maple", color:["#7f1d1d","#ef4444"], bark:["#5d4037","#3e2723"], growth: 0.8, cost: 500 },
  sakura:{ name: "Sakura Kirsche", leaf: "oval", color:["#be185d","#f9a8d4"], bark:["#5d4037","#3e2723"], growth: 0.9, cost: 800 },
  willow:{ name: "Trauerweide", leaf: "long", color:["#365314","#bef264"], bark:["#424242","#212121"], growth: 1.3, weeping:true, cost: 1200 },
  jade:  { name: "Geldbaum", leaf: "fat", color:["#14532d","#22c55e"], bark:["#795548","#5d4037"], growth: 0.7, cost: 1500 },
  blue:  { name: "Blue Mystique", leaf: "maple", color:["#1e3a8a","#60a5fa"], bark:["#263238","#102027"], growth: 1.1, cost: 2000 },
  hemp:  { name: "Green Power", leaf: "hemp", color:["#1a2e05","#84cc16"], bark:["#33691E","#1B5E20"], growth: 1.5, cost: 4200 }
};

const ITEMS = {
  pot_clay:  { type:'pot', name:"Terrakotta", cost:300, bonus:1.1 },
  pot_zen:   { type:'pot', name:"Zen Schale", cost:900, bonus:1.25 },
  soil_aka:  { type:'soil', name:"Akadama", cost:200, boost:1.3 },
  soil_bio:  { type:'soil', name:"Bio-Boost", cost:500, boost:2.0 }
};

let SETTINGS = { 
  secPerDay: 60, 
  growMult: 1.0, 
  thickMult: 1.0, 
  sproutChance: 0.03, 
  maxLeaves: 30, 
  leafRate: 0.1, 
  leafSizeMult: 1.0, 
  waterDrain: 5.0, 
  windSpeed: 0.3, 
  windSway: 0.05, 
  timeWarp: 1.0 
};

let STATE = { 
  money: 500, 
  trees: [], 
  activeIdx: 0, 
  inventory: { pots:['pot_basic'], soils:['soil_basic'], species:['ficus'] }, 
  stats: { totalWaters:0, totalPrunes:0, totalDays:0 }, 
  quests: [] 
};

// Klassen
class Branch {
  constructor(parent, x, y, angle, maxLen, thick, depth) {
    this.parent = parent;
    this.depth = depth || 0;
    this.x = x;
    this.y = y;
    this.endX = x;
    this.endY = y;
    this.angle = angle;
    this.targetAngle = angle;
    this.len = 0.1;
    this.maxLen = maxLen;
    this.thick = thick;
    this.children = [];
    this.leaves = [];
    this.cut = false;
    this.sprouted = false;
    this.grafted = false;
    this.windPhase = Math.random() * 10;
  }

  serialize() {
    return {
      x: this.x, y: this.y, a: this.angle, ta: this.targetAngle,
      l: this.len, ml: this.maxLen, th: this.thick, d: this.depth,
      cut: this.cut, spr: this.sprouted, gr: this.grafted,
      leaves: this.leaves,
      c: this.children.map(c => c.serialize())
    };
  }

  static deserialize(d, p) {
    let b = new Branch(p, d.x, d.y, d.a, d.ml, d.th, d.d);
    b.len = d.l;
    b.targetAngle = d.ta;
    b.cut = d.cut;
    b.sprouted = d.spr;
    b.grafted = d.gr;
    b.leaves = d.leaves || [];
    if (d.c) {
      b.children = d.c.map(cd => Branch.deserialize(cd, b));
    }
    return b;
  }
}

class Tree {
  constructor(key, name) {
    this.key = key;
    this.name = name;
    this.days = 0;
    this.water = 100;
    this.hp = 100;
    this.pot = 'pot_basic';
    this.soil = 'soil_basic';
    this.root = new Branch(null, 0, 0, -Math.PI/2, 110, 20, 0);
  }
}

// Environment & Input State
let ENV = { dayTime:0.3, clouds:[], stars:Array.from({length:60},()=>({x:Math.random(),y:Math.random(),s:Math.random()*1.5})), particles:[] };
let CAM = { x:0, y:0, zoom:1.0 };
let MOUSE = { drag:false, x:0, y:0, worldX:0, worldY:0 };
let INPUT = "none", HOVER = null, BEND_TARGET = null, WATERING = false;
let lastT = 0, lastUiT = 0;

// Init
function init() {
  cv.width = $('viewport').clientWidth || window.innerWidth;
  cv.height = $('viewport').clientHeight || window.innerHeight;

  loadGame();
  bindSettingsUI();
  
  if(!STATE.trees.length) {
    STATE.trees.push(new Tree('ficus', "Erster Bonsai"));
  }
  
  if(!STATE.quests || STATE.quests.length === 0) {
    generateQuests();
  }
  
  const ro = new ResizeObserver(entries => {
    for(let e of entries) {
      if(e.contentRect.width > 0 && e.contentRect.height > 0) {
        cv.width = e.contentRect.width;
        cv.height = e.contentRect.height;
      }
    }
  });
  ro.observe($('viewport'));
  
  updateListUI();
  updateRealtimeUI();
  requestAnimationFrame(loop);
}

// Game Loop
function loop(now) {
  if(!now) now = performance.now();
  let dt = (now - lastT) / 1000;
  if(dt > 0.1) dt = 0.1;
  lastT = now;
  
  update(dt);
  draw();
  
  if(now - lastUiT > 500) {
    updateRealtimeUI();
    lastUiT = now;
  }
  
  requestAnimationFrame(loop);
}

function update(dt) {
  const tree = STATE.trees[STATE.activeIdx];
  if(!tree) return;
  const spec = SPECIES[tree.key];
  const soil = ITEMS[tree.soil] || {boost: 1.0};
  const pot = ITEMS[tree.pot] || {bonus: 1.0};
  
  // Zeit
  ENV.dayTime += (dt / SETTINGS.secPerDay) * (SETTINGS.timeWarp || 1.0);
  if(ENV.dayTime > 1) {
    ENV.dayTime -= 1;
    tree.days++;
    STATE.stats.totalDays++;
    updateListUI();
  }
  
  // Wasser & Wachstum
  if(tree.water > 0) {
    tree.water -= (SETTINGS.waterDrain * soil.boost / SETTINGS.secPerDay) * dt;
  }
  const growth = (tree.water > 0 ? 1 : 0) * spec.growth * soil.boost * pot.bonus * SETTINGS.growMult;

  // Wolken
  if(ENV.clouds.length < 5 && Math.random() < 0.01) {
    ENV.clouds.push({x: -200, y: Math.random() * 300, s: 1 + Math.random(), v: 0.2 + Math.random() * 0.3});
  }

  // Gießen (Partikel)
  if(WATERING && INPUT === 'water') {
    for(let i=0; i<3; i++) {
      ENV.particles.push({
        x: MOUSE.worldX + (Math.random() - 0.5) * 30,
        y: Math.min(MOUSE.worldY, -50) + (Math.random() - 0.5) * 10,
        vx: (Math.random() - 0.5) * 15,
        vy: 120 + Math.random() * 80,
        life: 2.0
      });
    }
  }

  for(let i = ENV.particles.length - 1; i >= 0; i--) {
    let p = ENV.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    
    // Topf Treffer
    if(p.y > 0 && p.y < 70 && p.x > -90 && p.x < 90) {
      tree.water = Math.min(100, tree.water + 0.5);
      STATE.stats.totalWaters += 0.05; // Stats für Quests
      ENV.particles.splice(i, 1);
    } else if(p.life <= 0) {
      ENV.particles.splice(i, 1);
    }
  }

  // Baum Simulation (Rekursiv)
  function sim(b, rx, ry) {
    if(!b.parent) {
      b.x = rx;
      b.y = ry;
    } else {
      b.x = b.parent.endX;
      b.y = b.parent.endY;
    }
    
    b.angle += (b.targetAngle - b.angle) * 3 * dt;
    
    if(!b.cut && b.len < b.maxLen) {
      b.len += 8 * dt * growth;
      
      if(b.len > 15) {
        b.thick += 0.1 * dt * growth * SETTINGS.thickMult;
      }
      
      const thresh = b.maxLen * 0.85;
      if(b.depth > 0 && b.len > thresh) {
         if(b.leaves.length < SETTINGS.maxLeaves && Math.random() < SETTINGS.leafRate) {
            b.leaves.push({
              f: 0.85 + Math.random() * 0.15,
              r: Math.random() * 6.28,
              s: 0.1,
              ms: (8 + Math.random() * 6) * SETTINGS.leafSizeMult
            });
         }
      }
      
      if(b.len > b.maxLen * 0.6 && !b.sprouted && b.thick > 3.0) {
         if(Math.random() < SETTINGS.sproutChance * growth) {
            b.sprouted = true;
            let cnt = (Math.random() > 0.4) ? 2 : 1;
            for(let i=0; i<cnt; i++) {
               let dev = (Math.random() - 0.5) * 1.5;
               if(spec.weeping) dev = Math.abs(dev) + 1.2;
               b.children.push(new Branch(b, 0, 0, b.angle + dev, b.maxLen * (0.6 + Math.random() * 0.3), b.thick * 0.7, b.depth + 1));
            }
         }
      }
    }
    
    for(let l of b.leaves) {
      if(l.s < l.ms) l.s += 10 * dt;
    }
    
    const sway = Math.sin(Date.now() * 0.002 * SETTINGS.windSpeed + b.windPhase) * (SETTINGS.windSway * b.len) / (Math.max(1, b.thick));
    b.endX = b.x + Math.cos(b.angle + sway) * b.len;
    b.endY = b.y + Math.sin(b.angle + sway) * b.len;
    
    b.children.forEach(c => sim(c, 0, 0));
  }
  
  sim(tree.root, 0, 0);
  checkQuests();
}

// ---------------- RENDER ----------------
function draw() {
  const w = cv.width, h = cv.height, t = ENV.dayTime;
  
  if(isNaN(t) || w === 0 || h === 0) return;

  const sky = [[5,10,25], [255,120,70], [80,160,230], [20,15,45]];
  let si = Math.floor(t * 4) % 4, ni = (si + 1) % 4, f = (t * 4) % 1;
  const mix = (a, b) => Math.round(a + (b - a) * f);
  const col = `rgb(${mix(sky[si][0],sky[ni][0])},${mix(sky[si][1],sky[ni][1])},${mix(sky[si][2],sky[ni][2])})`;
  
  const grd = ctx.createLinearGradient(0, 0, 0, h);
  grd.addColorStop(0, col);
  grd.addColorStop(1, si === 0 || si === 3 ? "#020617" : "#e2e8f0");
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, w, h);

  if(t < 0.25 || t > 0.75) {
     ctx.fillStyle = "#fff";
     ENV.stars.forEach(s => { 
       ctx.globalAlpha = (t < 0.25 ? 1 - t * 4 : (t - 0.75) * 4) * Math.random(); 
       ctx.beginPath(); ctx.arc(s.x * w, s.y * h * 0.6, s.s, 0, 6.28); ctx.fill();
     });
     ctx.globalAlpha = 1;
  }

  const cx = w / 2, cy = h * 0.8 + 150, r = h * 0.5 + 100, ang = (t - 0.5) * Math.PI;
  ctx.shadowBlur = 50; ctx.shadowColor = "gold"; ctx.fillStyle = "#fbbf24"; 
  ctx.beginPath(); ctx.arc(cx + Math.sin(ang) * r, cy + Math.cos(ang) * r, 45, 0, 6.28); ctx.fill();
  
  ctx.shadowBlur = 30; ctx.shadowColor = "#fff"; ctx.fillStyle = "#f8fafc"; 
  ctx.beginPath(); ctx.arc(cx + Math.sin(ang + Math.PI) * r, cy + Math.cos(ang + Math.PI) * r, 35, 0, 6.28); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = "rgba(255,255,255,0.15)";
  ENV.clouds.forEach(c => { 
    c.x += c.v; if(c.x > w + 200) c.x = -200; 
    drawPuff(c.x, c.y, c.s); 
  });

  ctx.fillStyle = "#04060b";
  ctx.beginPath(); ctx.moveTo(0, h);
  for(let x=0; x<=w; x+=20) {
    ctx.lineTo(x, h * 0.65 - Math.abs(Math.sin(x * 0.002) * 100 + Math.cos(x * 0.008) * 30));
  }
  ctx.lineTo(w, h); ctx.fill();

  ctx.save();
  const camBaseY = h * 0.55; 
  ctx.translate(w / 2 + CAM.x, camBaseY + CAM.y);
  ctx.scale(CAM.zoom, CAM.zoom);
  drawWorld();
  ctx.restore();
}

function drawPuff(x, y, s) {
  ctx.beginPath();
  ctx.arc(x, y, 40 * s, 0, 6.28);
  ctx.arc(x + 35 * s, y - 15 * s, 45 * s, 0, 6.28);
  ctx.arc(x + 70 * s, y + 5 * s, 35 * s, 0, 6.28);
  ctx.fill();
}

function drawWorld() {
  const t = STATE.trees[STATE.activeIdx];
  if(!t) return;
  const spec = SPECIES[t.key];
  const potH = 60;
  
  ctx.fillStyle = "#18181b"; ctx.beginPath(); ctx.ellipse(0, 0, 85, 22, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#271c19"; ctx.beginPath(); ctx.ellipse(0, 0, 78, 18, 0, 0, 6.28); ctx.fill();

  ctx.lineCap = "round";
  function render(b) {
    if(b.len < 1) return;
    
    ctx.lineWidth = b.thick;
    ctx.strokeStyle = spec.bark[0];
    
    if(b === HOVER) { 
      ctx.shadowBlur = 10; 
      ctx.shadowColor = "#fff"; 
      ctx.strokeStyle = (INPUT==='prune' ? '#f87171' : INPUT==='graft' ? '#60a5fa' : INPUT==='bend' ? '#facc15' : '#fff'); 
    } else {
      ctx.shadowBlur = 0;
    }
    
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.endX, b.endY);
    ctx.stroke();
    ctx.shadowBlur = 0;
    
    if(b.cut) {
      ctx.fillStyle = "#aaa";
      ctx.beginPath(); ctx.arc(b.endX, b.endY, b.thick * 0.4, 0, 6.28); ctx.fill();
    }
    
    if(b.grafted) {
      ctx.fillStyle = "#fffc";
      ctx.beginPath(); ctx.arc(b.x, b.y, b.thick * 0.6, 0, 6.28); ctx.fill();
    }

    if(!b.cut && b.leaves.length) {
       const sIdx = Math.floor(t.days / 30) % 4; 
       let cols = spec.color;
       if(sIdx === 2 && spec.leaf !== 'needle') cols = ["#b45309", "#d97706"]; // Herbst
       
       for(let l of b.leaves) {
          ctx.save();
          const px = b.x + (b.endX - b.x) * l.f;
          const py = b.y + (b.endY - b.y) * l.f;
          ctx.translate(px, py);
          ctx.rotate(b.angle + l.r); 
          
          if(spec.leaf === 'needle') {
             ctx.strokeStyle = cols[0]; ctx.lineWidth = 1;
             for(let i=0; i<5; i++) {
               ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo((Math.random() - 0.5) * l.s * 3, -l.s * 2); ctx.stroke();
             }
          } else {
             ctx.fillStyle = cols[0];
             ctx.beginPath(); ctx.ellipse(l.s, 0, l.s, l.s * (spec.leaf === 'fat' ? 0.5 : 0.4), 0, 0, 6.28); ctx.fill();
             ctx.fillStyle = cols[1];
             ctx.beginPath(); ctx.ellipse(l.s, 0, l.s * 0.6, l.s * 0.15, 0, 0, 6.28); ctx.fill();
          }
          ctx.restore();
       }
    }
    b.children.forEach(render);
  }
  render(t.root);

  // Topf rendern
  const pg = ctx.createLinearGradient(0, 0, 0, potH);
  pg.addColorStop(0, "#2a2a2e"); pg.addColorStop(1, "#09090b");
  if(t.pot === 'pot_clay') { pg.addColorStop(0, "#785346"); pg.addColorStop(1, "#2d1d18"); }
  else if(t.pot === 'pot_zen') { pg.addColorStop(0, "#1e293b"); pg.addColorStop(1, "#020617"); }
  
  ctx.fillStyle = pg;
  ctx.beginPath();
  ctx.moveTo(-85, 0); 
  ctx.quadraticCurveTo(-85, potH, -55, potH);
  ctx.lineTo(55, potH); 
  ctx.quadraticCurveTo(85, potH, 85, 0);
  ctx.fill();

  ctx.fillStyle = "rgba(56, 189, 248, 0.8)";
  ENV.particles.forEach(p => { 
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
  });
}

// ---------------- UI & SYSTEMS ----------------

function bindSettingsUI() {
  const binds = [
    { id: 'inpSecPerDay', key: 'secPerDay', valId: 'valSec', parser: parseFloat },
    { id: 'inpGrowMult', key: 'growMult', valId: 'valGrow', parser: parseFloat },
    { id: 'inpThickMult', key: 'thickMult', valId: 'valThick', parser: parseFloat },
    { id: 'inpSproutChance', key: 'sproutChance', valId: 'valSprout', parser: parseFloat, display: v=>Math.round(v*100)+"%" },
    { id: 'inpLeafLimit', key: 'maxLeaves', valId: 'valLeaves', parser: parseInt },
    { id: 'inpLeafRate', key: 'leafRate', valId: 'valLeafRate', parser: parseFloat, display: v=>Math.round(v*100)+"%" },
    { id: 'inpLeafSize', key: 'leafSizeMult', valId: 'valLeafSize', parser: parseFloat },
    { id: 'inpWaterDrain', key: 'waterDrain', valId: 'valWater', parser: parseFloat },
    { id: 'inpWindSpeed', key: 'windSpeed', valId: 'valWindSpd', parser: parseFloat },
    { id: 'inpWindSway', key: 'windSway', valId: 'valWindSway', parser: parseFloat }
  ];

  let html = '';
  binds.forEach(b => {
    html += `
      <div class="set-row">
        <div class="set-header">
          <span class="s-label">${b.id.replace('inp','').replace(/([A-Z])/g, ' $1').trim()}</span>
          <span class="s-val" id="${b.valId}">${b.display ? b.display(SETTINGS[b.key]) : SETTINGS[b.key]}</span>
        </div>
        <input type="range" id="${b.id}" min="${b.key==='windSpeed'?0:b.key==='sproutChance'?0:b.key==='secPerDay'?1:0.1}" max="${b.key==='secPerDay'?120:b.key==='maxLeaves'?100:b.key==='sproutChance'?0.2:b.key==='waterDrain'?20:5}" step="${b.key==='maxLeaves'||b.key==='secPerDay'?1:0.01}" value="${SETTINGS[b.key]}">
      </div>`;
  });
  $('settingsGrid').innerHTML = html;

  binds.forEach(b => {
    let el = $(b.id);
    if(el) {
      el.oninput = e => {
        let val = b.parser(e.target.value);
        SETTINGS[b.key] = val;
        if(b.valId) $(b.valId).innerText = b.display ? b.display(val) : val;
      };
    }
  });
}

function generateQuests() {
  STATE.quests = [
    { id:'q1', txt:"Gieße deinen Baum (10x)", goal:10, cur:0, rew:100, done:false, coll:false },
    { id:'q2', txt:"Schneide Äste (5x)", goal:5, cur:0, rew:150, done:false, coll:false },
    { id:'q3', txt:"Überlebe 5 Tage", goal:5, cur:0, rew:300, done:false, coll:false },
    { id:'q4', txt:"Besitze 3 Arten", goal:3, cur:0, rew:500, done:false, coll:false }
  ];
}

function checkQuests() {
  let changed = false;
  STATE.quests.forEach(q => {
    if(q.done) return;
    
    if(q.id === 'q1') q.cur = Math.floor(STATE.stats.totalWaters || 0);
    if(q.id === 'q2') q.cur = STATE.stats.totalPrunes || 0;
    if(q.id === 'q3') q.cur = STATE.trees[STATE.activeIdx].days || 0;
    if(q.id === 'q4') q.cur = STATE.inventory.species.length || 1;
    
    if(q.cur >= q.goal) {
      q.done = true;
      changed = true;
      notify("Aufgabe abgeschlossen!");
    }
  });
  if(changed) updateListUI();
}

window.claimQuest = function(idx) {
  const q = STATE.quests[idx];
  if(q.done && !q.coll) {
    q.coll = true;
    STATE.money += q.rew;
    notify(`+${q.rew} 💰 erhalten!`);
    
    // Einfaches Nachrücken von Quests
    if(q.id === 'q1') STATE.quests.push({ id:'q1', txt:"Gieße deinen Baum (50x)", goal:50, cur:STATE.stats.totalWaters, rew:400, done:false, coll:false });
    if(q.id === 'q2') STATE.quests.push({ id:'q2', txt:"Schneide Äste (25x)", goal:25, cur:STATE.stats.totalPrunes, rew:500, done:false, coll:false });
    if(q.id === 'q3') STATE.quests.push({ id:'q3', txt:"Überlebe 20 Tage", goal:20, cur:0, rew:1000, done:false, coll:false });
    
    updateListUI();
  }
}

window.unlockSpecies = function(key) {
  const spec = SPECIES[key];
  if(STATE.money >= spec.cost && !STATE.inventory.species.includes(key)) {
    STATE.money -= spec.cost;
    STATE.inventory.species.push(key);
    notify(`${spec.name} freigeschaltet!`);
    updateListUI();
  } else if(STATE.money < spec.cost) {
    notify("Zu wenig Guthaben!");
  }
}

window.selectTreeSpecies = function(key) {
  if(STATE.inventory.species.includes(key)) {
    const t = new Tree(key, SPECIES[key].name);
    STATE.trees.push(t);
    STATE.activeIdx = STATE.trees.length - 1;
    closeAllPanels();
    updateListUI();
  }
}

window.buy = function(what
id, type) {
  const item = ITEMS[id];
  if(!item) return;
  
  if(STATE.money >= item.cost) {
    if((type === 'pot' && !STATE.inventory.pots.includes(id)) ||
       (type === 'soil' && !STATE.inventory.soils.includes(id))) {
      
      STATE.money -= item.cost;
      if(type === 'pot') STATE.inventory.pots.push(id);
      if(type === 'soil') STATE.inventory.soils.push(id);
      
      notify(item.name + " erfolgreich gekauft!");
      updateListUI();
    } else {
      notify("Befindet sich bereits in deinem Besitz!");
    }
  } else {
     notify("Nicht genug Guthaben!");
  }
};

window.equip = function(id, type) {
  const t = STATE.trees[STATE.activeIdx];
  if(!t) return;
  if(type === 'pot' && STATE.inventory.pots.includes(id)) { 
    t.pot = id; 
    notify(ITEMS[id].name + " ausgerüstet!"); 
  }
  if(type === 'soil' && STATE.inventory.soils.includes(id)) { 
    t.soil = id; 
    notify(ITEMS[id].name + " als Substrat angewendet!"); 
  }
  updateListUI();
};

// Speichern & Laden
function saveGame() {
  try {
    const data = {
      money: STATE.money,
      activeIdx: STATE.activeIdx,
      inventory: STATE.inventory,
      stats: STATE.stats,
      quests: STATE.quests,
      trees: STATE.trees.map(t => ({
        key: t.key, name: t.name, days: t.days, water: t.water, hp: t.hp,
        pot: t.pot, soil: t.soil, root: t.root.serialize()
      }))
    };
    localStorage.setItem('bonsai_master_v7_save', JSON.stringify(data));
  } catch(e) { console.warn("Speichern fehlgeschlagen", e); }
}

function loadGame() {
  try {
    const d = localStorage.getItem('bonsai_master_v7_save');
    if(d) {
      const p = JSON.parse(d);
      STATE.money = p.money || 500;
      STATE.activeIdx = p.activeIdx || 0;
      STATE.inventory = p.inventory || { pots:['pot_basic'], soils:['soil_basic'], species:['ficus'] };
      STATE.stats = p.stats || { totalWaters:0, totalPrunes:0, totalDays:0 };
      STATE.quests = p.quests || [];
      if(p.trees && p.trees.length > 0) {
        STATE.trees = p.trees.map(td => {
          let t = new Tree(td.key, td.name);
          t.days = td.days; t.water = td.water; t.hp = td.hp;
          t.pot = td.pot || 'pot_basic'; t.soil = td.soil || 'soil_basic';
          if(td.root) t.root = Branch.deserialize(td.root, null);
          return t;
        });
      }
    }
  } catch(e) { console.warn("Laden fehlgeschlagen", e); }
  
  // Auto-Save alle 5 Sekunden
  setInterval(saveGame, 5000); 
}

window.hardReset = function() {
  if(confirm("Möchtest du wirklich deinen gesamten Fortschritt löschen? Dies kann NICHT rückgängig gemacht werden!")) {
    localStorage.removeItem('bonsai_master_v7_save');
    location.reload();
  }
};

// UI Aktualisierung

  if(!t) return;
  
  $('uiTreeName').innerText = t.name;
  $('uiSpeciesName').innerText = SPECIES[t.key].name;
  $('uiDay').innerText = "Tag " + t.days;
  
  let s = "Frühling";
  let sIdx = Math.floor(t.days / 30) % 4;
  if(sIdx===1) s="Sommer"; else if(sIdx===2) s="Herbst"; else if(sIdx===3) s="Winter";
  $('uiSeason').innerText = s;
  
  $('uiWaterVal').innerText = Math.round(t.water) + "%";
  $('barWater').style.width = t.water + "%";
  $('uiHpVal').innerText = Math.round(t.hp) + "%";
  $('barHp').style.width = t.hp + "%";
}

function updateListUI() {
  $('shopMoneyDisplay').innerText = "Guthaben: " + Math.floor(STATE.money) + " 💰";
  
  // Shop: Töpfe
  let potsHtml = '';
  for(let k in ITEMS) {
    if(ITEMS[k].type !== 'pot') continue;
    let item = ITEMS[k];
    let has = STATE.inventory.pots.includes(k);
    let eq = STATE.trees[STATE.activeIdx] && STATE.trees[STATE.activeIdx].pot === k;
    potsHtml += `
      <div class="list-item">
        <div class="list-content">
          <span class="list-title">${item.name}</span>
          <span class="list-sub">Wachstumsbonus: x${item.bonus}</span>
        </div>
        ${has ? (eq ? `<button class="quest-btn ready" disabled>Aktiv</button>` : `<button class="quest-btn" onclick="equip('${k}','pot')">Ausrüsten</button>`) : `<button class="quest-btn" onclick="buy('${k}','pot')">${item.cost} 💰</button>`}
      </div>`;
  }
  $('shopPotsList').innerHTML = potsHtml || '<i>Keine Items verfügbar.</i>';

  // Shop: Substrate
  let soilsHtml = '';
  for(let k in ITEMS) {
    if(ITEMS[k].type !== 'soil') continue;
    let item = ITEMS[k];
    let has = STATE.inventory.soils.includes(k);
    let eq = STATE.trees[STATE.activeIdx] && STATE.trees[STATE.activeIdx].soil === k;
    soilsHtml += `
      <div class="list-item">
        <div class="list-content">
          <span class="list-title">${item.name}</span>
          <span class="list-sub">Vitalitätsboost: x${item.boost}</span>
        </div>
        ${has ? (eq ? `<button class="quest-btn ready" disabled>Aktiv</button>` : `<button class="quest-btn" onclick="equip('${k}','soil')">Anwenden</button>`) : `<button class="quest-btn" onclick="buy('${k}','soil')">${item.cost} 💰</button>`}
      </div>`;
  }
  $('shopSoilsList').innerHTML = soilsHtml || '<i>Keine Items verfügbar.</i>';

  // Baumschule (Arten)
  let treesHtml = '';
  for(let k in SPECIES) {
    let spec = SPECIES[k];
    let has = STATE.inventory.species.includes(k);
    treesHtml += `
      <div class="list-item">
        <div class="list-content">
          <span class="list-title">${spec.name}</span>
          <span class="list-sub">Wachstumsrate: ${spec.growth}</span>
        </div>
        ${has ? `<button class="quest-btn" onclick="selectTreeSpecies('${k}')">Neuen Pflanzen</button>` : `<button class="quest-btn" onclick="unlockSpecies('${k}')">${spec.cost} 💰</button>`}
      </div>`;
  }
  $('collectionList').innerHTML = treesHtml;

  // Quests
  let questHtml = '';
  STATE.quests.forEach((q, i) => {
     if(q.coll) return;
     let p = Math.min(100, Math.round((q.cur/q.goal)*100));
     questHtml += `
      <div class="list-item" style="flex-direction:column; align-items:flex-start">
        <div style="display:flex; justify-content:space-between; width:100%">
          <span class="list-title">${q.txt}</span>
          <span class="list-sub">${Math.floor(q.cur)}/${q.goal}</span>
        </div>
        <div class="bar-bg" style="height:4px; margin:5px 0"><div class="bar-fill hp-color" style="width:${p}%"></div></div>
        ${q.done ? `<button class="quest-btn ready" style="width:100%; margin-top:5px" onclick="claimQuest(${i})">Abschließen: ${q.rew} 💰</button>` : ``}
      </div>`;
  });
  $('questList').innerHTML = questHtml || `<div style="text-align:center; color:#888; padding:20px; font-size:12px;">Keine aktiven Aufgaben mehr. Gut gemacht!</div>`;

  // Badges (Erfolge)
  let badgeHtml = '';
  const bData = [
    { icon:'🌱', name:'Anfänger', req: STATE.stats.totalDays >= 10 },
    { icon:'✂️', name:'Schnippler', req: STATE.stats.totalPrunes >= 20 },
    { icon:'💧', name:'Regenmacher', req: STATE.stats.totalWaters >= 50 },
    { icon:'🌲', name:'Bonsai Meister', req: STATE.trees.some(t => t.days >= 100) },
    { icon:'💸', name:'Sammler', req: STATE.inventory.pots.length >= 2 },
    { icon:'🏆', name:'Legende', req: STATE.inventory.species.length >= 4 }
  ];
  bData.forEach(b => {
     badgeHtml += `<div class="badge ${b.req ? 'unlocked' : ''}"><span class="badge-icon">${b.icon}</span><span class="badge-name">${b.name}</span></div>`;
  });
  $('badgeGrid').innerHTML = badgeHtml;
}

window.notify = function(msg) {
  let t = $('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};

// Panel & Tab Steuerung
window.closeAllPanels = function() {
  document.querySelectorAll('.overlay-sheet').forEach(el => el.classList.remove('open'));
  $('overlayBg').classList.remove('open');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('open'));
};

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
     let t = btn.getAttribute('data-target');
     let panel = $(t);
     if(panel.classList.contains('open')) {
       closeAllPanels();
     } else {
       closeAllPanels();
       panel.classList.add('open');
       $('overlayBg').classList.add('open');
       btn.classList.add('open');
     }
  });
});

$('overlayBg').addEventListener('click', closeAllPanels);

// Werkzeuge auswählen
const tools = ['toolWater', 'toolPrune', 'toolGraft', 'toolBend'];
tools.forEach(id => {
  $(id).addEventListener('click', () => {
    let type = id.replace('tool','').toLowerCase();
    if(INPUT === type) {
       INPUT = 'none';
       $(id).classList.remove('active');
    } else {
       tools.forEach(t => $(t).classList.remove('active'));
       INPUT = type;
       $(id).classList.add('active');
    }
  });
});

// Steuerung: Maus & Touch
function getPos(e) {
  let rect = cv.getBoundingClientRect();
  let ex = e.touches ? e.touches[0].clientX : e.clientX;
  let ey = e.touches ? e.touches[0].clientY : e.clientY;
  MOUSE.x = ex - rect.left;
  MOUSE.y = ey - rect.top;
  MOUSE.worldX = (MOUSE.x - cv.width/2 - CAM.x) / CAM.zoom;
  MOUSE.worldY = (MOUSE.y - cv.height * 0.55 - CAM.y) / CAM.zoom;
}

function getHover(b) {
  if(!b || b.cut) return null;
  let dx = b.endX - MOUSE.worldX;
  let dy = b.endY - MOUSE.worldY;
  let dist = Math.sqrt(dx*dx + dy*dy);
  
  // Hitbox vergrößern bei dünnen Ästen für leichtere mobile Bedienung
  if(dist < Math.max(b.thick, 15)) return b; 
  
  for(let c of b.children) {
     let res = getHover(c);
     if(res) return res;
  }
  return null;
}

function handlePointerMove(e) {
  if(MOUSE.drag && INPUT === 'none') {
    if(e.type === 'touchmove') {
       let lx = e.touches[0].clientX; 
       let ly = e.touches[0].clientY;
       if(MOUSE.lx) { CAM.x += lx - MOUSE.lx; CAM.y += ly - MOUSE.ly; }
       MOUSE.lx = lx; MOUSE.ly = ly;
    } else {
       CAM.x += e.movementX;
       CAM.y += e.movementY;
    }
  }
  
  getPos(e);
  
  if(INPUT !== 'none' && INPUT !== 'water' && !BEND_TARGET) {
    const t = STATE.trees[STATE.activeIdx];
    if(t) HOVER = getHover(t.root);
  }
  
  if(BEND_TARGET && INPUT === 'bend') {
    let dx = MOUSE.worldX - BEND_TARGET.x;
    let dy = MOUSE.worldY - BEND_TARGET.y;
    BEND_TARGET.targetAngle = Math.atan2(dy, dx);
  }
}

cv.addEventListener('mousedown', e => { getPos(e); interactStart(); });
cv.addEventListener('touchstart', e => { getPos(e); interactStart(); }, {passive: false});

cv.addEventListener('mousemove', handlePointerMove);
cv.addEventListener('touchmove', e => {
  if(e.cancelable) e.preventDefault(); // Verhindert scrollen auf Canvas
  handlePointerMove(e);
}, {passive: false});

function interactStart() {
   MOUSE.drag = true;
   
   if(INPUT === 'water') {
     WATERING = true;
   } else if(HOVER) {
     if(INPUT === 'prune' && HOVER.parent) {
       HOVER.cut = true;
       HOVER.children = [];
       HOVER.leaves = [];
       STATE.stats.totalPrunes++;
       
       let reward = Math.floor(10 * HOVER.thick);
       STATE.money += reward;
       notify(`Schnitt durchgeführt! +${reward} 💰`);
       HOVER = null;
       updateListUI();
       
     } else if(INPUT === 'graft' && !HOVER.cut && HOVER.thick > 2.0 && !HOVER.grafted) {
       HOVER.grafted = true;
       let spec = SPECIES[STATE.trees[STATE.activeIdx].key];
       let dev = (Math.random() - 0.5) * 1.5;
       if(spec.weeping) dev = Math.abs(dev) + 1.2;
       HOVER.children.push(new Branch(HOVER, 0, 0, HOVER.angle + dev, HOVER.maxLen * 0.7, HOVER.thick * 0.8, HOVER.depth + 1));
       notify("Erfolgreich veredelt!");
       
     } else if(INPUT === 'bend' && !HOVER.cut) {
       BEND_TARGET = HOVER;
     }
   }
}

window.addEventListener('mouseup', endInteract);
window.addEventListener('touchend', endInteract);

function endInteract() {
  MOUSE.drag = false;
  WATERING = false;
  BEND_TARGET = null;
  MOUSE.lx = null; MOUSE.ly = null;
}

// Zoom-Steuerung via Mausrad
cv.addEventListener('wheel', e => {
  e.preventDefault();
  CAM.zoom += e.deltaY * -0.001;
  if(CAM.zoom < 0.3) CAM.zoom = 0.3;
  if(CAM.zoom > 3.0) CAM.zoom = 3.0;
}, {passive: false});

// Vollbildfunktion
window.toggleFullScreen = function() {
  if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        notify("Vollbild nicht unterstützt");
      });
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    }
  }
};

// Spiel starten
init();

})();
</script>
