<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bonsai Zen - Math Growth Engine</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: #2b3a4a; width: 100%; max-width: 550px; height: auto; aspect-ratio: 5/7; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .toolbar { display: flex; gap: 10px; margin-top: 15px; z-index: 10; }
        button { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #485460; color: white; transition: 0.2s; }
        button.active { background: #e07a5f; box-shadow: 0 4px 0 #b35942; transform: translateY(-2px); }
        .info { margin-top: 10px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

    <canvas id="bonsaiCanvas" width="1000" height="1400"></canvas>
    
    <div class="toolbar">
        <button id="btn-grow" class="active" onclick="setMode('grow')">🌱 Wachsen</button>
        <button id="btn-cut" onclick="setMode('cut')">✂️ Schneiden</button>
        <button onclick="resetTree()">♻️ Neu pflanzen</button>
    </div>
    <div class="info" id="status">Tippe auf ein Ast-Ende, um es wachsen zu lassen.</div>

    <script>
        const canvas = document.getElementById('bonsaiCanvas');
        const ctx = canvas.getContext('2d');
        const leafSVG = new Path2D("M 0,-15 L 3,-5 L 12,-8 L 6,0 L 15,6 L 5,6 L 8,15 L 0,8 L -8,15 L -5,6 L -15,6 L -6,0 L -12,-8 L -3,-5 Z");

        let branches = [];
        let mode = 'grow'; // 'grow' oder 'cut'
        const C = { outline: '#151515', wood: '#9c8c7c', shadow: '#6e5e50', leaf: '#c44536' };

        class Branch {
            constructor(startX, startY, angle, thickness, length, depth, parent = null) {
                this.startX = startX;
                this.startY = startY;
                this.angle = angle;
                this.thickness = thickness;
                this.length = length;
                this.depth = depth;
                this.parent = parent;
                this.children = [];
                this.nodes = [];
                this.isDead = false;
                this.generateNodes();
            }

            // Der "Math-Grow" Algorithmus aus test.html
            generateNodes() {
                this.nodes = [];
                let currX = this.startX;
                let currY = this.startY;
                let currA = this.angle;
                
                // 1-10% Regel Logik
                let taper = 0.01 + Math.min(this.depth / 6, 1) * 0.09;
                let endThick = this.thickness * (1 - taper);
                let steps = Math.floor(this.length * 1.2);

                for (let i = 0; i <= steps; i++) {
                    let p = i / steps;
                    let thick = this.thickness - (this.thickness - endThick) * p;
                    this.nodes.push({ x: currX, y: currY, r: thick / 2, a: currA });
                    
                    currX += Math.cos(currA) * 0.8;
                    currY += Math.sin(currA) * 0.8;
                    currA += (Math.random() - 0.5) * 0.05; // Organische Krümmung
                }
                this.endX = currX;
                this.endY = currY;
                this.endAngle = currA;
                this.endThick = endThick;
            }

            draw() {
                // Pass 1: Outline
                ctx.strokeStyle = C.outline;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(this.nodes[0].x, this.nodes[0].y);
                this.nodes.forEach(n => {
                    ctx.lineWidth = n.r * 2 + 6;
                    ctx.lineTo(n.x, n.y);
                });
                ctx.stroke();

                // Pass 2: Wood
                ctx.strokeStyle = C.wood;
                ctx.beginPath();
                ctx.moveTo(this.nodes[0].x, this.nodes[0].y);
                this.nodes.forEach(n => {
                    ctx.lineWidth = n.r * 2;
                    ctx.lineTo(n.x, n.y);
                });
                ctx.stroke();

                // Blätter nur an Enden ohne Kinder
                if (this.children.length === 0 && this.depth >= 1) {
                    this.drawLeafCluster(this.endX, this.endY, this.depth);
                }

                this.children.forEach(c => c.draw());
            }

            drawLeafCluster(x, y, depth) {
                ctx.save();
                ctx.translate(x, y);
                let s = depth < 3 ? 0.6 : 1.1;
                ctx.scale(s, s);
                // Ahorn-Cluster (3 Blätter)
                const cluster = [{x:0,y:0,r:0},{x:-12,y:6,r:-0.4},{x:12,y:6,r:0.4}];
                cluster.forEach(m => {
                    ctx.save();
                    ctx.translate(m.x, m.y); ctx.rotate(m.r);
                    ctx.lineWidth = 4; ctx.strokeStyle = C.outline; ctx.stroke(leafSVG);
                    ctx.fillStyle = C.leaf; ctx.fill(leafSVG);
                    ctx.restore();
                });
                ctx.restore();
            }

            checkHit(mx, my) {
                // Prüfung ob Klick nah am Ende des Astes ist
                if (Math.hypot(mx - this.endX, my - this.endY) < 40) return this;
                for (let child of this.children) {
                    let hit = child.checkHit(mx, my);
                    if (hit) return hit;
                }
                return null;
            }
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btn-grow').classList.toggle('active', m === 'grow');
            document.getElementById('btn-cut').classList.toggle('active', m === 'cut');
            document.getElementById('status').innerText = m === 'grow' ? "Tippe auf ein Ende zum Wachsen." : "Tippe auf einen Ast zum Schneiden.";
        }

        function resetTree() {
            branches = [];
            let startX = 500, startY = 1200, startThick = 48;
            // Nebari Wurzeln
            for(let i=0; i<5; i++) {
                let rA = (Math.PI/2) + (Math.random()-0.5)*2;
                branches.push(new Branch(startX, startY-10, rA, startThick*0.4, 30, 0));
            }
            // Hauptstamm
            branches.push(new Branch(startX, startY, -Math.PI/2, startThick, 180, 0));
            render();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Tisch & Topf
            ctx.fillStyle = C.outline; ctx.beginPath(); ctx.ellipse(500, 1200, 180, 45, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#4a3d35'; ctx.beginPath(); ctx.roundRect(350, 1200, 300, 80, 15); ctx.fill();
            
            branches.forEach(b => b.draw());
        }

        canvas.addEventListener('pointerdown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (1000 / rect.width);
            const my = (e.clientY - rect.top) * (1400 / rect.height);

            let hit = null;
            branches.forEach(b => { if(!hit) hit = b.checkHit(mx, my) });

            if (mode === 'grow' && hit && hit.depth < 7) {
                // Mathematisch korrektes neues Wachstum
                let num = Math.random() > 0.4 ? 2 : 1;
                for (let i = 0; i < num; i++) {
                    let newA = hit.endAngle + (Math.random() - 0.5) * 1.5;
                    let newL = hit.length * 0.75;
                    let nextThick = (i === 0) ? hit.endThick : hit.endThick * 0.7;
                    hit.children.push(new Branch(hit.endX, hit.endY, newA, nextStartThickness = nextThick, newL, hit.depth + 1, hit));
                }
            } else if (mode === 'cut' && hit && hit.parent) {
                hit.parent.children = hit.parent.children.filter(c => c !== hit);
            }
            render();
        });

        resetTree();
    </script>
</body>
</html>
