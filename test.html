<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Math Bonsai - 3x Scale & High Detail</title>
    <style>
        body {
            margin: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; background-color: #2c3e50;
            font-family: sans-serif; overflow: hidden;
        }
        /* Der Canvas skaliert sich auf die Bildschirmgröße, behält aber intern die riesige 1200x1000 Auflösung */
        canvas { 
            background-color: transparent; 
            max-width: 100%; max-height: 85vh; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 4px;
        }
        button {
            margin-top: 15px; padding: 12px 24px; font-size: 16px;
            background-color: #5ab59f; color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 0 #3b8774; transition: all 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #3b8774; }
    </style>
</head>
<body>

    <canvas id="bonsaiCanvas" width="1200" height="1000"></canvas>
    <button onclick="generateMathTree()">🌱 Neuen Mathe-Bonsai berechnen</button>

    <script>
        const canvas = document.getElementById('bonsaiCanvas');
        const ctx = canvas.getContext('2d');

        const C = {
            outline: '#151515',
            woodBase: '#8c7a6b',
            woodShadow: '#5c4e42',
            leafDark: '#2c4a32',
            leafMid: '#46754b',
            leafLight: '#659c6b'
        };

        const leafPathString = "M -40,10 C -50,0 -40,-20 -20,-20 C -15,-35 10,-40 25,-25 C 40,-35 60,-15 50,10 C 55,25 40,30 20,30 L -15,30 C -30,30 -40,25 -40,10 Z";
        const leafSVG = new Path2D(leafPathString);

        let branches = [];
        let currentTick = 0;
        let maxTick = 0;
        let isGrowing = false;
        let branchIdCounter = 0;

        // --- 1. DIE MATHE-GENERIERUNG (Fraktal mit Tropismus) ---
        function calculateBranch(startX, startY, angle, length, thickness, depth, startTick) {
            let id = branchIdCounter++;
            let nodes = [];
            
            let currentX = startX;
            let currentY = startY;
            let currentAngle = angle;
            let currentThick = thickness;
            let tick = startTick;

            // Tropismus: Bonsais hängen oft durch Schwerkraft leicht nach unten
            // Wir definieren einen zufälligen "Wind/Schwerkraft"-Bias für diesen speziellen Baum
            let gravityBias = (Math.random() - 0.4) * 0.03; 

            // 10x Segmentation für die knorrige Rinde
            let steps = Math.floor(length * 1.5); 
            
            for (let i = 0; i < steps; i++) {
                currentX += Math.cos(currentAngle) * 0.6; // Kleine Schritte
                currentY += Math.sin(currentAngle) * 0.6;
                
                // Mathematik der Krümmung
                currentAngle += gravityBias + (Math.random() - 0.5) * 0.02;
                currentThick *= 0.992; // Organische Verjüngung
                tick++;

                // Der "Jitter" (Knubbel in der Rinde) skaliert mit der Dicke
                let jl = (Math.random() - 0.2) * (currentThick * 0.12);
                let jr = (Math.random() - 0.2) * (currentThick * 0.12);

                nodes.push({
                    x: currentX, y: currentY, 
                    angle: currentAngle, 
                    r: currentThick / 2,
                    jl: jl, jr: jr,
                    tick: tick,
                    isEnd: i === steps - 1
                });
            }

            branches.push({
                id: id,
                depth: depth,
                nodes: nodes,
                dead: (Math.random() > 0.9 && depth > 2) // 10% Chance auf Totholz
            });

            if (tick > maxTick) maxTick = tick;

            // --- REKURSION (Neue Äste abspalten) ---
            if (depth < 5) {
                // 1 bis 3 neue Äste
                let numChildren = Math.random() > 0.3 ? 2 : (Math.random() > 0.8 ? 3 : 1);
                
                for (let i = 0; i < numChildren; i++) {
                    // Mathematische Streuung der Äste
                    let spread = (Math.random() - 0.5) * 1.5;
                    let newAngle = currentAngle + spread;
                    
                    // Nächster Ast wird kürzer und dünner
                    let newLength = length * (0.6 + Math.random() * 0.25);
                    let newThick = thickness * (0.55 + Math.random() * 0.2);

                    calculateBranch(currentX, currentY, newAngle, newLength, newThick, depth + 1, tick);
                }
            }
        }

        // --- 2. RENDER ENGINE (Polygon & SVG) ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPot();

            if (!isGrowing) return;

            // Wachstumsgeschwindigkeit
            currentTick += 6; 

            // Durch alle berechneten Äste iterieren
            branches.forEach(branch => {
                // Filtere nur die Knoten, die im aktuellen Zeit-Tick schon gewachsen sind
                let visibleNodes = branch.nodes.filter(n => n.tick <= currentTick);
                if (visibleNodes.length < 2) return;

                // Polygon-Rinde zeichnen
                drawIrregularBranch(visibleNodes, C.outline, 5); // Dicke schwarze Outline
                drawIrregularBranch(visibleNodes, branch.dead ? '#b5aca3' : C.woodBase, 0); // Füllung
                drawBarkShadow(visibleNodes); // Rinden-Struktur

                // Blätter am Ende des Astes zeichnen
                let lastNode = visibleNodes[visibleNodes.length - 1];
                if (lastNode.isEnd && !branch.dead && branch.depth >= 3) {
                    // Blatt wächst auf, sobald der Ast fertig ist
                    let age = (currentTick - lastNode.tick) / 100;
                    if (age > 1) age = 1;
                    if (age > 0) drawLeafPad(lastNode.x, lastNode.y, age);
                }
            });

            if (currentTick < maxTick + 150) {
                requestAnimationFrame(render);
            }
        }

        function drawIrregularBranch(bNodes, color, expand) {
            ctx.fillStyle = color;
            ctx.beginPath();
            
            // Linke Kante hoch
            for (let i = 0; i < bNodes.length; i++) {
                let n = bNodes[i];
                let nx = Math.cos(n.angle - Math.PI/2);
                let ny = Math.sin(n.angle - Math.PI/2);
                let radius = Math.max(0, n.r + n.jl + expand); // Math.max verhindert Glitches
                ctx.lineTo(n.x + nx * radius, n.y + ny * radius);
            }
            
            // Rechte Kante runter
            for (let i = bNodes.length - 1; i >= 0; i--) {
                let n = bNodes[i];
                let nx = Math.cos(n.angle + Math.PI/2);
                let ny = Math.sin(n.angle + Math.PI/2);
                let radius = Math.max(0, n.r + n.jr + expand);
                ctx.lineTo(n.x + nx * radius, n.y + ny * radius);
            }
            
            ctx.closePath();
            ctx.fill();
        }

        function drawBarkShadow(bNodes) {
            ctx.strokeStyle = C.woodShadow;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let i = 0; i < bNodes.length; i+=6) { 
                let n = bNodes[i];
                let nx = Math.cos(n.angle + Math.PI/2);
                let ny = Math.sin(n.angle + Math.PI/2);
                let offset = n.r * 0.3; 
                if (i===0) ctx.moveTo(n.x + nx * offset, n.y + ny * offset);
                else ctx.lineTo(n.x + nx * offset, n.y + ny * offset);
            }
            ctx.stroke();
        }

        function drawLeafPad(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            
            // 3x SCALIERUNG: Die Blätter werden massiv vergrößert, passend zum Riesenbaum
            let finalScale = scale * 2.5; 
            ctx.scale(finalScale, finalScale);

            ctx.lineWidth = 12;
            ctx.strokeStyle = C.outline;
            ctx.lineJoin = 'round';
            ctx.stroke(leafSVG);

            ctx.fillStyle = C.leafDark;
            ctx.fill(leafSVG);

            ctx.save();
            ctx.translate(-4, -6);
            ctx.scale(0.85, 0.85);
            ctx.fillStyle = C.leafMid;
            ctx.fill(leafSVG);
            ctx.restore();

            // Zusätzliches Highlight für mehr Tiefe bei großen Blättern
            ctx.save();
            ctx.translate(-8, -12);
            ctx.scale(0.6, 0.6);
            ctx.fillStyle = C.leafLight;
            ctx.fill(leafSVG);
            ctx.restore();

            ctx.restore();
        }

        function drawPot() {
            let px = canvas.width / 2;
            let py = canvas.height - 80;

            // 3x Skalierter Topf
            ctx.fillStyle = C.outline;
            ctx.beginPath(); ctx.ellipse(px, py, 210, 50, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.roundRect(px - 180, py, 360, 100, 20); ctx.fill();

            ctx.fillStyle = '#3a2d24';
            ctx.beginPath(); ctx.roundRect(px - 175, py + 5, 350, 90, 16); ctx.fill();
            
            ctx.fillStyle = '#4c6628';
            ctx.beginPath(); ctx.ellipse(px, py - 10, 190, 30, 0, 0, Math.PI*2); ctx.fill();
        }

        function generateMathTree() {
            branches = [];
            currentTick = 0;
            maxTick = 0;
            branchIdCounter = 0;
            isGrowing = true;
            
            // START-PARAMETER (3x Größer)
            // Länge: 280, Dicke: 85, Winkel: Nach oben (-Math.PI/2)
            calculateBranch(canvas.width / 2, canvas.height - 110, -Math.PI / 2, 280, 85, 0, 0);
            
            render();
        }

        drawPot();

    </script>
</body>
</html>
