<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Bonsai - Smooth Transitions</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; background-color: #2b3a4a;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        
        canvas { 
            background-color: transparent; 
            width: 100%; max-width: 600px; 
            height: auto; aspect-ratio: 4/5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        .ui-container {
            display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; justify-content: center;
        }

        button {
            padding: 12px 20px; font-size: 15px;
            color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: all 0.1s;
        }
        
        #btn-grow { background-color: #5ab59f; box-shadow: 0 4px 0 #3b8774; }
        #btn-grow:active { transform: translateY(4px); box-shadow: 0 0 0 #3b8774; }
        
        #btn-toggle { background-color: #e07a5f; box-shadow: 0 4px 0 #b35942; }
        #btn-toggle:active { transform: translateY(4px); box-shadow: 0 0 0 #b35942; }
    </style>
</head>
<body>

    <canvas id="bonsaiCanvas" width="800" height="1000"></canvas>
    
    <div class="ui-container">
        <button id="btn-grow" onclick="generateMathTree()">🌱 Neuen Baum generieren</button>
        <button id="btn-toggle" onclick="toggleLeaves()">🍂 Blätter ausblenden</button>
    </div>

    <script>
        const canvas = document.getElementById('bonsaiCanvas');
        const ctx = canvas.getContext('2d');

        const C = {
            outline: '#1a1a1a',
            woodBase: '#9c8c7c',
            woodShadow: '#6e5e50',
            leafDark: '#365c42',
            leafMid: '#588b62',
            leafLight: '#7ab882'
        };

        const leafPathString = "M -40,10 C -50,0 -40,-20 -20,-20 C -15,-35 10,-40 25,-25 C 40,-35 60,-15 50,10 C 55,25 40,30 20,30 L -15,30 C -30,30 -40,25 -40,10 Z";
        const leafSVG = new Path2D(leafPathString);

        let branches = [];
        let currentTick = 0;
        let maxTick = 0;
        let isGrowing = false;
        let showLeaves = true; 

        function toggleLeaves() {
            showLeaves = !showLeaves;
            const btn = document.getElementById('btn-toggle');
            if (showLeaves) {
                btn.innerText = "🍂 Blätter ausblenden";
                btn.style.backgroundColor = "#e07a5f";
                btn.style.boxShadow = "0 4px 0 #b35942";
            } else {
                btn.innerText = "🍃 Blätter einblenden";
                btn.style.backgroundColor = "#81b29a";
                btn.style.boxShadow = "0 4px 0 #5f8a74";
            }
            if (!isGrowing && branches.length > 0) drawInstant();
        }

        function calculateBranch(startX, startY, angle, length, thickness, depth, startTick) {
            let nodes = [];
            
            let currentX = startX;
            let currentY = startY;
            let currentAngle = angle;
            let currentThick = thickness;
            let tick = startTick;

            let steps = Math.floor(length * 1.5); 
            
            // Verhindere das Spaghetti-Aufrollen:
            // Wir definieren ein Ziel, in das der Ast tendenziell wachsen soll.
            let targetAngle = angle + (Math.random() - 0.5) * 1.0; 
            
            for (let i = 0; i < steps; i++) {
                currentX += Math.cos(currentAngle) * 0.8; 
                currentY += Math.sin(currentAngle) * 0.8;
                
                // Sanfte Kurve in Richtung des Target-Angles, statt wildem Kreiseln
                currentAngle += (targetAngle - currentAngle) * 0.02 + (Math.random() - 0.5) * 0.05;
                
                // Nur GANZ minimale Verjüngung WÄHREND des Wachsens, 
                // die Haupt-Verjüngung passiert bei der Teilung (Deine 1-10% Regel)
                currentThick *= 0.998; 
                tick++;

                // Jitter (Knorpel) stark reduziert, damit die Ränder sauberer bleiben
                let jl = (Math.random() - 0.5) * (currentThick * 0.05);
                let jr = (Math.random() - 0.5) * (currentThick * 0.05);

                nodes.push({
                    x: currentX, y: currentY, 
                    angle: currentAngle, 
                    r: currentThick / 2,
                    jl: jl, jr: jr,
                    tick: tick,
                    isEnd: i === steps - 1
                });
            }

            let isDead = (Math.random() > 0.85 && depth > 2); 
            branches.push({ depth: depth, nodes: nodes, dead: isDead });

            if (tick > maxTick) maxTick = tick;

            // --- DEINE 1-10% SCHRUMPF-REGEL FÜR DIE TEILUNG ---
            if (depth < 6) {
                // Berechne den Schrumpf-Faktor basierend auf der Tiefe (0 bis 6)
                // depth 0 -> 1% (0.01) | depth 6 -> 10% (0.10)
                let depthFactor = Math.min(depth / 6, 1); 
                let shrinkPercent = 0.01 + depthFactor * 0.09; 
                
                // Neue Dicke berechnen (Nimmt nur 1-10% ab!)
                let newThick = thickness * (1 - shrinkPercent);

                let numChildren = Math.random() > 0.3 ? 2 : (Math.random() > 0.8 ? 3 : 1);
                
                for (let i = 0; i < numChildren; i++) {
                    let spread = (Math.random() - 0.5) * 1.4;
                    let newAngle = currentAngle + spread;
                    let newLength = length * (0.6 + Math.random() * 0.2);
                    
                    // Manchmal sind Seitenäste etwas dünner, aber der Hauptast folgt streng der Regel
                    let finalThick = (i === 0) ? newThick : newThick * (0.8 + Math.random() * 0.2);

                    calculateBranch(currentX, currentY, newAngle, newLength, finalThick, depth + 1, tick);
                }
            }
        }

        function renderLoop() {
            if (!isGrowing) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPot();

            currentTick += 6; 

            // --- GLOBAL MULTI-PASS RENDERING ---
            // Dieser Trick verhindert, dass die Äste sich gegenseitig überschneiden und Risse bilden.
            
            // PASS 1: ALLE SCHWARZEN OUTLINES ZUERST
            branches.forEach(branch => {
                let visibleNodes = branch.nodes.filter(n => n.tick <= currentTick);
                if (visibleNodes.length > 1) {
                    drawIrregularBranch(visibleNodes, C.outline, 4);
                }
            });

            // PASS 2: ALLE HOLZFÜLLUNGEN & SCHATTEN DARÜBER
            branches.forEach(branch => {
                let visibleNodes = branch.nodes.filter(n => n.tick <= currentTick);
                if (visibleNodes.length > 1) {
                    drawIrregularBranch(visibleNodes, branch.dead ? '#c2b8ad' : C.woodBase, 0);
                    drawBarkShadow(visibleNodes);
                }
            });

            // PASS 3: BLÄTTER GANZ ZUM SCHLUSS (Wenn Toggle aktiv)
            if (showLeaves) {
                branches.forEach(branch => {
                    let visibleNodes = branch.nodes.filter(n => n.tick <= currentTick);
                    if (visibleNodes.length > 1) {
                        let lastNode = visibleNodes[visibleNodes.length - 1];
                        if (lastNode.isEnd && !branch.dead && branch.depth >= 3) {
                            let age = (currentTick - lastNode.tick) / 60;
                            if (age > 1) age = 1;
                            if (age > 0) drawLeafPad(lastNode.x, lastNode.y, age);
                        }
                    }
                });
            }

            if (currentTick < maxTick + 100) {
                requestAnimationFrame(renderLoop);
            } else {
                isGrowing = false; 
            }
        }

        // Zeichnet sofort alles neu, wenn man den Blätter-Knopf drückt
        function drawInstant() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPot();
            
            // Multi-Pass Pass 1
            branches.forEach(branch => {
                if (branch.nodes.length > 1) drawIrregularBranch(branch.nodes, C.outline, 4);
            });
            // Multi-Pass Pass 2
            branches.forEach(branch => {
                if (branch.nodes.length > 1) {
                    drawIrregularBranch(branch.nodes, branch.dead ? '#c2b8ad' : C.woodBase, 0);
                    drawBarkShadow(branch.nodes);
                }
            });
            // Multi-Pass Pass 3
            if (showLeaves) {
                branches.forEach(branch => {
                    if (branch.nodes.length > 1 && !branch.dead && branch.depth >= 3) {
                        let lastNode = branch.nodes[branch.nodes.length - 1];
                        drawLeafPad(lastNode.x, lastNode.y, 1);
                    }
                });
            }
        }

        function drawIrregularBranch(bNodes, color, expand) {
            ctx.fillStyle = color;
            ctx.beginPath();
            
            for (let i = 0; i < bNodes.length; i++) {
                let n = bNodes[i];
                let nx = Math.cos(n.angle - Math.PI/2);
                let ny = Math.sin(n.angle - Math.PI/2);
                let radius = Math.max(0.1, n.r + n.jl + expand);
                ctx.lineTo(n.x + nx * radius, n.y + ny * radius);
            }
            
            for (let i = bNodes.length - 1; i >= 0; i--) {
                let n = bNodes[i];
                let nx = Math.cos(n.angle + Math.PI/2);
                let ny = Math.sin(n.angle + Math.PI/2);
                let radius = Math.max(0.1, n.r + n.jr + expand);
                ctx.lineTo(n.x + nx * radius, n.y + ny * radius);
            }
            
            ctx.closePath();
            ctx.fill();
        }

        function drawBarkShadow(bNodes) {
            ctx.strokeStyle = C.woodShadow;
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < bNodes.length; i+=5) { 
                let n = bNodes[i];
                let nx = Math.cos(n.angle + Math.PI/2);
                let ny = Math.sin(n.angle + Math.PI/2);
                let offset = n.r * 0.35; 
                if (i===0) ctx.moveTo(n.x + nx * offset, n.y + ny * offset);
                else ctx.lineTo(n.x + nx * offset, n.y + ny * offset);
            }
            ctx.stroke();
        }

        function drawLeafPad(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            
            let finalScale = scale * 0.9; 
            ctx.scale(finalScale, finalScale);

            ctx.lineWidth = 8;
            ctx.strokeStyle = C.outline;
            ctx.lineJoin = 'round';
            ctx.stroke(leafSVG);

            ctx.fillStyle = C.leafDark;
            ctx.fill(leafSVG);

            ctx.save();
            ctx.translate(-3, -5);
            ctx.scale(0.85, 0.85);
            ctx.fillStyle = C.leafMid;
            ctx.fill(leafSVG);
            ctx.restore();

            ctx.save();
            ctx.translate(-6, -9);
            ctx.scale(0.6, 0.6);
            ctx.fillStyle = C.leafLight;
            ctx.fill(leafSVG);
            ctx.restore();

            ctx.restore();
        }

        function drawPot() {
            let px = canvas.width / 2;
            let py = canvas.height - 100;

            ctx.fillStyle = C.outline;
            ctx.beginPath(); ctx.ellipse(px, py, 140, 35, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.roundRect(px - 120, py, 240, 70, 15); ctx.fill();

            ctx.fillStyle = '#4a3d35';
            ctx.beginPath(); ctx.roundRect(px - 116, py + 4, 232, 62, 12); ctx.fill();
            
            ctx.fillStyle = '#5c7a36';
            ctx.beginPath(); ctx.ellipse(px, py - 6, 125, 20, 0, 0, Math.PI*2); ctx.fill();
        }

        function generateMathTree() {
            branches = [];
            currentTick = 0;
            maxTick = 0;
            isGrowing = true;
            
            calculateBranch(canvas.width / 2, canvas.height - 120, -Math.PI / 2, 180, 35, 0, 0);
            
            renderLoop();
        }

        // Init
        drawPot();

    </script>
</body>
</html>
