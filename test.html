<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bonsai Zen Master - Prototyp</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        canvas { background: #2c3e50; width: 100%; max-width: 500px; height: auto; aspect-ratio: 5/7; border-radius: 12px; margin-top: 10px; }
        .controls { display: flex; gap: 10px; margin: 15px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 18px; border: none; border-radius: 8px; font-weight: bold; background: #485460; color: white; cursor: pointer; }
        button.active { background: #e07a5f; box-shadow: 0 0 15px rgba(224, 122, 95, 0.5); }
    </style>
</head>
<body>

<canvas id="bonsaiCanvas" width="800" height="1100"></canvas>

<div class="controls">
    <button id="btn-grow" onclick="setMode('grow')" class="active">🌱 Wachsen</button>
    <button id="btn-cut" onclick="setMode('cut')">✂️ Schneiden</button>
    <button id="btn-bend" onclick="setMode('bend')">🦾 Biegen</button>
    <button onclick="resetTree()" style="background:#576574">♻️ Neu</button>
</div>

<script>
const canvas = document.getElementById('bonsaiCanvas');
const ctx = canvas.getContext('2d');
const leafPath = new Path2D("M 0,-15 L 3,-5 L 12,-8 L 6,0 L 15,6 L 5,6 L 8,15 L 0,8 L -8,15 L -5,6 L -15,6 L -6,0 L -12,-8 L -3,-5 Z");

let mode = 'grow';
let branches = [];
let isDragging = false;
let selectedBranch = null;

const C = { outline: '#151515', wood: '#9c8c7c', shadow: '#6e5e50', leaf: '#c44536' };

class Branch {
    constructor(startX, startY, angle, thickness, length, depth, parent = null) {
        this.startX = startX;
        this.startY = startY;
        this.angle = angle;
        this.thickness = thickness;
        this.length = length;
        this.depth = depth;
        this.parent = parent;
        this.children = [];
        this.segments = [];
        this.isDead = false;
        this.generateSegments();
    }

    generateSegments() {
        this.segments = [];
        let currX = this.startX;
        let currY = this.startY;
        let currA = this.angle;
        let steps = Math.floor(this.length / 5);
        
        // Verjüngung 1-10% Regel
        let taper = 0.01 + Math.min(this.depth / 6, 1) * 0.09;
        let endThick = this.thickness * (1 - taper);

        for (let i = 0; i <= steps; i++) {
            let p = i / steps;
            let thick = this.thickness - (this.thickness - endThick) * p;
            this.segments.push({ x: currX, y: currY, r: thick / 2 });
            currX += Math.cos(currA) * 5;
            currY += Math.sin(currA) * 5;
            currA += (Math.random() - 0.5) * 0.05; // Natürliches Zittern
        }
        this.endX = currX;
        this.endY = currY;
    }

    draw() {
        // Outline Pass
        ctx.strokeStyle = C.outline;
        ctx.lineCap = 'round';
        ctx.lineWidth = this.thickness + 4;
        ctx.beginPath();
        ctx.moveTo(this.segments[0].x, this.segments[0].y);
        this.segments.forEach(s => ctx.lineTo(s.x, s.y));
        ctx.stroke();

        // Wood Pass
        ctx.strokeStyle = C.wood;
        ctx.lineWidth = this.thickness;
        ctx.beginPath();
        ctx.moveTo(this.segments[0].x, this.segments[0].y);
        this.segments.forEach(s => ctx.lineTo(s.x, s.y));
        ctx.stroke();

        // Blätter
        if (this.children.length === 0 && this.depth > 1) {
            ctx.save();
            ctx.translate(this.endX, this.endY);
            ctx.fillStyle = C.leaf;
            ctx.fill(leafPath);
            ctx.restore();
        }

        this.children.forEach(c => c.draw());
    }

    checkHit(mx, my) {
        let d = Math.hypot(mx - this.endX, my - this.endY);
        if (d < 30) return this;
        for (let c of this.children) {
            let found = c.checkHit(mx, my);
            if (found) return found;
        }
        return null;
    }
}

function setMode(m) {
    mode = m;
    document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + m).classList.add('active');
}

function resetTree() {
    branches = [new Branch(400, 1000, -Math.PI/2, 50, 150, 0)];
    render();
}

canvas.addEventListener('pointerdown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);

    let hit = null;
    branches.forEach(b => { if(!hit) hit = b.checkHit(mx, my) });

    if (mode === 'grow' && hit && hit.depth < 6) {
        let a = hit.angle + (Math.random() - 0.5) * 1.5;
        hit.children.push(new Branch(hit.endX, hit.endY, a, hit.segments[hit.segments.length-1].r*2, hit.length*0.7, hit.depth+1, hit));
    } else if (mode === 'cut' && hit && hit.parent) {
        hit.parent.children = hit.parent.children.filter(c => c !== hit);
    } else if (mode === 'bend' && hit) {
        selectedBranch = hit;
        isDragging = true;
    }
    render();
});

canvas.addEventListener('pointermove', e => {
    if (isDragging && selectedBranch) {
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);
        selectedBranch.angle = Math.atan2(my - selectedBranch.startY, mx - selectedBranch.startX);
        selectedBranch.generateSegments();
        render();
    }
});

canvas.addEventListener('pointerup', () => { isDragging = false; selectedBranch = null; });

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Topf
    ctx.fillStyle = "#3d3d3d";
    ctx.fillRect(250, 1000, 300, 50);
    branches.forEach(b => b.draw());
}

resetTree();
</script>
</body>
</html>
