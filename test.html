<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Bonsai - Nebari & Roots</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; background-color: #2b3a4a;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        
        canvas { 
            background-color: transparent; 
            width: 100%; max-width: 600px; 
            height: auto; aspect-ratio: 4/5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        .ui-container {
            display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; justify-content: center;
        }

        button {
            padding: 12px 20px; font-size: 15px;
            color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: all 0.1s;
        }
        
        #btn-grow { background-color: #5ab59f; box-shadow: 0 4px 0 #3b8774; }
        #btn-grow:active { transform: translateY(4px); box-shadow: 0 0 0 #3b8774; }
        
        #btn-toggle { background-color: #e07a5f; box-shadow: 0 4px 0 #b35942; }
        #btn-toggle:active { transform: translateY(4px); box-shadow: 0 0 0 #b35942; }
    </style>
</head>
<body>

    <canvas id="bonsaiCanvas" width="800" height="1000"></canvas>
    
    <div class="ui-container">
        <button id="btn-grow" onclick="generateMathTree()">🌱 Neuen Baum generieren</button>
        <button id="btn-toggle" onclick="toggleLeaves()">🍂 Blätter ausblenden</button>
    </div>

    <script>
        const canvas = document.getElementById('bonsaiCanvas');
        const ctx = canvas.getContext('2d');

        const C = {
            outline: '#1a1a1a',
            woodBase: '#9c8c7c',
            woodShadow: '#6e5e50',
            leafDark: '#365c42',
            leafMid: '#588b62',
            leafLight: '#7ab882'
        };

        const leafPathString = "M -40,10 C -50,0 -40,-20 -20,-20 C -15,-35 10,-40 25,-25 C 40,-35 60,-15 50,10 C 55,25 40,30 20,30 L -15,30 C -30,30 -40,25 -40,10 Z";
        const leafSVG = new Path2D(leafPathString);

        let branches = [];
        let currentTick = 0;
        let maxTick = 0;
        let isGrowing = false;
        let showLeaves = true; 

        function toggleLeaves() {
            showLeaves = !showLeaves;
            const btn = document.getElementById('btn-toggle');
            if (showLeaves) {
                btn.innerText = "🍂 Blätter ausblenden";
                btn.style.backgroundColor = "#e07a5f";
                btn.style.boxShadow = "0 4px 0 #b35942";
            } else {
                btn.innerText = "🍃 Blätter einblenden";
                btn.style.backgroundColor = "#81b29a";
                btn.style.boxShadow = "0 4px 0 #5f8a74";
            }
            if (!isGrowing && branches.length > 0) drawInstant();
        }

        // --- 1. DIE PERFEKTE MATHEMATIK (inkl. Wurzeln) ---
        function calculateBranch(startX, startY, angle, length, startThickness, depth, startTick, isRoot = false) {
            let nodes = [];
            let currentX = startX;
            let currentY = startY;
            let currentAngle = angle;
            let tick = startTick;

            // Deine 1-10% Regel (Wurzeln schrumpfen viel stärker, um spitz in der Erde auszulaufen)
            let shrinkPercent;
            if (isRoot) {
                shrinkPercent = 0.5; // Wurzeln verjüngen sich um 50%
            } else {
                let depthFactor = Math.min(depth / 6, 1);
                shrinkPercent = 0.01 + depthFactor * 0.09; // 1% unten, 10% oben
            }
            
            // Exakte End-Dicke dieses Astes berechnen
            let endThickness = startThickness * (1 - shrinkPercent);

            let steps = Math.floor(length * 1.5); 
            let targetAngle = angle + (Math.random() - 0.5) * 1.2; 
            
            for (let i = 0; i <= steps; i++) {
                currentX += Math.cos(currentAngle) * 0.8; 
                currentY += Math.sin(currentAngle) * 0.8;
                
                currentAngle += (targetAngle - currentAngle) * 0.03 + (Math.random() - 0.5) * 0.06;
                
                // Lineare Interpolation der Dicke von Start bis Ende (perfekter weicher Übergang)
                let progress = i / steps;
                let currentThick = startThickness - (startThickness - endThickness) * progress;
                
                tick++;

                nodes.push({
                    x: currentX, y: currentY, 
                    angle: currentAngle, 
                    r: currentThick / 2, 
                    tick: tick,
                    isEnd: i === steps
                });
            }

            let isDead = (!isRoot && Math.random() > 0.85 && depth > 2); 
            branches.push({ depth: depth, nodes: nodes, dead: isDead, isRoot: isRoot });

            if (tick > maxTick) maxTick = tick;

            // SPAWN SYSTEM (Wurzeln verzweigen nicht, nur Äste)
            if (!isRoot && depth < 6) {
                let numChildren = Math.random() > 0.4 ? 2 : (Math.random() > 0.8 ? 3 : 1);
                
                for (let i = 0; i < numChildren; i++) {
                    let spread = (Math.random() - 0.5) * 1.5;
                    let newAngle = currentAngle + spread;
                    let newLength = length * (0.6 + Math.random() * 0.2);
                    
                    let nextStartThickness;
                    if (i === 0) {
                        // HAUPT-AST übernimmt EXAKT 100% der Dicke
                        nextStartThickness = endThickness; 
                    } else {
                        // SEITEN-ÄSTE sind etwas dünner
                        nextStartThickness = endThickness * (0.5 + Math.random() * 0.2);
                    }

                    calculateBranch(currentX, currentY, newAngle, newLength, nextStartThickness, depth + 1, tick, false);
                }
            }
        }

        // --- 2. DAS RENDER-SYSTEM (Runde Vektor-Gelenke) ---
        function drawSmoothBranch(bNodes, color, expand) {
            ctx.strokeStyle = color;
            ctx.lineCap = 'round'; 
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            for (let i = 0; i < bNodes.length - 1; i++) {
                let n1 = bNodes[i];
                let n2 = bNodes[i+1];
                
                ctx.beginPath();
                ctx.moveTo(n1.x, n1.y);
                ctx.lineTo(n2.x, n2.y);
                ctx.lineWidth = Math.max(0.1, (n1.r * 2) + expand);
                ctx.stroke();
            }
        }

        function drawBarkShadow(bNodes) {
            ctx.strokeStyle = C.woodShadow;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 2.5;
            
            ctx.beginPath();
            for (let i = 0; i < bNodes.length; i+=4) { 
                let n = bNodes[i];
                let nx = Math.cos(n.angle + Math.PI/2);
                let ny = Math.sin(n.angle + Math.PI/2);
                let offset = n.r * 0.4; 
                if (i===0) ctx.moveTo(n.x + nx * offset, n.y + ny * offset);
                else ctx.lineTo(n.x + nx * offset, n.y + ny * offset);
            }
            ctx.stroke();
        }

        function renderLoop() {
            if (!isGrowing) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPot();

            currentTick += 6; 

            // PASS 1: OUTLINES
            branches.forEach(branch => {
                let visibleNodes = branch.nodes.filter(n => n.tick <= currentTick);
                if (visibleNodes.length > 1) {
                    drawSmoothBranch(visibleNodes, C.outline, 4);
                }
            });

            // PASS 2: HOLZ
            branches.forEach(branch => {
                let visibleNodes = branch.nodes.filter(n => n.tick <= currentTick);
                if (visibleNodes.length > 1) {
                    drawSmoothBranch(visibleNodes, branch.dead ? '#c2b8ad' : C.woodBase, 0);
                    drawBarkShadow(visibleNodes);
                }
            });

            // PASS 3: BLÄTTER
            if (showLeaves) {
                branches.forEach(branch => {
                    let visibleNodes = branch.nodes.filter(n => n.tick <= currentTick);
                    if (visibleNodes.length > 1) {
                        let lastNode = visibleNodes[visibleNodes.length - 1];
                        if (lastNode.isEnd && !branch.dead && !branch.isRoot && branch.depth >= 3) {
                            let age = (currentTick - lastNode.tick) / 60;
                            if (age > 1) age = 1;
                            if (age > 0) drawLeafPad(lastNode.x, lastNode.y, age);
                        }
                    }
                });
            }

            // Moos über die Wurzeln zeichnen, damit sie teilweise in der Erde verschwinden
            drawSoilFront();

            if (currentTick < maxTick + 100) requestAnimationFrame(renderLoop);
            else isGrowing = false; 
        }

        function drawInstant() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPot();
            
            branches.forEach(branch => {
                if (branch.nodes.length > 1) drawSmoothBranch(branch.nodes, C.outline, 4);
            });
            branches.forEach(branch => {
                if (branch.nodes.length > 1) {
                    drawSmoothBranch(branch.nodes, branch.dead ? '#c2b8ad' : C.woodBase, 0);
                    drawBarkShadow(branch.nodes);
                }
            });
            if (showLeaves) {
                branches.forEach(branch => {
                    if (branch.nodes.length > 1 && !branch.dead && !branch.isRoot && branch.depth >= 3) {
                        let lastNode = branch.nodes[branch.nodes.length - 1];
                        drawLeafPad(lastNode.x, lastNode.y, 1);
                    }
                });
            }
            
            drawSoilFront();
        }

        function drawLeafPad(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            
            let finalScale = scale * 0.9; 
            ctx.scale(finalScale, finalScale);

            ctx.lineWidth = 8;
            ctx.strokeStyle = C.outline;
            ctx.lineJoin = 'round';
            ctx.stroke(leafSVG);

            ctx.fillStyle = C.leafDark;
            ctx.fill(leafSVG);

            ctx.save();
            ctx.translate(-3, -5);
            ctx.scale(0.85, 0.85);
            ctx.fillStyle = C.leafMid;
            ctx.fill(leafSVG);
            ctx.restore();

            ctx.save();
            ctx.translate(-6, -9);
            ctx.scale(0.6, 0.6);
            ctx.fillStyle = C.leafLight;
            ctx.fill(leafSVG);
            ctx.restore();

            ctx.restore();
        }

        // Topf Hintergrund (Rückwand & Basis)
        function drawPot() {
            let px = canvas.width / 2;
            let py = canvas.height - 100;

            ctx.fillStyle = C.outline;
            ctx.beginPath(); ctx.ellipse(px, py, 140, 35, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.roundRect(px - 120, py, 240, 70, 15); ctx.fill();

            ctx.fillStyle = '#4a3d35';
            ctx.beginPath(); ctx.roundRect(px - 116, py + 4, 232, 62, 12); ctx.fill();
            
            // Erde Hinten
            ctx.fillStyle = '#455c28';
            ctx.beginPath(); ctx.ellipse(px, py - 6, 125, 20, 0, 0, Math.PI*2); ctx.fill();
        }

        // Erde Vorne (Überlagert die Wurzeln leicht, damit sie "eingegraben" wirken)
        function drawSoilFront() {
            let px = canvas.width / 2;
            let py = canvas.height - 100;
            
            ctx.fillStyle = '#5c7a36'; // Helleres Moos vorne
            ctx.beginPath(); 
            ctx.ellipse(px, py + 2, 130, 12, 0, 0, Math.PI); // Nur vordere Hälfte
            ctx.fill();
        }

        function generateMathTree() {
            branches = [];
            currentTick = 0;
            maxTick = 0;
            isGrowing = true;
            
            let startX = canvas.width / 2;
            let startY = canvas.height - 120;
            let startThick = 45;

            // --- NEBARI WURZEL-GENERIERUNG ---
            let numRoots = 5 + Math.floor(Math.random() * 4);
            for(let i = 0; i < numRoots; i++) {
                // Wurzeln streuen nach unten-links und unten-rechts
                let rootAngle = (Math.PI / 2) + (Math.random() - 0.5) * 2.5; 
                let rootLength = 15 + Math.random() * 25;
                let rootThick = startThick * (0.3 + Math.random() * 0.4); // Wurzeln sind etwas dünner als der Stamm
                
                // isRoot = true übergeben
                calculateBranch(startX, startY - 10, rootAngle, rootLength, rootThick, 0, 0, true);
            }

            // --- HAUPTSTAMM GENERIERUNG ---
            calculateBranch(startX, startY, -Math.PI / 2, 180, startThick, 0, 0, false);
            
            renderLoop();
        }

        // Init
        drawPot();

    </script>
</body>
</html>
