<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonsai - SVG Skeleton Engine</title>
    <style>
        body {
            margin: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; background-color: #2b3a4a;
            font-family: sans-serif;
        }
        canvas { background-color: transparent; }
        button {
            margin-top: 20px; padding: 12px 24px; font-size: 16px;
            background-color: #5ab59f; color: #1a2634; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 0 #3b8774; transition: all 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #3b8774; }
    </style>
</head>
<body>

    <canvas id="bonsaiCanvas" width="600" height="700"></canvas>
    <button onclick="plantSeed()">🌱 Skelett wachsen lassen</button>

    <script>
        const canvas = document.getElementById('bonsaiCanvas');
        const ctx = canvas.getContext('2d');

        // Farbpalette aus deiner Referenz
        const COLORS = {
            outline: '#151515',
            wood: '#9c8c7c',
            woodDark: '#6e5e50',
            leafDark: '#365c42',
            leafMid: '#588b62',
            leafLight: '#7ab882'
        };

        // 1. DER INLINE-SVG PFAD (Das handgemachte Prefab)
        // Dies ist ein Vektor-Pfad, der eine flache, wolkige Bonsai-Nadelstruktur abbildet.
        const leafPathString = "M -40,10 C -50,0 -40,-20 -20,-20 C -15,-35 10,-40 25,-25 C 40,-35 60,-15 50,10 C 55,25 40,30 20,30 L -15,30 C -30,30 -40,25 -40,10 Z";
        const leafSVG = new Path2D(leafPathString);

        let skeleton = [];
        let foliage = [];
        let globalAge = 0;
        let isGrowing = false;

        // 2. DAS SKELETT-SYSTEM (Die Knochen)
        class Bone {
            constructor(startX, startY, angle, length, thickness, depth) {
                this.startX = startX;
                this.startY = startY;
                this.angle = angle;
                this.targetLength = length;
                this.thickness = thickness;
                this.depth = depth;
                
                // Für die Kaskaden-Form (hängt nach links)
                let bias = (depth === 0) ? -0.1 : -0.2; 
                this.curve = bias + (Math.random() - 0.5) * 0.3;

                this.currentLength = 0;
                this.isMature = false;
                this.endX = startX;
                this.endY = startY;
            }

            grow() {
                if (this.isMature) return false;

                this.currentLength += 2; // Wachstumsgeschwindigkeit
                this.angle += this.curve * 0.05; // Organische Krümmung beim Wachsen

                this.endX = this.startX + Math.cos(this.angle) * this.currentLength;
                this.endY = this.startY + Math.sin(this.angle) * this.currentLength;

                if (this.currentLength >= this.targetLength) {
                    this.isMature = true;
                    this.spawnChildren();
                }
                return true;
            }

            spawnChildren() {
                if (this.depth >= 4) {
                    // Am Ende der Knochen platzieren wir das SVG-Prefab!
                    foliage.push(new FoliagePad(this.endX, this.endY));
                    return;
                }

                // 1 bis 2 neue Äste
                let numChildren = Math.random() > 0.3 ? 2 : 1;
                for (let i = 0; i < numChildren; i++) {
                    let newAngle = this.angle + (Math.random() - 0.5) * 1.5;
                    let newLen = this.targetLength * (0.6 + Math.random() * 0.3);
                    let newThick = this.thickness * 0.7;
                    skeleton.push(new Bone(this.endX, this.endY, newAngle, newLen, newThick, this.depth + 1));
                }

                // Manchmal auch ein Blattpolster mittendrin für mehr Volumen
                if (this.depth >= 2 && Math.random() > 0.5) {
                    foliage.push(new FoliagePad(this.endX, this.endY));
                }
            }
        }

        // 3. DIE HAUT (Das Rendern der SVGs)
        class FoliagePad {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.scale = 0;
                this.targetScale = 0.5 + Math.random() * 0.5; // Leicht unterschiedliche Größen
                this.rotation = (Math.random() - 0.5) * 0.2; // Leichte Neigung
            }

            grow() {
                if (this.scale < this.targetScale) {
                    this.scale += 0.02; // Plop-In Animation
                }
            }

            draw(ctx) {
                if (this.scale <= 0) return;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.scale, this.scale);

                // Multi-Pass innerhalb des SVGs für den sauberen Vector-Look
                
                // Outline (Dicker schwarzer Rand)
                ctx.lineWidth = 12;
                ctx.strokeStyle = COLORS.outline;
                ctx.lineJoin = 'round';
                ctx.stroke(leafSVG);

                // Schatten-Basis (Dunkelgrün)
                ctx.fillStyle = COLORS.leafDark;
                ctx.fill(leafSVG);

                // Highlight-Schicht (Hellgrün, leicht nach oben links versetzt)
                ctx.save();
                ctx.translate(-3, -6);
                ctx.scale(0.85, 0.85); // Etwas kleiner
                ctx.fillStyle = COLORS.leafMid;
                ctx.fill(leafSVG);
                ctx.restore();

                ctx.restore();
            }
        }

        // --- RENDER LOOP ---
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPot();

            if (!isGrowing) return;

            // Logik
            skeleton.forEach(bone => bone.grow());
            foliage.forEach(pad => pad.grow());

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 1. Pass: Holz Outlines (Schwarz)
            ctx.strokeStyle = COLORS.outline;
            skeleton.forEach(bone => {
                if (bone.currentLength > 0) {
                    ctx.lineWidth = bone.thickness + 6;
                    ctx.beginPath(); ctx.moveTo(bone.startX, bone.startY); ctx.lineTo(bone.endX, bone.endY); ctx.stroke();
                }
            });

            // 2. Pass: Holz Füllung (Braun)
            ctx.strokeStyle = COLORS.wood;
            skeleton.forEach(bone => {
                if (bone.currentLength > 0) {
                    ctx.lineWidth = bone.thickness;
                    ctx.beginPath(); ctx.moveTo(bone.startX, bone.startY); ctx.lineTo(bone.endX, bone.endY); ctx.stroke();
                }
            });

            // 3. Pass: Die SVG-Blattpolster
            foliage.forEach(pad => pad.draw(ctx));

            requestAnimationFrame(render);
        }

        function drawPot() {
            let px = canvas.width / 2;
            let py = canvas.height - 100;

            ctx.fillStyle = COLORS.outline;
            ctx.beginPath(); ctx.roundRect(px - 72, py - 2, 144, 24, 5); ctx.fill(); 
            ctx.beginPath(); ctx.roundRect(px - 62, py + 18, 124, 44, 10); ctx.fill(); 

            ctx.fillStyle = '#4a3d35';
            ctx.beginPath(); ctx.roundRect(px - 70, py, 140, 20, 4); ctx.fill(); 
            
            ctx.fillStyle = '#5e4b40';
            ctx.beginPath(); ctx.roundRect(px - 60, py + 20, 120, 40, 8); ctx.fill(); 
        }

        function plantSeed() {
            skeleton = [];
            foliage = [];
            isGrowing = true;
            
            // Start-Knochen (Stamm)
            skeleton.push(new Bone(canvas.width / 2, canvas.height - 105, -Math.PI / 2, 80, 28, 0));
            render();
        }

        drawPot();
    </script>
</body>
</html>
