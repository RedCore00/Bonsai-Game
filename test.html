<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animierter Bonsai V2 - Vektor Style</title>
    <style>
        body {
            margin: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; background-color: #2c3e50; /* Dunklerer Hintergrund */
            font-family: sans-serif;
        }
        canvas { background-color: transparent; }
        button {
            margin-top: 20px; padding: 12px 24px; font-size: 16px;
            background-color: #5ab59f; color: #1a2634; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 0 #3b8774; transition: all 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #3b8774; }
    </style>
</head>
<body>

    <canvas id="bonsaiCanvas" width="600" height="700"></canvas>
    <button onclick="resetAndGrow()">🌱 Samen pflanzen</button>

    <script>
        const canvas = document.getElementById('bonsaiCanvas');
        const ctx = canvas.getContext('2d');

        // Exakte Farbpalette aus deinen Referenzbildern
        const COLORS = {
            outline: '#1e1e1e',
            wood: '#9c8c7c',       // Helleres, totes Holz
            woodDark: '#6e5e50',   // Schattenseite Holz
            leafDark: '#365c42',   // Dunkelgrün (Schatten)
            leafMid: '#588b62',    // Mittelgrün
            leafLight: '#7ab882',  // Hellgrün (Highlight)
            potRim: '#4a3d35',
            potBase: '#5e4b40'
        };

        let branchSegments = []; // Speichert alle gezeichneten Teilstücke
        let activeBranches = []; // Äste, die gerade wachsen
        let leafPads = [];       // Die flachen Nadelpolster
        let isGrowing = false;

        class Branch {
            constructor(x, y, angle, thickness, depth) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.thickness = thickness;
                this.depth = depth;
                
                // Knorriges Wachstum: Wie lange wächst dieser Ast, bevor er sich teilt?
                this.maxLength = 20 + Math.random() * 40 * (1 / (depth + 1));
                this.currentLength = 0;
                
                // Biegung (Bend): Bonsais biegen sich oft nach unten oder zur Seite
                // Wir zwingen den Baum durch einen "Bias" leicht nach rechts/unten
                this.bend = (Math.random() - 0.3) * 0.1; 
                if (depth === 0) this.bend = (Math.random() - 0.5) * 0.05; // Stamm bleibt aufrechter
            }

            update() {
                if (this.currentLength >= this.maxLength) {
                    this.branchOut();
                    return false; // Dieser Ast ist fertig
                }

                // Ast wächst ein kleines Stück
                let step = 2;
                this.currentLength += step;
                this.angle += this.bend; // Ast biegt sich

                let nextX = this.x + Math.cos(this.angle) * step;
                let nextY = this.y + Math.sin(this.angle) * step;

                // Verjüngung (Tapering)
                this.thickness *= 0.98;

                // Segment speichern für das Multi-Pass Rendering
                branchSegments.push({
                    x1: this.x, y1: this.y, 
                    x2: nextX, y2: nextY, 
                    thick: this.thickness
                });

                this.x = nextX;
                this.y = nextY;

                return true; // Ast wächst noch
            }

            branchOut() {
                // Maximale Verzweigungstiefe
                if (this.depth > 5) {
                    // Am Ende der Äste entstehen die flachen Nadelpolster
                    leafPads.push(new LeafPad(this.x, this.y));
                    return;
                }

                // 1 bis 3 neue Äste spawnen
                let numBranches = Math.random() > 0.4 ? 2 : (Math.random() > 0.8 ? 3 : 1);
                
                for (let i = 0; i < numBranches; i++) {
                    let newAngle = this.angle + (Math.random() - 0.5) * 1.2;
                    // Wenn es ein dicker Ast ist, spalte einen dünneren ab
                    let newThick = this.thickness * (0.6 + Math.random() * 0.2);
                    activeBranches.push(new Branch(this.x, this.y, newAngle, newThick, this.depth + 1));
                }

                // Manchmal spawnen wir auch Polster an den inneren Ästen (für Dichte)
                if (this.depth > 2 && Math.random() > 0.5) {
                    leafPads.push(new LeafPad(this.x, this.y));
                }
            }
        }

        class LeafPad {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.scale = 0; // Für die Pop-In Animation
                
                // Wir generieren ein flaches, horizontales Polster aus kleinen Kreisen
                this.blobs = [];
                let numBlobs = 6 + Math.floor(Math.random() * 6);
                for (let i = 0; i < numBlobs; i++) {
                    this.blobs.push({
                        // Breite Streuung (horizontal), enge Streuung (vertikal) -> Flache Pads
                        ox: (Math.random() - 0.5) * 45, 
                        oy: (Math.random() - 0.5) * 15,
                        r: 6 + Math.random() * 8
                    });
                }
            }

            update() {
                if (this.scale < 1) this.scale += 0.05; // Wachstums-Animation
            }

            drawOutline(ctx) {
                if (this.scale <= 0) return;
                ctx.fillStyle = COLORS.outline;
                this.blobs.forEach(b => {
                    ctx.beginPath();
                    ctx.arc(this.x + b.ox * this.scale, this.y + b.oy * this.scale, (b.r * this.scale) + 2.5, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            drawFill(ctx) {
                if (this.scale <= 0) return;
                
                // 1. Dunkelgrün (Basis/Schatten)
                ctx.fillStyle = COLORS.leafDark;
                this.blobs.forEach(b => {
                    ctx.beginPath(); 
                    ctx.arc(this.x + b.ox * this.scale, this.y + b.oy * this.scale, b.r * this.scale, 0, Math.PI * 2); 
                    ctx.fill();
                });

                // 2. Mittelgrün (leicht nach oben links versetzt)
                ctx.fillStyle = COLORS.leafMid;
                this.blobs.forEach(b => {
                    ctx.beginPath(); 
                    ctx.arc(this.x + (b.ox - 2) * this.scale, this.y + (b.oy - 3) * this.scale, (b.r * 0.8) * this.scale, 0, Math.PI * 2); 
                    ctx.fill();
                });

                // 3. Hellgrün Highlight (noch weiter oben)
                ctx.fillStyle = COLORS.leafLight;
                this.blobs.forEach(b => {
                    ctx.beginPath(); 
                    ctx.arc(this.x + (b.ox - 4) * this.scale, this.y + (b.oy - 5) * this.scale, (b.r * 0.4) * this.scale, 0, Math.PI * 2); 
                    ctx.fill();
                });
            }
        }

        function drawPot() {
            let px = canvas.width / 2;
            let py = canvas.height - 100;

            // Einfacher, aber schicker Vektor-Topf
            ctx.fillStyle = COLORS.outline;
            ctx.beginPath(); ctx.roundRect(px - 72, py - 2, 144, 24, 5); ctx.fill(); // Rand Outline
            ctx.beginPath(); ctx.roundRect(px - 62, py + 18, 124, 44, 10); ctx.fill(); // Basis Outline

            ctx.fillStyle = COLORS.potRim;
            ctx.beginPath(); ctx.roundRect(px - 70, py, 140, 20, 4); ctx.fill(); // Rand Füllung
            
            ctx.fillStyle = COLORS.potBase;
            ctx.beginPath(); ctx.roundRect(px - 60, py + 20, 120, 40, 8); ctx.fill(); // Basis Füllung

            // Erde / Moos
            ctx.fillStyle = COLORS.leafDark;
            ctx.beginPath(); ctx.ellipse(px, py, 60, 8, 0, 0, Math.PI * 2); ctx.fill();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPot();

            if (!isGrowing) return;

            // Logik Update
            activeBranches = activeBranches.filter(b => b.update());
            leafPads.forEach(l => l.update());

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // Multi-Pass Rendering: 1. Outlines (Schwarz)
            ctx.strokeStyle = COLORS.outline;
            branchSegments.forEach(seg => {
                ctx.lineWidth = seg.thick + 4; // Dickere Outline
                ctx.beginPath(); ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2); ctx.stroke();
            });

            // Multi-Pass Rendering: 2. Holzfüllung
            ctx.strokeStyle = COLORS.wood;
            branchSegments.forEach(seg => {
                ctx.lineWidth = seg.thick;
                ctx.beginPath(); ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2); ctx.stroke();
            });

            // Blätter Outlines (hinter der Füllung)
            leafPads.forEach(l => l.drawOutline(ctx));
            
            // Blätter Füllung (darüber)
            leafPads.forEach(l => l.drawFill(ctx));

            requestAnimationFrame(render);
        }

        function resetAndGrow() {
            branchSegments = [];
            activeBranches = [];
            leafPads = [];
            isGrowing = true;
            
            // Start-Stamm: Mitte, nach oben, dick
            activeBranches.push(new Branch(canvas.width / 2, canvas.height - 105, -Math.PI / 2, 28, 0));
            render();
        }

        drawPot();
    </script>
</body>
</html>
