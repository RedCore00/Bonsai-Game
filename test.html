<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Bonsai - Dynamic Tapering & Huge Scale</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; background-color: #2b3a4a;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }
        
        canvas { 
            background-color: transparent; 
            width: 100%; max-width: 600px; 
            height: auto; 
            aspect-ratio: 5/6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 8px;
        }

        .ui-container {
            display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; justify-content: center;
        }

        button {
            padding: 12px 20px; font-size: 15px;
            color: white; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: all 0.1s;
        }
        
        #btn-grow { background-color: #5ab59f; box-shadow: 0 4px 0 #3b8774; }
        #btn-grow:active { transform: translateY(4px); box-shadow: 0 0 0 #3b8774; }
        
        #btn-toggle { background-color: #e07a5f; box-shadow: 0 4px 0 #b35942; }
        #btn-toggle:active { transform: translateY(4px); box-shadow: 0 0 0 #b35942; }
    </style>
</head>
<body>

    <canvas id="bonsaiCanvas" width="1000" height="1200"></canvas>
    
    <div class="ui-container">
        <button id="btn-grow" onclick="generateMathTree()">🌱 Gigantischen Baum generieren</button>
        <button id="btn-toggle" onclick="toggleLeaves()">🍂 Blätter ausblenden</button>
    </div>

    <script>
        const canvas = document.getElementById('bonsaiCanvas');
        const ctx = canvas.getContext('2d');

        const C = {
            outline: '#1a1a1a',
            woodBase: '#9c8c7c',
            woodShadow: '#6e5e50',
            leafDark: '#365c42',
            leafMid: '#588b62',
            leafLight: '#7ab882'
        };

        const leafPathString = "M -40,10 C -50,0 -40,-20 -20,-20 C -15,-35 10,-40 25,-25 C 40,-35 60,-15 50,10 C 55,25 40,30 20,30 L -15,30 C -30,30 -40,25 -40,10 Z";
        const leafSVG = new Path2D(leafPathString);

        let branches = [];
        let leafSpawns = [];
        let currentTick = 0;
        let maxTick = 0;
        let isGrowing = false;
        let showLeaves = true; 

        function toggleLeaves() {
            showLeaves = !showLeaves;
            const btn = document.getElementById('btn-toggle');
            if (showLeaves) {
                btn.innerText = "🍂 Blätter ausblenden";
                btn.style.backgroundColor = "#e07a5f";
                btn.style.boxShadow = "0 4px 0 #b35942";
            } else {
                btn.innerText = "🍃 Blätter einblenden";
                btn.style.backgroundColor = "#81b29a";
                btn.style.boxShadow = "0 4px 0 #5f8a74";
            }
            if (!isGrowing && branches.length > 0) drawInstant();
        }

        // NEU: taperFactor hinzugefügt. Steuert, wie schnell DIESER spezifische Ast schrumpft.
        function calculateBranch(startX, startY, angle, length, startThickness, depth, startTick, isRoot = false, taperFactor = 0.08) {
            let nodes = [];
            let currentX = startX;
            let currentY = startY;
            let currentAngle = angle;
            let tick = startTick;

            // Dynamisches Schrumpfen: Der taperFactor wird hier multipliziert.
            // Manche Äste haben einen hohen taperFactor (werden schnell dünn), andere einen niedrigen (bleiben massiv).
            let shrinkPercent = isRoot ? 0.5 : 0.01 + Math.min(depth / 6, 1) * taperFactor; 
            
            // Verhindern, dass Äste um mehr als 80% auf einmal schrumpfen (Glitches vermeiden)
            shrinkPercent = Math.min(shrinkPercent, 0.8);
            
            let endThickness = startThickness * (1 - shrinkPercent);

            let steps = Math.floor(length * 1.5); 
            let targetAngle = angle + (Math.random() - 0.5) * 1.2; 
            
            for (let i = 0; i <= steps; i++) {
                currentX += Math.cos(currentAngle) * 0.8; 
                currentY += Math.sin(currentAngle) * 0.8;
                
                // Zentrums-Magnet für das Framing
                let distanceFromCenter = currentX - (canvas.width / 2);
                let centerPull = (distanceFromCenter / (canvas.width / 2)) * 0.4;
                
                currentAngle += (targetAngle - currentAngle - centerPull) * 0.03 + (Math.random() - 0.5) * 0.06;
                
                let progress = i / steps;
                let currentThick = startThickness - (startThickness - endThickness) * progress;
                
                tick++;

                nodes.push({
                    x: currentX, y: currentY, 
                    angle: currentAngle, 
                    r: currentThick / 2, 
                    tick: tick,
                    isEnd: i === steps
                });
            }

            let isDead = (!isRoot && Math.random() > 0.85 && depth > 2); 
            branches.push({ depth: depth, nodes: nodes, dead: isDead, isRoot: isRoot });

            if (!isRoot && !isDead) {
                let chanceForLeaf = depth === 0 ? 0 : (depth === 1 ? 0.2 : (depth === 2 ? 0.5 : 0.9));
                if (Math.random() < chanceForLeaf) {
                    let scaleModifier = depth < 3 ? 0.8 : 1.2; // Blätter auch etwas größer skaliert
                    leafSpawns.push({ x: currentX, y: currentY, tick: tick, scaleMod: scaleModifier, depth: depth });
                }
            }

            if (tick > maxTick) maxTick = tick;

            // --- REKURSION UND MUTATION DES SCHRUMPFENS ---
            if (!isRoot && depth < 5) { 
                let numChildren = Math.random() > 0.4 ? 2 : (Math.random() > 0.8 ? 3 : 1);
                
                for (let i = 0; i < numChildren; i++) {
                    let spread = (Math.random() - 0.5) * 1.5;
                    let newAngle = currentAngle + spread;
                    
                    // Äste sind proportional etwas länger für den Riesenbaum
                    let newLength = length * (0.6 + Math.random() * 0.25);
                    
                    let nextStartThickness = (i === 0) ? endThickness : endThickness * (0.5 + Math.random() * 0.3);

                    // MUTATION DES TAPER-FAKTORS:
                    // Der nächste Ast kann zwischen 60% und 150% der Schrumpf-Rate seines Elternastes haben.
                    // Das sorgt dafür, dass sich der Baum in manchen Regionen schnell verdünnt und woanders massiv bleibt.
                    let nextTaperFactor = taperFactor * (0.6 + Math.random() * 0.9);
                    
                    calculateBranch(currentX, currentY, newAngle, newLength, nextStartThickness, depth + 1, tick, false, nextTaperFactor);
                }
            }
        }

        function drawSmoothBranch(bNodes, color, expand) {
            ctx.strokeStyle = color;
            ctx.lineCap = 'round'; 
            ctx.lineJoin = 'round';
            
            ctx.beginPath();
            for (let i = 0; i < bNodes.length - 1; i++) {
                let n1 = bNodes[i];
                let n2 = bNodes[i+1];
                
                ctx.beginPath();
                ctx.moveTo(n1.x, n1.y);
                ctx.lineTo(n2.x, n2.y);
                ctx.lineWidth = Math.max(0.1, (n1.r * 2) + expand);
                ctx.stroke();
            }
        }

        function drawBarkShadow(bNodes) {
            ctx.strokeStyle = C.woodShadow;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 2.5;
            
            ctx.beginPath();
            for (let i = 0; i < bNodes.length; i+=4) { 
                let n = bNodes[i];
                let nx = Math.cos(n.angle + Math.PI/2);
                let ny = Math.sin(n.angle + Math.PI/2);
                let offset = n.r * 0.4; 
                if (i===0) ctx.moveTo(n.x + nx * offset, n.y + ny * offset);
                else ctx.lineTo(n.x + nx * offset, n.y + ny * offset);
            }
            ctx.stroke();
        }

        function renderLoop() {
            if (!isGrowing) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPot();

            currentTick += 6; 

            branches.forEach(branch => {
                let visibleNodes = branch.nodes.filter(n => n.tick <= currentTick);
                if (visibleNodes.length > 1) {
                    drawSmoothBranch(visibleNodes, C.outline, 4);
                }
            });
            branches.forEach(branch => {
                let visibleNodes = branch.nodes.filter(n => n.tick <= currentTick);
                if (visibleNodes.length > 1) {
                    drawSmoothBranch(visibleNodes, branch.dead ? '#c2b8ad' : C.woodBase, 0);
                    drawBarkShadow(visibleNodes);
                }
            });

            if (showLeaves) {
                leafSpawns.forEach(leaf => {
                    if (currentTick >= leaf.tick) {
                        let age = (currentTick - leaf.tick) / 60;
                        if (age > 1) age = 1;
                        if (age > 0) drawLeafPad(leaf.x, leaf.y, age * leaf.scaleMod);
                    }
                });
            }

            drawSoilFront();

            if (currentTick < maxTick + 100) requestAnimationFrame(renderLoop);
            else isGrowing = false; 
        }

        function drawInstant() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPot();
            
            branches.forEach(branch => {
                if (branch.nodes.length > 1) drawSmoothBranch(branch.nodes, C.outline, 4);
            });
            branches.forEach(branch => {
                if (branch.nodes.length > 1) {
                    drawSmoothBranch(branch.nodes, branch.dead ? '#c2b8ad' : C.woodBase, 0);
                    drawBarkShadow(branch.nodes);
                }
            });
            if (showLeaves) {
                leafSpawns.forEach(leaf => {
                    drawLeafPad(leaf.x, leaf.y, 1 * leaf.scaleMod);
                });
            }
            
            drawSoilFront();
        }

        function drawLeafPad(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            
            let finalScale = scale * 1.15; // Noch ein bisschen voluminösere Blätter für den großen Baum
            ctx.scale(finalScale, finalScale);

            ctx.lineWidth = 6;
            ctx.strokeStyle = C.outline;
            ctx.lineJoin = 'round';
            ctx.stroke(leafSVG);

            ctx.fillStyle = C.leafDark;
            ctx.fill(leafSVG);

            ctx.save();
            ctx.translate(-3, -5);
            ctx.scale(0.85, 0.85);
            ctx.fillStyle = C.leafMid;
            ctx.fill(leafSVG);
            ctx.restore();

            ctx.save();
            ctx.translate(-6, -9);
            ctx.scale(0.6, 0.6);
            ctx.fillStyle = C.leafLight;
            ctx.fill(leafSVG);
            ctx.restore();

            ctx.restore();
        }

        function drawPot() {
            let px = canvas.width / 2;
            let py = canvas.height - 110; // Topf etwas tiefer für mehr Platz

            ctx.fillStyle = C.outline;
            ctx.beginPath(); ctx.ellipse(px, py, 160, 40, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.roundRect(px - 140, py, 280, 80, 15); ctx.fill();

            ctx.fillStyle = '#4a3d35';
            ctx.beginPath(); ctx.roundRect(px - 136, py + 4, 272, 72, 12); ctx.fill();
            
            ctx.fillStyle = '#455c28';
            ctx.beginPath(); ctx.ellipse(px, py - 6, 145, 25, 0, 0, Math.PI*2); ctx.fill();
        }

        function drawSoilFront() {
            let px = canvas.width / 2;
            let py = canvas.height - 110;
            
            ctx.fillStyle = '#5c7a36'; 
            ctx.beginPath(); 
            ctx.ellipse(px, py + 2, 150, 15, 0, 0, Math.PI); 
            ctx.fill();
        }

        function generateMathTree() {
            branches = [];
            leafSpawns = []; 
            currentTick = 0;
            maxTick = 0;
            isGrowing = true;
            
            let startX = canvas.width / 2;
            let startY = canvas.height - 140;
            
            // MASSIVE GRÖSSENANPASSUNG: Baum ist viel breiter (60) und länger (200)
            let startThick = 60;
            let startLength = 200;

            let numRoots = 6 + Math.floor(Math.random() * 4);
            for(let i = 0; i < numRoots; i++) {
                let rootAngle = (Math.PI / 2) + (Math.random() - 0.5) * 2.5; 
                let rootLength = 20 + Math.random() * 35;
                let rootThick = startThick * (0.35 + Math.random() * 0.35); 
                calculateBranch(startX, startY - 10, rootAngle, rootLength, rootThick, 0, 0, true, 0.08);
            }

            // Hauptstamm (Übergebe Basis-Taper-Factor von 0.08)
            calculateBranch(startX, startY, -Math.PI / 2, startLength, startThick, 0, 0, false, 0.08);
            
            renderLoop();
        }

        // Init
        drawPot();

    </script>
</body>
</html>
