<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bonsai Zen - Cut & Bend</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; background-color: #1e272e;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none;
        }
        canvas { 
            background-color: #2c3e50; width: 100%; max-width: 500px; 
            height: auto; aspect-ratio: 5/7; border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .toolbar {
            display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;
        }
        button {
            padding: 12px 18px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; color: white;
            transition: 0.2s; background: #485460;
        }
        button.active { background: #ff5e57; transform: scale(1.1); }
        .info { color: #d2dae2; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <canvas id="bonsaiCanvas" width="800" height="1100"></canvas>
    
    <div class="toolbar">
        <button id="mode-grow" onclick="setMode('grow')">🌱 Wachsen</button>
        <button id="mode-cut" onclick="setMode('cut')">✂️ Schneiden</button>
        <button id="mode-bend" onclick="setMode('bend')">🦾 Biegen</button>
    </div>
    <div class="info" id="status">Modus: Wachsen - Klicke auf den Topf</div>

    <script>
        const canvas = document.getElementById('bonsaiCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        let mode = 'grow'; // grow, cut, bend
        let tree = [];
        let isDragging = false;
        let selectedBranch = null;

        const COLORS = { outline: '#151515', wood: '#9c8c7c', leaf: '#c44536' };

        class Branch {
            constructor(parent, x, y, angle, thickness, length, depth) {
                this.parent = parent;
                this.startX = x;
                this.startY = y;
                this.angle = angle;
                this.thickness = thickness;
                this.length = length;
                this.depth = depth;
                this.children = [];
                this.endX = x + Math.cos(angle) * length;
                this.endY = y + Math.sin(angle) * length;
            }

            draw() {
                // Outline
                ctx.strokeStyle = COLORS.outline;
                ctx.lineWidth = this.thickness + 4;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                ctx.lineTo(this.endX, this.endY);
                ctx.stroke();

                // Holz
                ctx.strokeStyle = COLORS.wood;
                ctx.lineWidth = this.thickness;
                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                ctx.lineTo(this.endX, this.endY);
                ctx.stroke();

                // Blätter am Ende
                if (this.children.length === 0 && this.depth > 1) {
                    ctx.fillStyle = COLORS.leaf;
                    ctx.beginPath();
                    ctx.arc(this.endX, this.endY, 15 - this.depth * 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = COLORS.outline;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                this.children.forEach(c => c.draw());
            }

            checkHit(mx, my) {
                // Einfache Distanzprüfung zum Endpunkt für Touch-Interaktion
                const dist = Math.hypot(mx - this.endX, my - this.endY);
                if (dist < 30) return this;
                for (let child of this.children) {
                    let hit = child.checkHit(mx, my);
                    if (hit) return hit;
                }
                return null;
            }

            updatePos(newX, newY) {
                this.endX = newX;
                this.endY = newY;
                this.angle = Math.atan2(this.endY - this.startY, this.endX - this.startX);
                this.length = Math.hypot(this.endY - this.startY, this.endX - this.startX);
                // Kinder mitbewegen
                this.children.forEach(c => {
                    c.startX = this.endX;
                    c.startY = this.endY;
                    c.updatePos(c.startX + Math.cos(c.angle) * c.length, c.startY + Math.sin(c.angle) * c.length);
                });
            }
        }

        function setMode(m) {
            mode = m;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-' + m).classList.add('active');
            status.innerText = "Modus: " + m.toUpperCase();
        }

        canvas.addEventListener('pointerdown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (mode === 'grow') {
                if (tree.length === 0) {
                    tree.push(new Branch(null, 400, 1000, -Math.PI / 2, 40, 150, 0));
                } else {
                    let hit = null;
                    tree.forEach(b => { if(!hit) hit = b.checkHit(mx, my)});
                    if (hit && hit.depth < 5) {
                        let newAngle = hit.angle + (Math.random() - 0.5) * 1.5;
                        hit.children.push(new Branch(hit, hit.endX, hit.endY, newAngle, hit.thickness * 0.8, hit.length * 0.7, hit.depth + 1));
                    }
                }
            } else if (mode === 'cut') {
                tree.forEach((b, i) => {
                    let hit = b.checkHit(mx, my);
                    if (hit && hit.parent) {
                        hit.parent.children = hit.parent.children.filter(c => c !== hit);
                    }
                });
            } else if (mode === 'bend') {
                tree.forEach(b => { if(!selectedBranch) selectedBranch = b.checkHit(mx, my)});
                if (selectedBranch) isDragging = true;
            }
            draw();
        });

        canvas.addEventListener('pointermove', e => {
            if (mode === 'bend' && isDragging && selectedBranch) {
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
                const my = (e.clientY - rect.top) * (canvas.height / rect.height);
                selectedBranch.updatePos(mx, my);
                draw();
            }
        });

        canvas.addEventListener('pointerup', () => {
            isDragging = false;
            selectedBranch = null;
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Topf
            ctx.fillStyle = '#3d3d3d';
            ctx.fillRect(250, 1000, 300, 60);
            tree.forEach(b => b.draw());
        }

        setMode('grow');
        draw();
    </script>
</body>
</html>
