<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bonsai Zen Master - Fixed</title>
    <style>
        body { margin: 0; background: #2b3a4a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: transparent; width: 100%; max-width: 500px; height: auto; aspect-ratio: 5/6; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .ui { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 20px; font-size: 14px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #485460; }
        button.active { background: #e07a5f; box-shadow: 0 4px 0 #b35942; }
    </style>
</head>
<body>

    <canvas id="bonsaiCanvas" width="1000" height="1200"></canvas>
    
    <div class="ui">
        <button id="btn-grow" class="active" onclick="setMode('grow')">🌱 Wachsen</button>
        <button id="btn-cut" onclick="setMode('cut')">✂️ Schneiden</button>
        <button onclick="generateTree()">♻️ Neu</button>
    </div>

    <script>
        const canvas = document.getElementById('bonsaiCanvas');
        const ctx = canvas.getContext('2d');
        const leafSVG = new Path2D("M 0,-15 L 3,-5 L 12,-8 L 6,0 L 15,6 L 5,6 L 8,15 L 0,8 L -8,15 L -5,6 L -15,6 L -6,0 L -12,-8 L -3,-5 Z");

        let branches = [];
        let leafSpawns = [];
        let mode = 'grow';
        const C = { outline: '#151515', wood: '#9c8c7c', shadow: '#6e5e50', leaf: '#c44536' };

        function setMode(m) {
            mode = m;
            document.getElementById('btn-grow').classList.toggle('active', m === 'grow');
            document.getElementById('btn-cut').classList.toggle('active', m === 'cut');
        }

        function calculateBranch(startX, startY, angle, length, thick, depth) {
            let nodes = [];
            let currX = startX, currY = startY, currA = angle;
            let shrink = 0.01 + Math.min(depth / 6, 1) * 0.09;
            let endThick = thick * (1 - shrink);
            let steps = Math.floor(length * 1.5);

            for (let i = 0; i <= steps; i++) {
                currX += Math.cos(currA) * 0.8;
                currY += Math.sin(currA) * 0.8;
                currA += (Math.random() - 0.5) * 0.08;
                let t = thick - (thick - endThick) * (i / steps);
                nodes.push({ x: currX, y: currY, r: t / 2, a: currA });
            }

            let branch = { depth, nodes, children: [], endX: currX, endY: currY, thick: endThick };
            branches.push(branch);

            if (depth < 4 && Math.random() > 0.2) {
                let num = Math.random() > 0.5 ? 2 : 1;
                for (let i = 0; i < num; i++) {
                    let nextThick = (i === 0) ? endThick : endThickness * 0.6;
                    calculateBranch(currX, currY, currA + (Math.random() - 0.5) * 1.5, length * 0.7, nextThick, depth + 1);
                }
            } else if (depth >= 2) {
                leafSpawns.push({ x: currX, y: currY, s: depth < 3 ? 0.7 : 1.0 });
            }
        }

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPot();
            
            // Pass 1: Outlines
            ctx.lineCap = 'round';
            branches.forEach(b => {
                ctx.strokeStyle = C.outline;
                ctx.beginPath();
                ctx.moveTo(b.nodes[0].x, b.nodes[0].y);
                b.nodes.forEach(n => { ctx.lineWidth = n.r * 2 + 6; ctx.lineTo(n.x, n.y); });
                ctx.stroke();
            });

            // Pass 2: Wood
            branches.forEach(b => {
                ctx.strokeStyle = C.wood;
                ctx.beginPath();
                ctx.moveTo(b.nodes[0].x, b.nodes[0].y);
                b.nodes.forEach(n => { ctx.lineWidth = n.r * 2; ctx.lineTo(n.x, n.y); });
                ctx.stroke();
            });

            // Pass 3: Leaves
            if (mode !== 'cut') {
                leafSpawns.forEach(l => {
                    ctx.save(); ctx.translate(l.x, l.y); ctx.scale(l.s, l.s);
                    ctx.fillStyle = C.leaf; ctx.fill(leafSVG);
                    ctx.restore();
                });
            }
        }

        function drawPot() {
            ctx.fillStyle = C.outline; ctx.beginPath(); ctx.ellipse(500, 1100, 140, 35, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#4a3d35'; ctx.fillRect(380, 1100, 240, 60);
        }

        canvas.addEventListener('pointerdown', e => {
            if (mode === 'cut') {
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left) * (1000 / rect.width);
                const my = (e.clientY - rect.top) * (1200 / rect.height);
                branches = branches.filter(b => Math.hypot(b.endX - mx, b.endY - my) > 40);
                leafSpawns = leafSpawns.filter(l => Math.hypot(l.x - mx, l.y - my) > 40);
                drawTree();
            }
        });

        function generateTree() {
            branches = []; leafSpawns = [];
            calculateBranch(500, 1100, -Math.PI / 2, 160, 45, 0);
            drawTree();
        }

        generateTree();
    </script>
</body>
</html>
